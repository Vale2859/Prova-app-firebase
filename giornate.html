<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Giornate Beauty | Farmacia Montesano</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="mobile.css" />
  <link rel="stylesheet" href="mobile-only.css" />
  <link rel="stylesheet" href="app-fixes.css" />

  <style>
    .beauty-page{
      max-width:1200px;
      margin:auto;
      padding:18px 18px 120px;
    }

    .beauty-section{
      margin-top:14px;
    }

    .beauty-section h2{
      margin:0 0 8px;
      font-size:34px;
      line-height:1.02;
      color:#17332c;
      letter-spacing:-.03em;
    }

    .beauty-section p{
      margin:0 0 18px;
      font-size:18px;
      line-height:1.45;
      color:#6e817b;
    }

    .beauty-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:22px;
    }

    .beauty-card{
      background:#fff;
      border-radius:28px;
      overflow:hidden;
      border:1px solid #e6eeea;
      box-shadow:0 14px 34px rgba(0,0,0,.07);
      transition:transform .2s ease, box-shadow .2s ease;
    }

    .beauty-card:hover{
      transform:translateY(-4px);
      box-shadow:0 18px 38px rgba(0,0,0,.1);
    }

    .beauty-card-image{
      width:100%;
      height:260px;
      object-fit:cover;
      display:block;
      background:#eef3f0;
    }

    .beauty-card-body{
      padding:20px 18px 22px;
    }

    .beauty-date{
      display:inline-flex;
      align-items:center;
      min-height:34px;
      padding:0 14px;
      border-radius:999px;
      background:#efe6f8;
      color:#7d4ca6;
      font-size:14px;
      font-weight:800;
      margin-bottom:10px;
    }

    .beauty-card-title{
      margin:0 0 10px;
      font-size:28px;
      line-height:1.08;
      color:#17332c;
    }

    .beauty-card-text{
      margin:0;
      font-size:17px;
      line-height:1.48;
      color:#61746d;
    }

    .beauty-empty{
      width:100%;
      text-align:center;
      padding:42px 20px;
      border-radius:24px;
      background:linear-gradient(135deg,#f7fbf9 0%, #ffffff 100%);
      border:1px solid #e4efe9;
      color:#61746d;
      box-shadow:0 12px 30px rgba(0,0,0,.05);
    }

    .beauty-empty strong{
      display:block;
      margin-bottom:8px;
      font-size:24px;
      color:#17332c;
    }

    @media (max-width: 900px){
      .beauty-grid{
        grid-template-columns:1fr;
      }

      .beauty-card-image{
        height:220px;
      }
    }

    @media (max-width: 640px){
      .beauty-page{
        padding:22px 12px 120px;
      }

      .beauty-section h2{
        font-size:26px;
      }

      .beauty-section p{
        font-size:16px;
        margin-bottom:14px;
      }

      .beauty-grid{
        gap:14px;
      }

      .beauty-card{
        border-radius:22px;
      }

      .beauty-card-image{
        height:180px;
      }

      .beauty-card-body{
        padding:14px 14px 16px;
      }

      .beauty-card-title{
        font-size:22px;
      }

      .beauty-card-text{
        font-size:15px;
      }
    }
  </style>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f8f55">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Montesano">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
</head>

<body class="season-primavera">
  <header class="home-site-header">
    <div class="home-shell home-nav-wrap">
      <a href="index.html" onclick="if(history.length>1){history.back();return false;}" class="home-brand" aria-label="Farmacia Montesano">
        <div class="home-brand-logo-box">
          <img src="logo.png" alt="Logo Farmacia Montesano" class="home-brand-logo" />
        </div>
      </a>
    </div>
  </header>

  <div class="beauty-page">
    <div class="page-topbar">
      <a href="index.html" onclick="if(history.length>1){history.back();return false;}" class="page-back-btn" aria-label="Torna alla home"><span>←</span></a>
      <div class="page-topbar-copy">
        <h1>Giornate Beauty</h1>
        <p>Scopri gli eventi beauty e le giornate speciali della Farmacia Montesano.</p>
      </div>
    </div>

    <section class="beauty-section" id="beautySection">
      <h2>Eventi in farmacia</h2>
      <p>Prenota la tua esperienza beauty direttamente in farmacia.</p>

      <div class="beauty-grid" id="beautyGrid"></div>
    </section>
  </div>

  <script src="site-config.js"></script>
  <script src="services-data.js"></script>
  <script src="promo-data.js"></script>
  <script src="giornate-data.js"></script>
  <script src="script.js"></script>
  <script src="mobile-only.js"></script>
  <script src="app-fixes.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js");
      });
    }
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB7p69J89r5Kwu2YgawkBb9omjojdM4HTM",
      authDomain: "farmaciamontesano.firebaseapp.com",
      projectId: "farmaciamontesano",
      storageBucket: "farmaciamontesano.firebasestorage.app",
      messagingSenderId: "881461241551",
      appId: "1:881461241551:web:c74d6ee74cb857fa5179ba"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function caricaBeautyFirebase() {
      const querySnapshot = await getDocs(collection(db, "beauty"));
      const eventi = [];

      querySnapshot.forEach((doc) => {
        const data = doc.data();

        if (data.attivo === true) {
          eventi.push({
            id: doc.id,
            titolo: data.titolo || data.nome || "",
            descrizione: data.descrizione || "",
            data: data.data || "",
            immagine: data.immagine || data.imageUrl || "",
            ordine: typeof data.ordine === "number" ? data.ordine : 999
          });
        }
      });

      eventi.sort((a, b) => a.ordine - b.ordine);

      renderBeauty(eventi);
    }

    function renderBeauty(eventi) {
      const grid = document.getElementById("beautyGrid");
      const section = document.getElementById("beautySection");

      if (!grid) return;

      if (eventi.length === 0) {
        if (section) {
          section.innerHTML = `
            <div class="beauty-empty">
              <strong>Al momento non ci sono giornate beauty visibili</strong>
              Torna presto oppure contattaci in farmacia per maggiori informazioni.
            </div>
          `;
        }
        return;
      }

      grid.innerHTML = "";

      eventi.forEach(evento => {
        grid.innerHTML += `
          <article class="beauty-card">
            <img src="${evento.immagine || ''}" alt="${evento.titolo || ''}" class="beauty-card-image">
            <div class="beauty-card-body">
              ${evento.data ? `<span class="beauty-date">${evento.data}</span>` : ``}
              <h3 class="beauty-card-title">${evento.titolo || ""}</h3>
              <p class="beauty-card-text">${evento.descrizione || ""}</p>
            </div>
          </article>
        `;
      });
    }

    caricaBeautyFirebase();
  </script>
</body>
</html>
