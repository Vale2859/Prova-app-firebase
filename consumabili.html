<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Consumabili</title><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script><script src="internal-common.js"></script><style>:root{--bg:#eef3f0;--card:#fff;--line:#dde5e0;--text:#1f3c35;--muted:#6f837c;--green:#3e8b61;--green2:#66b187;--green-dark:#1d5a40;--shadow:0 12px 28px rgba(0,0,0,.07)}*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif}html,body{margin:0}body{background:linear-gradient(180deg,#f4f7f5,#e9efec);color:var(--text)}.app{width:min(100%,430px);margin:0 auto;padding:14px 14px 24px}.hero{background:linear-gradient(135deg,var(--green-dark),var(--green),var(--green2));color:#fff;border-radius:28px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}.back{display:inline-flex;align-items:center;gap:8px;text-decoration:none;color:#fff;font-size:16px;font-weight:900;margin-bottom:12px}.hero-title{font-size:28px;font-weight:900;margin:0 0 8px}.hero-sub{font-size:14px;opacity:.95;font-weight:700;margin:0 0 14px}.hero-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.hero-stat{min-height:78px;border-radius:18px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.15);padding:12px;display:flex;flex-direction:column;justify-content:space-between}.hero-stat strong{font-size:28px;font-weight:900}.hero-stat span{font-size:12px;font-weight:800}.list{display:grid;gap:10px}.card{background:#fff;border-radius:22px;padding:16px;border:1px solid var(--line);box-shadow:var(--shadow)}.card.active{border-color:#bfe2cc;background:linear-gradient(180deg,#fff,#f5fbf7)}.title{font-size:16px;font-weight:900}.sub{font-size:12px;color:var(--muted);margin-top:4px}.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(120px);background:#17211d;color:#fff;min-height:46px;padding:0 16px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;box-shadow:0 18px 40px rgba(0,0,0,.22);z-index:9999;transition:transform .25s ease}.toast.show{transform:translateX(-50%) translateY(0)}.section{background:#fff;border-radius:24px;padding:14px;border:1px solid var(--line);box-shadow:var(--shadow);margin-top:14px}</style></head><body><div class="app"><section class="hero"><a class="back" href="operatori.html">← Torna</a><div class="hero-title">Consumabili</div><div class="hero-sub">Metti solo il flag. La richiesta parte subito e resta visibile finché il titolare non la chiude.</div><div class="hero-stats"><div class="hero-stat"><strong id="selectedCount">0</strong><span>Prodotti richiesti</span></div><div class="hero-stat"><strong id="employeeNameBox">—</strong><span>Operatore attivo</span></div></div></section><section class="list" id="listBox"></section><div class="section"><div class="sub">Non serve inviare. Se togli il flag prima che il titolare la chiuda, la richiesta attiva viene tolta.</div></div></div><div class="toast" id="toastBox"></div><script>const A=window.InternalApp;const s=A.requireEmployeeSession();const PRODUCTS=['Guanti','Mascherine','Carta lettino','Rotolo etichette','Sacchetti','Penne','Carta stampante','Disinfettante','Rotolo POS','Buste farmacia'];let activeRequestsMap={},quantityState={},busy=false;PRODUCTS.forEach(n=>quantityState[n]=1);employeeNameBox.textContent=s.name;function cssSafe(v){return String(v).replace(/[^a-zA-Z0-9_-]/g,'_')}function toast(m){toastBox.textContent=m;toastBox.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>toastBox.classList.remove('show'),1400)}function render(){selectedCount.textContent=Object.keys(activeRequestsMap).length;listBox.innerHTML=PRODUCTS.map(name=>{const req=activeRequestsMap[name],active=!!req,qty=req?Number(req.qty||1):Number(quantityState[name]||1);return '<div class="card '+(active?'active':'')+'" style="display:flex;align-items:center;justify-content:space-between;gap:12px"><div style="display:flex;align-items:center;gap:12px;flex:1"><input type="checkbox" style="width:24px;height:24px;accent-color:var(--green)" '+(active?'checked':'')+' onchange="toggleProduct(\''+name+'\')"><div><div class="title">'+name+'</div><div class="sub">'+(active?'Richiesto e visibile al titolare':'Non richiesto')+'</div></div></div><div style="display:flex;align-items:center;gap:8px"><button style="width:38px;height:38px;border:none;border-radius:12px;background:#eef3ef;font-size:18px;font-weight:900" onclick="changeQty(\''+name+'\',-1)">−</button><div style="min-width:20px;text-align:center;font-weight:900" id="qty_'+cssSafe(name)+'">'+qty+'</div><button style="width:38px;height:38px;border:none;border-radius:12px;background:#eef3ef;font-size:18px;font-weight:900" onclick="changeQty(\''+name+'\',1)">+</button></div></div>';}).join('')}async function toggleProduct(name){if(busy)return;const existing=activeRequestsMap[name];if(!existing){try{busy=true;const qty=Number(quantityState[name]||1);await A.db.collection('employee_requests').add({type:'consumabile',employeeId:s.id,employeeName:s.name,itemName:name,qty:qty,status:'in_attesa',seenByOwner:false,completed:false,completedAt:'',completedBy:'',...A.nowMeta()});await A.addOwnerNotification({type:'consumabile',title:'Nuovo consumabile',message:s.name+' ha richiesto '+name,employeeId:s.id,employeeName:s.name});toast('Richiesta salvata');}finally{busy=false;}} else {try{busy=true;await A.db.collection('employee_requests').doc(existing.id).delete();toast('Richiesta tolta');}finally{busy=false;}}}async function changeQty(name,delta){const active=activeRequestsMap[name];if(active){const next=Math.max(1,Number(active.qty||1)+delta);await A.db.collection('employee_requests').doc(active.id).update({qty:next});return;}quantityState[name]=Math.max(1,Number(quantityState[name]||1)+delta);const span=document.getElementById('qty_'+cssSafe(name));if(span)span.textContent=quantityState[name];}A.db.collection('employee_requests').where('employeeId','==',s.id).where('type','==','consumabile').onSnapshot(sn=>{activeRequestsMap={};sn.docs.map(d=>({id:d.id,...d.data()})).filter(r=>r.status==='in_attesa'&&r.completed!==true).forEach(r=>activeRequestsMap[r.itemName]=r);render();});window.toggleProduct=toggleProduct;window.changeQty=changeQty;render();</script></body></html>
