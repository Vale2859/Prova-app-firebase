<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Aggiorna LDF</title><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script><script src="internal-common.js"></script><style>:root{--bg:#eef3f0;--card:#fff;--line:#dde5e0;--text:#1f3c35;--muted:#6f837c;--green:#3e8b61;--green2:#66b187;--green-dark:#1d5a40;--shadow:0 12px 28px rgba(0,0,0,.07)}*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif}html,body{margin:0}body{background:linear-gradient(180deg,#f4f7f5,#e9efec);color:var(--text)}.app{width:min(100%,430px);margin:0 auto;padding:14px 14px 24px}.hero{background:linear-gradient(135deg,var(--green-dark),var(--green),var(--green2));color:#fff;border-radius:28px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}.back{display:inline-flex;align-items:center;gap:8px;text-decoration:none;color:#fff;font-size:16px;font-weight:900;margin-bottom:12px}.hero-title{font-size:28px;font-weight:900;margin:0 0 8px}.hero-sub{font-size:14px;opacity:.95;font-weight:700;margin:0 0 14px}.hero-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.hero-stat{min-height:78px;border-radius:18px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.15);padding:12px;display:flex;flex-direction:column;justify-content:space-between}.hero-stat strong{font-size:28px;font-weight:900}.hero-stat span{font-size:12px;font-weight:800}.section{background:#fff;border-radius:24px;padding:16px;border:1px solid var(--line);box-shadow:var(--shadow)}.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}.field label{display:block;font-size:13px;font-weight:800;color:var(--muted);margin-bottom:6px}.field input{width:100%;min-height:50px;border-radius:16px;border:1px solid var(--line);background:#f7faf8;padding:0 14px;font-size:16px}.btn{width:100%;min-height:50px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;font-weight:900}.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(120px);background:#17211d;color:#fff;min-height:46px;padding:0 16px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;box-shadow:0 18px 40px rgba(0,0,0,.22);z-index:9999;transition:transform .25s ease}.toast.show{transform:translateX(-50%) translateY(0)}</style></head><body><div class="app"><section class="hero"><a class="back" href="dashboard-admin.html">← Torna</a><div class="hero-title">Aggiorna LDF mese</div><div class="hero-sub">I giorni totali si calcolano in automatico escludendo le domeniche.</div><div class="hero-stats"><div class="hero-stat"><strong id="workdaysBox">0</strong><span>Giorni utili mese</span></div><div class="hero-stat"><strong id="elapsedBox">0</strong><span>Giorni trascorsi</span></div></div></section><div class="section"><div class="row2"><div class="field"><label>Mese</label><input id="monthInput" type="month"></div><div class="field"><label>Gruppo fatto</label><input id="groupDone" type="number"></div></div><div class="row2"><div class="field"><label>Cosimo</label><input id="cosimoDone" type="number"></div><div class="field"><label>Daniela</label><input id="danielaDone" type="number"></div></div><div class="row2"><div class="field"><label>Patrizia</label><input id="patriziaDone" type="number"></div><div class="field"><label>Ultima modifica</label><input id="updatedAtBox" type="text" disabled></div></div><button class="btn" id="saveBtn">Salva mese</button></div></div><div class="toast" id="toast"></div><script>const A=window.InternalApp,t=document.getElementById('toast');function showToast(m){t.textContent=m;t.classList.add('show');clearTimeout(showToast.t);showToast.t=setTimeout(()=>t.classList.remove('show'),1400)}monthInput.value=A.monthKey();async function loadMonth(){const key=monthInput.value||A.monthKey();const parts=key.split('-');const y=Number(parts[0]),m=Number(parts[1]);const work=A.workdaysInMonth(y,m),elapsed=A.elapsedWorkdaysInMonth(y,m);workdaysBox.textContent=work;elapsedBox.textContent=elapsed;const d=await A.getDocSafe('ldf_monthly',key)||{employees:{cosimo:{done:0},daniela:{done:0},patrizia:{done:0}},groupDone:0};groupDone.value=d.groupDone||0;cosimoDone.value=d.employees&&d.employees.cosimo?d.employees.cosimo.done||0:0;danielaDone.value=d.employees&&d.employees.daniela?d.employees.daniela.done||0:0;patriziaDone.value=d.employees&&d.employees.patrizia?d.employees.patrizia.done||0:0;updatedAtBox.value=d.updatedAt?d.updatedAt.replace('T',' ').slice(0,16):'—';}monthInput.onchange=loadMonth;saveBtn.onclick=async()=>{const key=monthInput.value;const parts=key.split('-');const y=Number(parts[0]),m=Number(parts[1]);const work=A.workdaysInMonth(y,m),elapsed=A.elapsedWorkdaysInMonth(y,m);await A.setDocMerge('ldf_monthly',key,{year:y,month:m,giorniPassati:elapsed,giorniTotali:work,groupDone:Number(groupDone.value||0),employees:{cosimo:{name:'Cosimo',done:Number(cosimoDone.value||0)},daniela:{name:'Daniela',done:Number(danielaDone.value||0)},patrizia:{name:'Patrizia',done:Number(patriziaDone.value||0)}},updatedAt:new Date().toISOString(),updatedBy:'Valerio'});for(const id of ['cosimo','daniela','patrizia']){await A.addEmployeeNotification(id,{type:'ldf',title:'LDF aggiornato',message:'I dati LDF sono stati aggiornati dal titolare.'});}showToast('Mese aggiornato');loadMonth();};loadMonth();</script>
<script type="module">
  import { requireAuth } from "./auth-guard.js";
  requireAuth({ redirect: "login.html" });
</script>
</body></html>
