<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Gestione pagine app | Farmacia Montesano</title>

  <style>
    :root{
      --bg:#eef1ef;
      --panel:#f7f9f8;
      --line:#dfe7e2;
      --shadow:0 8px 20px rgba(18,48,40,.06);
      --text:#17352f;
      --muted:#72837d;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
      color:var(--text);
      overflow:hidden;
      height:100%;
    }

    body{
      min-height:100vh;
    }

    .app{
      width:min(100%, 430px);
      margin:0 auto;
      min-height:100vh;
      padding:10px 10px 14px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      flex:0 0 auto;
    }

    .title-wrap{
      min-width:0;
    }

    .title{
      margin:0;
      font-size:22px;
      line-height:1.02;
      letter-spacing:-0.03em;
      font-weight:800;
    }

    .subtitle{
      margin:4px 0 0;
      font-size:13px;
      line-height:1.35;
      color:var(--muted);
      font-weight:600;
    }

    .swipe-hint{
      flex:0 0 auto;
      font-size:11px;
      color:#6d7f79;
      font-weight:700;
      white-space:nowrap;
      padding-top:4px;
    }

    .grid{
      flex:1 1 auto;
      display:grid;
      grid-template-columns:1fr 1fr;
      grid-template-rows:repeat(4, 1fr);
      gap:8px;
      min-height:0;
    }

    .card{
      position:relative;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:14px;
      box-shadow:var(--shadow);
      overflow:hidden;
      padding:10px;
      min-height:0;
    }

    .card-top-line{
      height:10px;
      width:55%;
      border-radius:8px;
      background:linear-gradient(90deg,#eef2f0 0%, #e6ebe8 100%);
      margin-bottom:10px;
    }

    .card-middle{
      height:28px;
      width:72%;
      border-radius:10px;
      background:rgba(232,237,234,.85);
      margin-bottom:8px;
    }

    .card-bottom{
      position:absolute;
      left:10px;
      right:10px;
      bottom:10px;
      height:34px;
      border-radius:10px;
      background:rgba(236,240,238,.95);
      border:1px solid #edf1ef;
    }

    @media (max-width:390px){
      .app{
        padding:8px 8px 12px;
        gap:8px;
      }

      .title{
        font-size:20px;
      }

      .subtitle{
        font-size:12px;
      }

      .card{
        padding:8px;
      }

      .card-bottom{
        left:8px;
        right:8px;
        bottom:8px;
        height:30px;
      }
    }
  </style>
</head>
<body>
  <main class="app" id="swipeArea">
    <div class="top">
      <div class="title-wrap">
        <h1 class="title">Gestione pagine app</h1>
        <p class="subtitle">Ogni riquadro controllerà il contenuto mostrato nell’app del cliente.</p>
      </div>
      <div class="swipe-hint">← Torna indietro</div>
    </div>

    <section class="grid">
      <div class="card">
        <div class="card-top-line"></div>
        <div class="card-middle"></div>
        <div class="card-bottom"></div>
      </div>

      <div class="card">
        <div class="card-top-line"></div>
        <div class="card-middle"></div>
        <div class="card-bottom"></div>
      </div>

      <div class="card">
        <div class="card-top-line"></div>
        <div class="card-middle"></div>
        <div class="card-bottom"></div>
      </div>

      <div class="card">
        <div class="card-top-line"></div>
        <div class="card-middle"></div>
        <div class="card-bottom"></div>
      </div>

      <div class="card">
        <div class="card-top-line"></div>
        <div class="card-middle"></div>
        <div class="card-bottom"></div>
      </div>

      <div class="card">
        <div class="card-top-line"></div>
        <div class="card-middle"></div>
        <div class="card-bottom"></div>
      </div>

      <div class="card">
        <div class="card-top-line"></div>
        <div class="card-middle"></div>
        <div class="card-bottom"></div>
      </div>

      <div class="card">
        <div class="card-top-line"></div>
        <div class="card-middle"></div>
        <div class="card-bottom"></div>
      </div>
    </section>
  </main>

  <script>
    (function () {
      let startX = 0;
      let startY = 0;
      let isTouching = false;

      document.addEventListener("touchstart", function (e) {
        if (!e.touches || !e.touches.length) return;
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        isTouching = true;
      }, { passive: true });

      document.addEventListener("touchend", function (e) {
        if (!isTouching || !e.changedTouches || !e.changedTouches.length) return;

        const endX = e.changedTouches[0].clientX;
        const endY = e.changedTouches[0].clientY;

        const diffX = endX - startX;
        const diffY = Math.abs(startY - endY);

        if (diffX > 80 && diffY < 40) {
          window.location.href = "titolare.html";
        }

        isTouching = false;
      }, { passive: true });
    })();
  </script>
</body>
</html>
