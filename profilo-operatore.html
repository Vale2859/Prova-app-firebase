<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Profilo operatore</title>
<style>
:root{--bg:#eef3f0;--card:#fff;--line:#dde5e0;--text:#1f3c35;--muted:#6f837c;--green:#3e8b61;--green2:#66b187;--green-dark:#1d5a40;--blue:#3d73d1;--yellow:#d6a43a;--purple:#7d67d7;--red:#ff6b5f;--shadow:0 12px 28px rgba(0,0,0,.07)}
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;-webkit-tap-highlight-color:transparent}html,body{margin:0;padding:0}body{background:linear-gradient(180deg,#f4f7f5,#e9efec);color:var(--text)}
.app{width:min(100%,430px);margin:0 auto;min-height:100vh;padding:14px 14px 24px}.hero{background:radial-gradient(circle at top right, rgba(255,255,255,.14), transparent 36%),linear-gradient(135deg,var(--green-dark),var(--green),var(--green2));color:#fff;border-radius:28px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}.back{display:inline-flex;align-items:center;gap:8px;text-decoration:none;color:#fff;font-size:16px;font-weight:900;margin-bottom:12px}.hero-title{font-size:28px;line-height:.95;font-weight:900;letter-spacing:-.04em;margin:0 0 8px}.hero-sub{font-size:14px;line-height:1.25;opacity:.95;font-weight:700;margin:0 0 14px}.hero-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.hero-stat{min-height:78px;border-radius:18px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.15);padding:12px;display:flex;flex-direction:column;justify-content:space-between}.hero-stat strong{font-size:28px;line-height:1;font-weight:900}.hero-stat span{font-size:12px;line-height:1.1;font-weight:800;opacity:.95}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.card{background:#fff;border-radius:22px;padding:16px;border:1px solid var(--line);box-shadow:var(--shadow)}.tap{cursor:pointer}.tap:active{transform:scale(.98)}.title{font-size:16px;font-weight:900}.sub{font-size:12px;color:var(--muted);margin-top:4px}.kpi{font-size:28px;font-weight:900;letter-spacing:-.03em}.section{background:#fff;border-radius:24px;padding:16px;border:1px solid var(--line);box-shadow:var(--shadow);margin-bottom:14px}.section-title{font-size:20px;font-weight:900;margin:0 0 10px}.list{display:grid;gap:10px}.row{display:grid;gap:12px;margin-bottom:12px}.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}.field label{display:block;font-size:13px;font-weight:800;color:var(--muted);margin-bottom:6px}.field input,.field select,.field textarea{width:100%;min-height:50px;border-radius:16px;border:1px solid var(--line);background:#f7faf8;padding:0 14px;font-size:16px;color:var(--text);outline:none}.field textarea{padding:14px;min-height:100px;resize:vertical}.btn{width:100%;min-height:50px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;font-size:15px;font-weight:900;cursor:pointer}.btn.secondary{background:#eef3ef;color:var(--text)}.btn.red{background:linear-gradient(135deg,#ff6a66,var(--red));}.pillbar{display:flex;gap:8px;margin-bottom:12px}.pill{flex:1;min-height:46px;border:none;border-radius:18px;background:#fff;border:1px solid var(--line);font-size:14px;font-weight:900;box-shadow:var(--shadow);cursor:pointer}.pill.active{background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;border-color:transparent}.badge{position:absolute;top:10px;right:10px;min-width:22px;height:22px;padding:0 6px;border-radius:999px;background:var(--red);color:#fff;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center}.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(120px);background:#17211d;color:#fff;min-height:46px;padding:0 16px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;box-shadow:0 18px 40px rgba(0,0,0,.22);z-index:9999;transition:transform .25s ease}.toast.show{transform:translateX(-50%) translateY(0)}.small{font-size:12px;color:var(--muted);font-weight:700}.empty{background:#fff;border:1px solid var(--line);border-radius:24px;padding:20px;color:var(--muted);font-weight:700;text-align:center;box-shadow:var(--shadow)}.switch{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line)}.switch:last-child{border-bottom:none}.switch input{width:48px;height:28px}.sheet-backdrop{position:fixed;inset:0;background:rgba(12,18,16,.34);display:none;align-items:flex-end;justify-content:center;z-index:10001;padding:12px}.sheet-backdrop.show{display:flex}.sheet{width:min(100%,430px);background:#fff;border-radius:26px 26px 18px 18px;box-shadow:0 28px 70px rgba(0,0,0,.24);padding:16px}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="internal-common.js"></script></head><body><div class="app"><section class="hero"><a class="back" href="operatori.html">← Torna</a><div class="hero-title">Profilo operatore</div><div class="hero-sub">Scegli se ricevere o meno le notifiche che ti servono davvero.</div></section><div class="section"><div class="section-title" id="empName">Operatore</div><div class="switch"><div><div class="title">Notifiche push</div><div class="small">Attiva permesso sul dispositivo</div></div><input type="checkbox" id="pushEnabled"></div><div class="switch"><div><div class="title">Permessi / ferie</div><div class="small">Accettata o rifiutata</div></div><input type="checkbox" id="ferieNotif"></div><div class="switch"><div><div class="title">Consumabili</div><div class="small">Presa in carico o completata</div></div><input type="checkbox" id="consNotif"></div><div class="switch"><div><div class="title">LDF</div><div class="small">Aggiornamenti punteggi</div></div><input type="checkbox" id="ldfNotif"></div><div class="row" style="margin-top:12px"><button class="btn" id="saveBtn">Salva impostazioni</button><button class="btn secondary" id="logoutBtn">Esci</button></div></div></div><div class="toast" id="toast"></div><script>const A=window.InternalApp;const s=A.requireEmployeeSession();const t=document.getElementById('toast');function showToast(m){t.textContent=m;t.classList.add('show');clearTimeout(showToast.t);showToast.t=setTimeout(()=>t.classList.remove('show'),1400)}document.getElementById('empName').textContent=s.name;(async()=>{const p=await A.getEmployeeProfile(s.id); document.getElementById('pushEnabled').checked=!!p.pushEnabled; document.getElementById('ferieNotif').checked=p.notifications?.ferie!==false; document.getElementById('consNotif').checked=p.notifications?.consumabili!==false; document.getElementById('ldfNotif').checked=p.notifications?.ldf!==false;})();document.getElementById('saveBtn').onclick=async()=>{await A.setDocMerge('employee_profiles', s.id, {employeeId:s.id, employeeName:s.name, pushEnabled:document.getElementById('pushEnabled').checked, notifications:{ferie:document.getElementById('ferieNotif').checked, consumabili:document.getElementById('consNotif').checked, ldf:document.getElementById('ldfNotif').checked}, updatedAt:new Date().toISOString()}); showToast('Impostazioni salvate');};document.getElementById('logoutBtn').onclick=()=>{A.clearEmployeeSession(); location.href='dipendenti-login.html';};</script></body></html>
