<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Richieste dipendenti</title><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script><script src="internal-common.js"></script><style>:root{--bg:#eef3f0;--card:#fff;--line:#dde5e0;--text:#1f3c35;--muted:#6f837c;--green:#3e8b61;--green2:#66b187;--green-dark:#1d5a40;--blue:#3d73d1;--yellow:#d6a43a;--purple:#7d67d7;--red:#ff6b5f;--shadow:0 12px 28px rgba(0,0,0,.07)}*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif}html,body{margin:0}body{background:linear-gradient(180deg,#f4f7f5,#e9efec);color:var(--text)}.app{width:min(100%,430px);margin:0 auto;padding:14px 14px 24px}.hero{background:linear-gradient(135deg,var(--green-dark),var(--green),var(--green2));color:#fff;border-radius:28px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}.back{display:inline-flex;align-items:center;gap:8px;text-decoration:none;color:#fff;font-size:16px;font-weight:900;margin-bottom:12px}.hero-title{font-size:28px;font-weight:900;margin:0 0 8px}.hero-sub{font-size:14px;opacity:.95;font-weight:700;margin:0 0 14px}.hero-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.hero-stat{min-height:78px;border-radius:18px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.15);padding:12px;display:flex;flex-direction:column;justify-content:space-between}.hero-stat strong{font-size:28px;font-weight:900}.hero-stat span{font-size:12px;font-weight:800}.pillbar{display:flex;gap:8px;margin-bottom:12px}.pill{flex:1;min-height:46px;border:none;border-radius:18px;background:#fff;border:1px solid var(--line);font-size:14px;font-weight:900}.pill.active{background:linear-gradient(135deg,var(--green),var(--green2));color:#fff}.list{display:grid;gap:10px}.card{background:#fff;border-radius:24px;padding:16px;border:1px solid var(--line);box-shadow:var(--shadow)}.title{font-size:16px;font-weight:900}.sub{font-size:12px;color:var(--muted);margin-top:4px}.section{background:#fff;border-radius:20px;padding:14px;margin:12px 0;border:1px solid var(--line)}.kpi{font-size:30px;font-weight:900}.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{width:100%;min-height:48px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;font-weight:900}.btn.red{background:linear-gradient(135deg,#ff6a66,var(--red))}.empty{background:#fff;border:1px solid var(--line);border-radius:24px;padding:22px;text-align:center;color:var(--muted);font-weight:700;box-shadow:var(--shadow)}.sheet-backdrop{position:fixed;inset:0;background:rgba(12,18,16,.34);display:none;align-items:flex-end;justify-content:center;z-index:10001;padding:12px}.sheet-backdrop.show{display:flex}.sheet{width:min(100%,430px);background:#fff;border-radius:26px 26px 18px 18px;box-shadow:0 28px 70px rgba(0,0,0,.24);padding:16px}.field textarea{width:100%;min-height:110px;border-radius:18px;border:1px solid var(--line);background:#f7faf8;padding:14px;font-size:16px;margin-bottom:12px}.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(120px);background:#17211d;color:#fff;min-height:46px;padding:0 16px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;box-shadow:0 18px 40px rgba(0,0,0,.22);z-index:9999;transition:transform .25s ease}.toast.show{transform:translateX(-50%) translateY(0)}</style></head><body><div class="app"><section class="hero"><a class="back" href="dashboard-admin.html">← Torna</a><div class="hero-title">Richieste dipendenti</div><div class="hero-sub" id="heroSub">Sto caricando permessi, assenze e ferie.</div><div class="hero-stats"><div class="hero-stat"><strong id="statTot">0</strong><span>In attesa</span></div><div class="hero-stat"><strong id="statAss">0</strong><span>Assenze / ferie</span></div></div></section><div class="pillbar"><button class="pill active" data-filter="tutte">Tutte</button><button class="pill" data-filter="permesso">Permessi</button><button class="pill" data-filter="assenza-ferie">Assenze / Ferie</button></div><section class="list" id="listBox"></section></div><div class="sheet-backdrop" id="rejectBackdrop"><div class="sheet"><div class="title" style="margin-bottom:10px">Motivo rifiuto</div><div class="field"><textarea id="rejectReason"></textarea></div><div class="row2"><button class="btn" style="background:#eef3ef;color:#1f3c35" id="cancelReject">Annulla</button><button class="btn red" id="confirmReject">Conferma</button></div></div></div><div class="toast" id="toast"></div><script>const A=window.InternalApp;let currentFilter='tutte',rejectId=null;const listBox=document.getElementById('listBox'),toast=document.getElementById('toast');function showToast(m){toast.textContent=m;toast.classList.add('show');clearTimeout(showToast.t);showToast.t=setTimeout(()=>toast.classList.remove('show'),1400)}function fmtDate(s){return A.fmtDateIT(s)}function typeData(r){if(r.requestKind==='ore')return{label:'Permesso',main:(r.fromHour||'—')+' - '+(r.toHour||'—'),sub:fmtDate(r.day),helper:'Assenza a ore'};if(r.requestKind==='giornata')return{label:'Assenza',main:fmtDate(r.day),sub:'Assenza giornata',helper:'Assente per tutto il giorno'};return{label:'Ferie',main:fmtDate(r.fromDate)+' → '+fmtDate(r.toDate),sub:'Ferie',helper:'Giorni di assenza'};}function matches(r){const perm=r.requestKind==='ore';if(currentFilter==='tutte')return true;if(currentFilter==='permesso')return perm;return !perm;}async function approve(id){await A.db.collection('employee_requests').doc(id).update({status:'approvata',ownerReason:''});const row=window._rows.find(x=>x.id===id);if(row)await A.addEmployeeNotification(row.employeeId,{type:'ferie_permesso',title:'Richiesta approvata',message:'La tua richiesta è stata approvata.'});showToast('Approvata');}function openReject(id){rejectId=id;rejectReason.value='';rejectBackdrop.classList.add('show')}async function confirmReject(){if(!rejectId)return;const reason=rejectReason.value.trim();if(!reason)return alert('Scrivi il motivo');await A.db.collection('employee_requests').doc(rejectId).update({status:'negata',ownerReason:reason});const row=window._rows.find(x=>x.id===rejectId);if(row)await A.addEmployeeNotification(row.employeeId,{type:'ferie_permesso',title:'Richiesta rifiutata',message:'La tua richiesta è stata rifiutata.'});rejectBackdrop.classList.remove('show');showToast('Rifiutata');}cancelReject.onclick=()=>rejectBackdrop.classList.remove('show');confirmReject.onclick=confirmReject;document.querySelectorAll('.pill').forEach(b=>b.onclick=()=>{document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));b.classList.add('active');currentFilter=b.dataset.filter;render(window._rows||[]);});function render(rows){const filt=rows.filter(matches);if(!filt.length){listBox.innerHTML='<div class="empty">Nessuna richiesta per questo filtro 👍</div>';return;}listBox.innerHTML=filt.map(r=>{const t=typeData(r);return '<div class="card"><div style="display:flex;justify-content:space-between;gap:12px;margin-bottom:12px"><div><div class="title">'+r.employeeName+'</div><div class="sub">'+t.label+'</div></div></div><div class="section"><div class="sub">'+t.helper+'</div><div class="kpi">'+t.main+'</div><div class="sub">'+t.sub+'</div></div><div class="sub" style="margin-bottom:10px">Inviata il '+fmtDate(r.createdDate)+' alle '+(r.createdTime||'—')+'</div><div class="row2"><button class="btn" onclick="approve(\''+r.id+'\')">Approva</button><button class="btn red" onclick="openReject(\''+r.id+'\')">Rifiuta</button></div></div>';}).join('');}A.db.collection('employee_requests').onSnapshot(sn=>{const rows=sn.docs.map(d=>({id:d.id,...d.data()})).filter(r=>r.type==='ferie_permesso'&&r.status==='in_attesa').sort((a,b)=>String(b.createdAt||'').localeCompare(String(a.createdAt||'')));window._rows=rows;statTot.textContent=rows.length;statAss.textContent=rows.filter(r=>r.requestKind!=='ore').length;heroSub.textContent=rows.length?'Hai '+rows.length+' richieste da controllare.':'Non ci sono richieste in attesa.';render(rows);});window.approve=approve;window.openReject=openReject;</script>
<script type="module">
  import { requireAuth } from "./auth-guard.js";
  requireAuth({ redirect: "login.html" });
</script>
</body></html>
