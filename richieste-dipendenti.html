<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Richieste dipendenti</title>

<style>
body{
margin:0;
font-family:-apple-system;
background:#eef3f0;
color:#1f3c35;
}

.app{
max-width:430px;
margin:auto;
padding:14px;
}

/* HEADER */
.header{
font-size:26px;
font-weight:900;
}

.sub{
font-size:14px;
opacity:.6;
margin-bottom:14px;
}

/* CARD */
.card{
background:white;
border-radius:22px;
padding:16px;
margin-bottom:12px;
box-shadow:0 8px 20px rgba(0,0,0,.06);
border-left:6px solid;
}

/* TIPI */
.permesso{ border-color:#3d73d1; }
.assenza{ border-color:#d6a43a; }
.ferie{ border-color:#7d67d7; }

.name{
font-size:18px;
font-weight:900;
margin-bottom:4px;
}

.type{
font-size:12px;
opacity:.6;
margin-bottom:10px;
text-transform:capitalize;
}

/* FOCUS */
.big{
font-size:30px;
font-weight:900;
margin-bottom:4px;
}

.small{
font-size:14px;
opacity:.6;
margin-bottom:12px;
}

/* BOTTONI */
.actions{
display:flex;
gap:8px;
}

.btn{
flex:1;
padding:12px;
border:none;
border-radius:14px;
font-weight:900;
cursor:pointer;
}

.approve{
background:#3e8b61;
color:white;
}

.reject{
background:#ff5c5c;
color:white;
}

/* EMPTY */
.empty{
text-align:center;
padding:30px;
opacity:.6;
}

/* MODAL */
.modal{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
border-radius:20px 20px 0 0;
padding:16px;
display:none;
box-shadow:0 -10px 30px rgba(0,0,0,.1);
}

textarea{
width:100%;
min-height:90px;
border-radius:12px;
border:1px solid #ddd;
padding:10px;
margin-top:10px;
margin-bottom:10px;
}

/* TOAST */
.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
padding:10px 16px;
border-radius:12px;
display:none;
font-size:14px;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyB7p69J89r5Kwu2YgawkBb9omjojdM4HTM",
authDomain:"farmaciamontesano.firebaseapp.com",
projectId:"farmaciamontesano",
storageBucket:"farmaciamontesano.firebasestorage.app",
messagingSenderId:"881461241551",
appId:"1:881461241551:web:c74d6ee74cb857fa5179ba"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
</script>
</head>

<body>

<div class="app">

<div class="header">Richieste</div>
<div class="sub">Permessi, assenze e ferie</div>

<div id="list"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<b>Motivo rifiuto</b>
<textarea id="motivo"></textarea>
<button class="btn reject" onclick="confirmReject()">Conferma rifiuto</button>
</div>

<div class="toast" id="toast">Fatto</div>

<script>

let rejectId=null;

function showToast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",1500);
}

function getType(d){
if(d.requestKind==="ore") return "permesso";
if(d.requestKind==="giornata") return "assenza";
if(d.requestKind==="ferie") return "ferie";
}

function getMain(d){
if(d.requestKind==="ore"){
return {big:`${d.fromHour} - ${d.toHour}`,small:d.day};
}
if(d.requestKind==="giornata"){
return {big:d.day,small:"Assenza giornata"};
}
if(d.requestKind==="ferie"){
return {big:`${d.fromDate} → ${d.toDate}`,small:"Ferie"};
}
return {big:"",small:""};
}

function approve(id){
db.collection("employee_requests").doc(id).update({
status:"approvata"
});
showToast("Approvata");
}

function openReject(id){
rejectId=id;
document.getElementById("modal").style.display="block";
}

function confirmReject(){
let motivo=document.getElementById("motivo").value;

db.collection("employee_requests").doc(rejectId).update({
status:"negata",
ownerReason:motivo
});

document.getElementById("modal").style.display="none";
showToast("Rifiutata");
}

function load(){

db.collection("employee_requests")
.onSnapshot(snapshot=>{

let html="";

snapshot.docs.forEach(doc=>{
let d=doc.data();

if(d.type!=="ferie_permesso") return;
if(d.status!=="in_attesa") return;

let type=getType(d);
let main=getMain(d);

html+=`
<div class="card ${type}">

<div class="name">${d.employeeName}</div>
<div class="type">${type}</div>

<div class="big">${main.big}</div>
<div class="small">${main.small}</div>

<div class="actions">
<button class="btn approve" onclick="approve('${doc.id}')">Approva</button>
<button class="btn reject" onclick="openReject('${doc.id}')">Rifiuta</button>
</div>

</div>
`;
});

document.getElementById("list").innerHTML=
html || "<div class='empty'>Nessuna richiesta 👍</div>";

});
}

load();

</script>

</body>
</html>
