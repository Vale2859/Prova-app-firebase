<!DOCTYPE html>
<html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Obiettivi LDF</title>
<style>
:root{--bg:#eef3f0;--card:#fff;--card-soft:#f5f8f6;--line:#dfe7e3;--text:#1f3c35;--muted:#6f837c;--green:#3e8b61;--green-2:#66b187;--shadow:0 10px 25px rgba(0,0,0,.06)}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;-webkit-tap-highlight-color:transparent}
body{background:linear-gradient(180deg,#f4f7f5,#e9efec);color:var(--text)}
.app{max-width:430px;margin:auto;padding:14px}.back{display:inline-flex;align-items:center;gap:8px;text-decoration:none;color:var(--text);font-weight:900;margin-bottom:12px}.section{background:#fff;border-radius:22px;padding:16px;box-shadow:var(--shadow);border:1px solid var(--line)}.section-title{font-size:22px;font-weight:900;margin-bottom:8px}.section-sub{font-size:14px;color:var(--muted);font-weight:700;margin-bottom:14px}.big-kpi{background:linear-gradient(135deg,var(--green),var(--green-2));color:#fff;border-radius:22px;padding:18px;box-shadow:var(--shadow)}.big-kpi strong{display:block;font-size:44px;line-height:1;font-weight:900;margin-bottom:8px}.big-kpi span{display:block;font-size:14px;font-weight:700;opacity:.95}.bar{height:14px;border-radius:999px;background:#e6efea;overflow:hidden;border:1px solid var(--line);margin-top:10px}.bar>div{height:100%;background:#fff;border-radius:999px}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}.stat{background:var(--card-soft);border:1px solid var(--line);border-radius:18px;padding:14px}.stat strong{display:block;font-size:28px;line-height:1;font-weight:900;margin-bottom:6px}.stat span{font-size:13px;color:var(--muted);font-weight:700}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyB7p69J89r5Kwu2YgawkBb9omjojdM4HTM",authDomain:"farmaciamontesano.firebaseapp.com",projectId:"farmaciamontesano",storageBucket:"farmaciamontesano.firebasestorage.app",messagingSenderId:"881461241551",appId:"1:881461241551:web:c74d6ee74cb857fa5179ba"}; if(!firebase.apps.length) firebase.initializeApp(firebaseConfig); const db=firebase.firestore(); const EMPLOYEE_STORAGE_KEY='fm_employee_session_v1'; function getSession(){try{return JSON.parse(localStorage.getItem(EMPLOYEE_STORAGE_KEY)||'null')}catch(e){return null}} function requireSession(){const s=getSession(); if(!s){window.location.href='dipendenti-login.html'; throw new Error('no session')} return s}
</script>
</head><body><div class="app"><a class="back" href="dipendenti.html">← Torna alla home</a><div class="section"><div class="section-title">Obiettivi LDF</div><div class="section-sub">Grande, leggibile e immediato. Pensato per vedere tutto in pochi secondi.</div><div class="big-kpi"><strong id="ldfValue">—</strong><span id="ldfText">Caricamento dati…</span><div class="bar"><div id="ldfBar" style="width:0%"></div></div></div><div class="stats"><div class="stat"><strong id="actualAverage">—</strong><span>Media attuale</span></div><div class="stat"><strong id="targetAverage">—</strong><span>Media obiettivo</span></div><div class="stat"><strong id="projectionValue">—</strong><span>Previsione</span></div><div class="stat"><strong id="groupGoalValue">—</strong><span>Obiettivo gruppo</span></div></div></div></div>
<script>
(async function(){ const session=requireSession(); try{ const doc=await db.collection('employee_ldf').doc(session.id).get(); const data=doc.exists?doc.data():{actualAverage:0,targetAverage:0,projection:0,groupGoal:0}; const actual=Number(data.actualAverage||0), target=Number(data.targetAverage||0), percent=target>0?Math.min(100,Math.round((actual/target)*100)):0; document.getElementById('ldfValue').textContent=`${percent}%`; document.getElementById('ldfText').textContent=target>0?`Stai lavorando a ${actual.toFixed(1)} su un obiettivo di ${target.toFixed(1)}`:'Obiettivo non ancora impostato'; document.getElementById('ldfBar').style.width=`${percent}%`; document.getElementById('actualAverage').textContent=actual.toFixed(1); document.getElementById('targetAverage').textContent=target.toFixed(1); document.getElementById('projectionValue').textContent=Number(data.projection||0).toFixed(1); document.getElementById('groupGoalValue').textContent=Number(data.groupGoal||0).toFixed(1); }catch(e){ console.error(e); document.getElementById('ldfText').textContent='Errore nel caricamento degli obiettivi.'; } })();
</script></body></html>
