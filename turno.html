<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Farmacie di turno | Matera</title>

<link rel="stylesheet" href="style.css">

<style>
body{
  font-family: -apple-system, sans-serif;
  background: linear-gradient(135deg,#eaf4ef,#f7fbf9);
  margin:0;
}

.container{
  max-width:600px;
  margin:auto;
  padding:20px;
}

.card{
  background:#fff;
  border-radius:25px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.badge{
  display:inline-block;
  background:#dff3ea;
  padding:6px 14px;
  border-radius:999px;
  font-weight:700;
  margin-bottom:10px;
}

.title{
  font-size:32px;
  font-weight:900;
  margin:10px 0;
}

.subtitle{
  color:#666;
}

.btn{
  display:block;
  width:100%;
  text-align:center;
  padding:14px;
  border-radius:15px;
  background:#eaf4ef;
  margin-top:10px;
  font-weight:700;
  text-decoration:none;
  color:#000;
}

.list-card{
  background:#fff;
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
}

.date{
  font-size:14px;
  color:#777;
}

.appoggio{
  margin-top:8px;
  font-weight:600;
  color:#555;
}
</style>
</head>

<body>

<div class="container">

<h2>Farmacie di turno a Matera</h2>

<div id="oggi" class="card"></div>

<h3>Prossimi 7 turni</h3>
<div id="lista"></div>

</div>

<script src="turni_2026_matera.js"></script>

<script>

function formatDate(date){
  return date.toISOString().split("T")[0];
}

function getOggi(){
  const oggi = new Date();
  return formatDate(oggi);
}

function trovaTurno(data){
  return TURNI_2026.find(t => t.data === data);
}

function renderOggi(){
  const oggi = getOggi();
  const turno = trovaTurno(oggi);

  if(!turno){
    document.getElementById("oggi").innerHTML = "Nessun turno trovato";
    return;
  }

  document.getElementById("oggi").innerHTML = `
    <div class="badge">Farmacia di turno</div>
    <div class="title">${turno.turno}</div>
    <div class="subtitle">Farmacia principale della giornata</div>

    ${turno.appoggio ? `<div class="appoggio">Appoggio: ${turno.appoggio}</div>` : ""}

    <a class="btn" href="#">Apri Maps</a>
  `;
}

function renderLista(){
  const oggi = new Date();
  let html = "";

  for(let i=1;i<=7;i++){
    const data = new Date();
    data.setDate(oggi.getDate()+i);

    const giorno = formatDate(data);
    const turno = trovaTurno(giorno);

    if(turno){
      html += `
        <div class="list-card">
          <div class="date">${giorno}</div>
          <div class="title" style="font-size:22px">${turno.turno}</div>
          ${turno.appoggio ? `<div class="appoggio">Appoggio: ${turno.appoggio}</div>` : ""}
        </div>
      `;
    }
  }

  document.getElementById("lista").innerHTML = html;
}

renderOggi();
renderLista();

</script>

</body>
</html>
