<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Farmacia di turno</title>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  text-align: center;
}

.box {
  background: white;
  margin: 15px;
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.turno {
  font-size: 28px;
  font-weight: bold;
  color: #0a7c4a;
}

.appoggio {
  color: #666;
}

.prossimi div {
  padding: 12px;
  border-bottom: 1px solid #eee;
}
</style>

</head>
<body>

<div class="box">
  <h2>Farmacia di turno</h2>
  <div id="turno" class="turno">-</div>
  <div id="appoggio" class="appoggio"></div>
</div>

<div class="box">
  <h3>Prossimi 7 turni</h3>
  <div id="prossimi" class="prossimi"></div>
</div>

<script type="module">
import { db, ref, get } from './firebase.js';

function getData(offset = 0) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toISOString().split('T')[0];
}

async function caricaTurno() {
  const oggi = getData();

  const snap = await get(ref(db, "turni/" + oggi));
  const t = snap.val();

  if (t) {
    document.getElementById("turno").innerText = t.turno;
    document.getElementById("appoggio").innerText =
      t.appoggio ? "Appoggio: " + t.appoggio : "";
  } else {
    document.getElementById("turno").innerText = "Nessun turno";
  }
}

async function caricaProssimi() {
  const box = document.getElementById("prossimi");

  for (let i = 1; i <= 7; i++) {
    const data = getData(i);

    const snap = await get(ref(db, "turni/" + data));
    const t = snap.val();

    if (t) {
      box.innerHTML += `
        <div>
          <strong>${data}</strong><br>
          ${t.turno}
          ${t.appoggio ? `<br><small>Appoggio: ${t.appoggio}</small>` : ""}
        </div>
      `;
    }
  }
}

caricaTurno();
caricaProssimi();
</script>

</body>
</html>
