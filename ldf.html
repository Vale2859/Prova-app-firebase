<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obiettivi LDF</title>

<style>
:root{
  --bg:#eef3f0;
  --card:#fff;
  --line:#dde5e0;
  --text:#1f3c35;
  --muted:#6f837c;
  --green:#3e8b61;
  --green2:#66b187;
  --red:#ff6b5f;
  --shadow:0 10px 25px rgba(0,0,0,.06);
}

body{
  margin:0;
  font-family:-apple-system, sans-serif;
  background:linear-gradient(180deg,#f4f7f5,#e9efec);
}

.app{
  max-width:430px;
  margin:auto;
  padding:14px;
}

.hero{
  background:linear-gradient(135deg,#1f5a40,#3e8b61,#66b187);
  color:#fff;
  border-radius:26px;
  padding:18px;
  margin-bottom:14px;
}

.hero h1{
  font-size:26px;
  margin:0;
}

.hero p{
  font-size:14px;
  opacity:.9;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card{
  background:#fff;
  border-radius:18px;
  padding:14px;
  border:1px solid var(--line);
  box-shadow:var(--shadow);
}

.big{
  font-size:28px;
  font-weight:900;
}

.label{
  font-size:13px;
  color:var(--muted);
  font-weight:700;
}

.full{
  grid-column:1 / -1;
}

.highlight{
  background:linear-gradient(135deg,#f5fff9,#e8f7ee);
  border:1px solid #cce9da;
}

.red{
  background:linear-gradient(135deg,#fff3f2,#ffe6e3);
  border:1px solid #ffd0cc;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB7p...",
  authDomain: "farmaciamontesano.firebaseapp.com",
  projectId: "farmaciamontesano"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const session = JSON.parse(localStorage.getItem("fm_employee_session_v1"));

if(!session){
  alert("Devi fare login");
  location.href = "dipendenti-login.html";
}
</script>
</head>

<body>

<div class="app">

<div class="hero">
  <h1 id="name">Caricamento...</h1>
  <p>Obiettivi mensili</p>
</div>

<div class="grid">

<div class="card">
  <div class="big" id="done">0</div>
  <div class="label">Fatto</div>
</div>

<div class="card">
  <div class="big" id="media">0</div>
  <div class="label">Media giornaliera</div>
</div>

<div class="card highlight">
  <div class="big" id="mancamin">0</div>
  <div class="label">Manca al minimo</div>
</div>

<div class="card highlight">
  <div class="big" id="mancamax">0</div>
  <div class="label">Manca al massimo</div>
</div>

<div class="card red">
  <div class="big" id="ritmo">0</div>
  <div class="label">Ritmo necessario</div>
</div>

<div class="card full">
  <div class="big" id="previsione">0</div>
  <div class="label">Previsione fine mese</div>
</div>

<div class="card full">
  <div class="big" id="gruppo">0</div>
  <div class="label">Gruppo</div>
</div>

</div>

</div>

<script>

function calcola(d){

  const media = (d.done / d.giorniPassati).toFixed(1);

  const mancaMin = Math.max(0, d.min - d.done);
  const mancaMax = Math.max(0, d.max - d.done);

  const giorniRestanti = d.giorniTotali - d.giorniPassati;

  const ritmo = giorniRestanti > 0
    ? (mancaMin / giorniRestanti).toFixed(1)
    : 0;

  const previsione = (media * d.giorniTotali).toFixed(0);

  return {media,mancaMin,mancaMax,ritmo,previsione};
}

db.collection("ldf_data")
.where("employeeId","==",session.id)
.onSnapshot(snap=>{

  snap.forEach(doc=>{
    const d = doc.data();
    const c = calcola(d);

    document.getElementById("name").innerText = d.employeeName;

    document.getElementById("done").innerText = d.done;
    document.getElementById("media").innerText = c.media;
    document.getElementById("mancamin").innerText = c.mancaMin;
    document.getElementById("mancamax").innerText = c.mancaMax;
    document.getElementById("ritmo").innerText = c.ritmo;
    document.getElementById("previsione").innerText = c.previsione;
    document.getElementById("gruppo").innerText = d.gruppo;

  });

});

</script>

</body>
</html>
