<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>LDF</title><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script><script src="internal-common.js"></script><style>:root{--bg:#eef3f0;--card:#fff;--line:#dde5e0;--text:#1f3c35;--muted:#6f837c;--green:#3e8b61;--green2:#66b187;--green-dark:#1d5a40;--shadow:0 12px 28px rgba(0,0,0,.07)}*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif}html,body{margin:0}body{background:linear-gradient(180deg,#f4f7f5,#e9efec);color:var(--text)}.app{width:min(100%,430px);margin:0 auto;padding:14px 14px 24px}.hero{background:linear-gradient(135deg,var(--green-dark),var(--green),var(--green2));color:#fff;border-radius:28px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}.back{display:inline-flex;align-items:center;gap:8px;text-decoration:none;color:#fff;font-size:16px;font-weight:900;margin-bottom:12px}.hero-title{font-size:28px;font-weight:900;margin:0 0 8px}.hero-sub{font-size:14px;opacity:.95;font-weight:700;margin:0 0 14px}.hero-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.hero-stat{min-height:78px;border-radius:18px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.15);padding:12px;display:flex;flex-direction:column;justify-content:space-between}.hero-stat strong{font-size:28px;font-weight:900}.hero-stat span{font-size:12px;font-weight:800}.section{background:#fff;border-radius:24px;padding:16px;border:1px solid var(--line);box-shadow:var(--shadow)}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.card{background:#fff;border-radius:22px;padding:16px;border:1px solid var(--line);box-shadow:var(--shadow)}.sub{font-size:12px;color:var(--muted);margin-top:4px}.kpi{font-size:28px;font-weight:900}</style></head><body><div class="app"><section class="hero"><a class="back" href="operatori.html">← Torna</a><div class="hero-title">Obiettivi LDF</div><div class="hero-sub" id="heroSub">I tuoi risultati del mese.</div><div class="hero-stats"><div class="hero-stat"><strong id="doneBox">0</strong><span>Fatto</span></div><div class="hero-stat"><strong id="updBox">—</strong><span>Aggiornato</span></div></div></section><div class="section"><div class="grid"><div class="card"><div class="kpi" id="minBox">0</div><div class="sub">Manca al minimo</div></div><div class="card"><div class="kpi" id="maxBox">0</div><div class="sub">Manca al massimo</div></div><div class="card"><div class="kpi" id="avgBox">0</div><div class="sub">Media attuale</div></div><div class="card"><div class="kpi" id="paceBox">0</div><div class="sub">Ritmo necessario</div></div><div class="card" style="grid-column:1/-1"><div class="kpi" id="forecastBox">0</div><div class="sub">Previsione fine mese</div></div><div class="card" style="grid-column:1/-1"><div class="kpi" id="groupBox">0%</div><div class="sub">Gruppo</div></div></div></div></div><script>const A=window.InternalApp,s=A.requireEmployeeSession();async function load(){const key=A.monthKey();const settings=await A.getDocSafe('ldf_settings','current')||{minPersonal:121,maxPersonal:150,groupMonthlyTarget:450};const monthly=await A.getDocSafe('ldf_monthly',key)||{employees:{},giorniPassati:1,giorniTotali:26,groupDone:0};const person=(monthly.employees&&monthly.employees[s.id])||{name:s.name,done:0};const done=Number(person.done||0), min=Number(settings.minPersonal||121), max=Number(settings.maxPersonal||150), gp=Number(monthly.giorniPassati||1), gt=Number(monthly.giorniTotali||26), avg=(done/Math.max(gp,1)), mancaMin=Math.max(0,min-done), mancaMax=Math.max(0,max-done), rem=Math.max(gt-gp,0), pace=rem>0?(mancaMin/rem):0, forecast=Math.round(avg*gt), groupPerc=settings.groupMonthlyTarget?Math.round((Number(monthly.groupDone||0)/Number(settings.groupMonthlyTarget))*100):0;heroSub.textContent=s.name+' • '+A.monthLabel(key);doneBox.textContent=done;updBox.textContent=monthly.updatedAt?A.fmtDateIT(monthly.updatedAt.slice(0,10)):'—';minBox.textContent=mancaMin;maxBox.textContent=mancaMax;avgBox.textContent=avg.toFixed(1);paceBox.textContent=pace.toFixed(1);forecastBox.textContent=forecast;groupBox.textContent=groupPerc+'%';}load();</script></body></html>
