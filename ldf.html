<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obiettivi LDF</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:#eef3f0;
  color:#16352f;
}

/* HEADER */
.header{
  padding:18px;
  font-weight:800;
}

/* CONTENUTO */
.container{
  padding:18px;
}

/* CARD PRINCIPALE */
.main-card{
  background:linear-gradient(135deg,#2f7a57,#6bc28f);
  color:white;
  border-radius:22px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.nome{
  font-size:14px;
  opacity:.8;
  font-weight:700;
}

.big{
  font-size:52px;
  font-weight:900;
  margin-top:6px;
}

.percent{
  font-size:20px;
  opacity:.9;
}

.status{
  margin-top:10px;
  padding:10px;
  border-radius:12px;
  background:rgba(255,255,255,.2);
  font-weight:800;
  display:inline-block;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:18px;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:16px;
  box-shadow:0 6px 15px rgba(0,0,0,.05);
}

.value{
  font-size:24px;
  font-weight:900;
}

.label{
  font-size:13px;
  opacity:.6;
  font-weight:700;
}

/* BOX INTELLIGENTE */
.smart{
  margin-top:16px;
  background:#e6f4ec;
  border-radius:16px;
  padding:14px;
  font-weight:700;
}

/* GRUPPO */
.group{
  margin-top:16px;
  background:#fff;
  border-radius:20px;
  padding:18px;
}

.progress{
  height:10px;
  background:#ddd;
  border-radius:10px;
  margin-top:10px;
  overflow:hidden;
}

.bar{
  height:100%;
  background:linear-gradient(90deg,#3e8b61,#6bc28f);
}
</style>
</head>

<body>

<div class="header" onclick="history.back()">← Torna</div>

<div class="container">

  <div class="main-card">
    <div class="nome" id="nome">...</div>
    <div class="big" id="pezzi">0</div>
    <div class="percent" id="percentuale">0%</div>
    <div class="status" id="stato">Caricamento...</div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="value" id="min">0</div>
      <div class="label">Obiettivo minimo</div>
    </div>

    <div class="card">
      <div class="value" id="max">0</div>
      <div class="label">Obiettivo massimo</div>
    </div>

    <div class="card">
      <div class="value" id="media">0</div>
      <div class="label">Media attuale</div>
    </div>

    <div class="card">
      <div class="value" id="ritmo">0</div>
      <div class="label">Ritmo necessario</div>
    </div>
  </div>

  <div class="smart" id="smartBox">
    ...
  </div>

  <div class="group">
    <b>Obiettivo di gruppo</b>
    <div id="gruppoTxt"></div>
    <div class="progress">
      <div class="bar" id="gruppoBar"></div>
    </div>
  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB7p69J89r5Kwu2YgawkBb9omjojdM4HTM",
  authDomain: "farmaciamontesano.firebaseapp.com",
  projectId: "farmaciamontesano"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* 👇 PRENDE UTENTE DAL LOGIN */
const user = localStorage.getItem("user");

if(!user){
  alert("Devi fare il login");
  window.location.href = "login.html";
}

/* 🔥 LETTURA DATI */
db.collection("ldf_obiettivi").doc(user).onSnapshot(doc => {

  if(!doc.exists){
    document.getElementById("stato").innerText = "Nessun dato";
    return;
  }

  const d = doc.data();

  let percent = Math.round((d.pezziFatti / d.obiettivoMax) * 100);

  let giorniRestanti = d.giorniLavorativi - d.giorniPassati;
  let ritmo = (d.obiettivoMin - d.pezziFatti) / giorniRestanti;
  ritmo = ritmo > 0 ? ritmo.toFixed(1) : 0;

  /* 🔥 STATO INTELLIGENTE */
  let stato = "";
  if(percent >= 70) stato = "Sei in linea 👍";
  else if(percent >= 40) stato = "Occhio ⚠️";
  else stato = "Spingi 🚀";

  /* 🔥 BOX INTELLIGENTE */
  let previsione = d.mediaAttuale * d.giorniLavorativi;
  previsione = Math.round(previsione);

  let smart = "";
  if(previsione >= d.obiettivoMax)
    smart = "Stai andando fortissimo 🔥";
  else if(previsione >= d.obiettivoMin)
    smart = "Continua così 👍";
  else
    smart = "Aumenta il ritmo 🚀";

  /* GRUPPO */
  let gruppoPerc = Math.round((d.gruppoFatti / d.gruppoTotale) * 100);

  /* UI */
  document.getElementById("nome").innerText = d.nome;
  document.getElementById("pezzi").innerText = d.pezziFatti + " pezzi";
  document.getElementById("percentuale").innerText = percent + "%";
  document.getElementById("stato").innerText = stato;

  document.getElementById("min").innerText = d.obiettivoMin;
  document.getElementById("max").innerText = d.obiettivoMax;
  document.getElementById("media").innerText = d.mediaAttuale;
  document.getElementById("ritmo").innerText = ritmo;

  document.getElementById("smartBox").innerText =
    "Previsione fine mese: " + previsione + " pezzi → " + smart;

  document.getElementById("gruppoTxt").innerText =
    d.gruppoFatti + " / " + d.gruppoTotale + " (" + gruppoPerc + "%)";

  document.getElementById("gruppoBar").style.width = gruppoPerc + "%";

});
</script>

</body>
</html>
