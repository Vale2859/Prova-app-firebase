<!DOCTYPE html>
<html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>In lavorazione</title>
<style>
:root{--bg:#eef3f0;--card:#fff;--card-soft:#f5f8f6;--line:#dfe7e3;--text:#1f3c35;--muted:#6f837c;--green:#3e8b61;--green-2:#66b187;--shadow:0 10px 25px rgba(0,0,0,.06)}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;-webkit-tap-highlight-color:transparent}
body{background:linear-gradient(180deg,#f4f7f5,#e9efec);color:var(--text)}
.app{max-width:430px;margin:auto;padding:14px}.section{background:#fff;border-radius:22px;padding:16px;box-shadow:var(--shadow);border:1px solid var(--line)}.section-title{font-size:22px;font-weight:900;margin-bottom:8px}.section-sub{font-size:14px;color:var(--muted);font-weight:700;margin-bottom:14px}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}.stat{background:var(--card-soft);border:1px solid var(--line);border-radius:18px;padding:14px}.stat strong{display:block;font-size:28px;line-height:1;font-weight:900;margin-bottom:6px}.stat span{font-size:13px;color:var(--muted);font-weight:700}.list{display:grid;gap:10px}.item{background:var(--card-soft);border:1px solid var(--line);border-radius:18px;padding:14px}.item-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}.item-title{font-size:17px;font-weight:900;line-height:1.1}.item-sub{font-size:14px;color:var(--muted);font-weight:700;line-height:1.2}.status{display:inline-flex;align-items:center;min-height:28px;padding:0 10px;border-radius:999px;font-size:12px;font-weight:900}.status.pending{background:#fff1d9;color:#9b6610}.status.approved{background:#e6f7ec;color:#227249}.status.rejected{background:#fde7e6;color:#b6433b}.status.working{background:#e8f0fb;color:#2f5f97}.small{font-size:13px;color:var(--muted);font-weight:700}.back{display:inline-flex;align-items:center;gap:8px;text-decoration:none;color:var(--text);font-weight:900;margin-bottom:12px}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyB7p69J89r5Kwu2YgawkBb9omjojdM4HTM",authDomain:"farmaciamontesano.firebaseapp.com",projectId:"farmaciamontesano",storageBucket:"farmaciamontesano.firebasestorage.app",messagingSenderId:"881461241551",appId:"1:881461241551:web:c74d6ee74cb857fa5179ba"}; if(!firebase.apps.length) firebase.initializeApp(firebaseConfig); const db=firebase.firestore(); const EMPLOYEE_STORAGE_KEY='fm_employee_session_v1'; function getSession(){try{return JSON.parse(localStorage.getItem(EMPLOYEE_STORAGE_KEY)||'null')}catch(e){return null}} function requireSession(){const s=getSession(); if(!s){window.location.href='dipendenti-login.html'; throw new Error('no session')} return s} function fmtDate(dateStr){if(!dateStr) return '—'; const d=new Date(dateStr+'T00:00:00'); return d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});} function statusLabel(status){return ({in_attesa:'In attesa',approvata:'Accettata',negata:'Rifiutata',in_lavorazione:'In lavorazione'})[status]||status||'—';} function statusClass(status){return ({in_attesa:'pending',approvata:'approved',negata:'rejected',in_lavorazione:'working'})[status]||'pending';} async function loadEmployeeRequests(employeeId){try{const snap=await db.collection('employee_requests').where('employeeId','==',employeeId).get(); return snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>String(b.createdAt||'').localeCompare(String(a.createdAt||'')));}catch(e){console.error(e); return [];}}
</script>
</head><body><div class="app"><a class="back" href="dipendenti.html">← Torna alla home</a><div class="section"><div class="section-title">Le tue richieste</div><div class="section-sub">Qui vedi tutto: quante fatte, quante accettate, quante rifiutate e il motivo se il titolare lo ha scritto.</div><div class="stats"><div class="stat"><strong id="totalCount">0</strong><span>Totali</span></div><div class="stat"><strong id="pendingCount">0</strong><span>In attesa</span></div><div class="stat"><strong id="approvedCount">0</strong><span>Accettate</span></div><div class="stat"><strong id="rejectedCount">0</strong><span>Rifiutate</span></div></div><div class="list" id="requestsList"></div></div></div>
<script>
(async function(){ const session=requireSession(); async function refresh(){ const requests=await loadEmployeeRequests(session.id); document.getElementById('totalCount').textContent=requests.length; document.getElementById('pendingCount').textContent=requests.filter(x=>x.status==='in_attesa').length; document.getElementById('approvedCount').textContent=requests.filter(x=>x.status==='approvata').length; document.getElementById('rejectedCount').textContent=requests.filter(x=>x.status==='negata').length; const list=document.getElementById('requestsList'); if(!requests.length){ list.innerHTML=`<div class="item"><div class="item-title">Nessuna richiesta ancora inviata</div><div class="item-sub">Quando invii ferie, permessi o consumabili li vedrai qui.</div></div>`; return; } list.innerHTML=requests.map(r=>{ let title='Richiesta', sub=''; if(r.type==='consumabile'){ title='Consumabili'; sub=(r.items||[]).map(x=>`${x.name} x${x.qty}`).join(', ');} else { if(r.requestKind==='ferie') sub=`Ferie dal ${fmtDate(r.fromDate)} al ${fmtDate(r.toDate)}`; if(r.requestKind==='giornata') sub=`Permesso giornata: ${fmtDate(r.day)}`; if(r.requestKind==='ore') sub=`Permesso ore: ${fmtDate(r.day)} · ${r.fromHour||'—'}-${r.toHour||'—'}`; } const owner=r.ownerReason?`<div class="item-sub" style="margin-top:8px;color:#b6433b">Motivo titolare: ${r.ownerReason}</div>`:''; return `<div class="item"><div class="item-head"><div><div class="item-title">${title}</div><div class="item-sub">${sub||'—'}</div></div><div class="status ${statusClass(r.status)}">${statusLabel(r.status)}</div></div><div class="small">Inviata il ${fmtDate(r.createdDate)} alle ${r.createdTime||'—'}</div>${owner}</div>`; }).join(''); } refresh(); })();
</script></body></html>
