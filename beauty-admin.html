<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Beauty Admin | Farmacia Montesano</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="mobile.css" />

  <style>
    :root{
      --admin-bg: linear-gradient(180deg, #f5f7f6 0%, #eef4f1 100%);
      --admin-card: rgba(255,255,255,0.86);
      --admin-card-strong: rgba(255,255,255,0.96);
      --admin-border: rgba(20, 55, 48, 0.08);
      --admin-text: #16372f;
      --admin-muted: #6f817b;
      --admin-green-1: #2f7f5f;
      --admin-green-2: #86c58b;
      --admin-shadow: 0 18px 44px rgba(16, 49, 39, 0.08);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background: var(--admin-bg);
      color: var(--admin-text);
    }

    .admin-shell {
      width: 100%;
      max-width: 920px;
      margin: 0 auto;
      padding: 18px 16px 110px;
    }

    .admin-brand-card,
    .admin-panel,
    .admin-list-card,
    .admin-form-card {
      border: 1px solid var(--admin-border);
      box-shadow: var(--admin-shadow);
      background: rgba(255,255,255,0.86);
    }

    .admin-brand-card {
      border-radius: 34px;
      padding: 22px 20px;
      margin-bottom: 18px;
      background: var(--admin-card-strong);
    }

    .admin-logo {
      width: 100%;
      max-width: 270px;
      display: block;
    }

    .admin-topbar {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 18px;
    }

    .admin-back-btn {
      width: 76px;
      height: 76px;
      border-radius: 24px;
      background: rgba(255,255,255,0.92);
      border: 1px solid var(--admin-border);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #16372f;
      font-size: 38px;
      box-shadow: var(--admin-shadow);
      flex-shrink: 0;
    }

    .admin-title-block { flex: 1; }

    .admin-title-block h1 {
      margin: 0 0 8px;
      font-size: 48px;
      line-height: .96;
      letter-spacing: -0.05em;
      color: #10352e;
    }

    .admin-title-block p {
      margin: 0;
      font-size: 17px;
      line-height: 1.42;
      color: var(--admin-muted);
      max-width: 560px;
    }

    .admin-panel {
      border-radius: 28px;
      padding: 16px;
      margin-bottom: 18px;
    }

    .admin-panel-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .admin-primary-btn,
    .admin-secondary-btn,
    .admin-small-btn,
    .admin-small-btn-danger,
    .image-action-btn {
      min-height: 52px;
      padding: 0 18px;
      border: none;
      border-radius: 18px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .admin-primary-btn {
      background: linear-gradient(135deg, var(--admin-green-1) 0%, var(--admin-green-2) 100%);
      color: #fff;
      box-shadow: 0 12px 24px rgba(73,165,120,0.22);
    }

    .admin-secondary-btn,
    .image-action-btn {
      background: #eef4f1;
      color: #16372f;
    }

    .admin-form-card {
      border-radius: 28px;
      padding: 18px 16px;
      margin-bottom: 18px;
      display: none;
    }

    .admin-form-card.show { display: block; }

    .admin-form-title {
      margin: 0 0 14px;
      font-size: 28px;
      line-height: 1.02;
      letter-spacing: -0.04em;
      color: #10352e;
    }

    .admin-form-grid {
      display: grid;
      grid-template-columns: repeat(2,minmax(0,1fr));
      gap: 12px;
    }

    .admin-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .admin-field.full {
      grid-column: 1 / -1;
    }

    .admin-field label {
      font-size: 14px;
      font-weight: 700;
      color: #34544b;
    }

    .admin-field input,
    .admin-field textarea {
      width: 100%;
      min-height: 50px;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(20,55,48,0.10);
      background: #fff;
      font: inherit;
      color: #16372f;
      outline: none;
    }

    .admin-field textarea {
      min-height: 120px;
      resize: vertical;
    }

    .admin-check-row {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      align-items: center;
      min-height: 50px;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(20,55,48,0.10);
      background: #fff;
    }

    .admin-check {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      color: #16372f;
      font-weight: 700;
    }

    .admin-check input {
      width: 18px;
      height: 18px;
      min-height: auto;
      padding: 0;
      margin: 0;
    }

    .admin-preview {
      width: 100%;
      max-width: 180px;
      height: 180px;
      border-radius: 22px;
      object-fit: cover;
      background: #e8efeb;
      border: 1px solid rgba(20,55,48,0.08);
      display: block;
    }

    .admin-form-footer {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .admin-list-card {
      border-radius: 28px;
      overflow: hidden;
    }

    .admin-item {
      display: flex;
      gap: 14px;
      padding: 16px;
      border-bottom: 1px solid rgba(18,55,45,0.06);
    }

    .admin-item:last-child { border-bottom: 0; }

    .admin-item-image {
      width: 118px;
      height: 118px;
      border-radius: 20px;
      object-fit: cover;
      flex-shrink: 0;
      background: #e8efeb;
    }

    .admin-item-body {
      flex: 1;
      min-width: 0;
    }

    .admin-item-title {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.08;
      color: #16372f;
    }

    .admin-item-sub {
      margin: 0 0 10px;
      font-size: 15px;
      line-height: 1.4;
      color: var(--admin-muted);
    }

    .admin-chip-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .admin-chip {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      background: #e9f3ec;
      color: #2d6d56;
      font-size: 14px;
      font-weight: 800;
    }

    .admin-item-footer {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .admin-toggle-pill {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      border: none;
    }

    .admin-toggle-pill.active {
      background: #e8f3e9;
      color: #2f7f5f;
    }

    .admin-toggle-pill.hidden {
      background: #f0f0f0;
      color: #6e7b76;
    }

    .admin-small-btn {
      border: 1px solid rgba(18,55,45,0.08);
      background: #f4f6f5;
      color: #16372f;
      font-size: 15px;
      font-weight: 700;
    }

    .admin-small-btn-danger {
      border: 1px solid rgba(18,55,45,0.08);
      background: #f4f6f5;
      color: #c95b67;
      font-size: 15px;
      font-weight: 700;
    }

    .admin-empty {
      padding: 28px 18px;
      text-align: center;
      color: var(--admin-muted);
      font-size: 16px;
    }

    .image-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .image-hidden-input {
      display: none;
    }

    .image-search-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.62);
      display: none;
      align-items: flex-end;
      z-index: 9999;
    }

    .image-search-sheet {
      width: 100%;
      background: #fff;
      border-radius: 24px 24px 0 0;
      padding: 16px;
      max-height: 75vh;
      overflow: auto;
    }

    .image-search-sheet h3 {
      margin: 0 0 12px;
      font-size: 24px;
      color: #10352e;
    }

    .image-search-grid {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 10px;
    }

    .image-search-grid img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 14px;
      cursor: pointer;
      border: 2px solid transparent;
      background: #eef4f1;
    }

    .image-search-grid img:hover {
      border-color: #86c58b;
    }

    .image-search-close {
      width: 100%;
      margin-top: 12px;
    }

    @media (max-width: 640px) {
      .admin-shell { padding: 16px 12px 90px; }
      .admin-brand-card { padding: 18px 16px; border-radius: 28px; }
      .admin-logo { max-width: 235px; }
      .admin-title-block h1 { font-size: 34px; }
      .admin-title-block p { font-size: 15px; }
      .admin-form-grid { grid-template-columns: 1fr; }
      .admin-item { flex-direction: column; }
      .admin-item-image { width: 100%; height: 190px; }
      .image-search-grid { grid-template-columns: repeat(2,1fr); }
    }
  </style>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
</head>

<body>
  <div class="admin-shell">

    <header class="admin-brand-card">
      <img src="logo.png" alt="Logo Farmacia Montesano" class="admin-logo" />
    </header>

    <section class="admin-topbar">
      <a href="dashboard-admin.html" class="admin-back-btn" aria-label="Torna indietro">←</a>

      <div class="admin-title-block">
        <h1>Giornate Beauty</h1>
        <p>Qui puoi creare, modificare, nascondere e ordinare gli eventi beauty della farmacia.</p>
      </div>
    </section>

    <section class="admin-panel">
      <div class="admin-panel-actions">
        <button class="admin-primary-btn" type="button" onclick="openCreateForm()">+ Nuovo evento</button>
        <button class="admin-secondary-btn" type="button" onclick="reloadBeauty()">Aggiorna elenco</button>
      </div>
    </section>

    <section id="beautyFormCard" class="admin-form-card">
      <h2 id="formTitle" class="admin-form-title">Nuovo evento beauty</h2>

      <div class="admin-form-grid">
        <div class="admin-field full">
          <label for="beautyTitolo">Titolo</label>
          <input id="beautyTitolo" type="text" placeholder="Es. Giornata Vichy" />
        </div>

        <div class="admin-field">
          <label for="beautyData">Data</label>
          <input id="beautyData" type="date" />
        </div>

        <div class="admin-field">
          <label for="beautyOrdine">Ordine</label>
          <input id="beautyOrdine" type="number" step="1" placeholder="1" />
        </div>

        <div class="admin-field full">
          <label for="beautyDescrizione">Descrizione</label>
          <textarea id="beautyDescrizione" placeholder="Descrizione evento beauty"></textarea>
        </div>

        <div class="admin-field full">
          <label>Opzioni</label>
          <div class="admin-check-row">
            <label class="admin-check">
              <input id="beautyAttivo" type="checkbox" checked />
              <span>Visibile</span>
            </label>
          </div>
        </div>

        <div class="admin-field full">
          <label>Immagine</label>

          <div class="image-actions">
            <button class="image-action-btn" type="button" onclick="cercaImmagineDaTitolo('beautyTitolo','beautyPreview')">Cerca online</button>
            <button class="image-action-btn" type="button" onclick="document.getElementById('beautyImage').click()">Carica da telefono</button>
            <button class="image-action-btn" type="button" onclick="document.getElementById('beautyCamera').click()">Scatta foto</button>
          </div>

          <input id="beautyImage" class="image-hidden-input" type="file" accept="image/*" />
          <input id="beautyCamera" class="image-hidden-input" type="file" accept="image/*" capture="environment" />
        </div>

        <div class="admin-field full">
          <label>Anteprima immagine</label>
          <img id="beautyPreview" class="admin-preview" src="" alt="Anteprima immagine" />
        </div>
      </div>

      <div class="admin-form-footer">
        <button class="admin-primary-btn" type="button" onclick="saveBeauty()">Salva evento</button>
        <button class="admin-secondary-btn" type="button" onclick="closeForm()">Annulla</button>
      </div>
    </section>

    <section class="admin-list-card">
      <div id="beautyList"></div>
    </section>

  </div>

  <div id="imageModal" class="image-search-modal">
    <div class="image-search-sheet">
      <h3>Scegli immagine</h3>
      <div id="imageGrid" class="image-search-grid"></div>
      <button class="admin-secondary-btn image-search-close" type="button" onclick="closeImageModal()">Chiudi</button>
    </div>
  </div>

 <script>
  const firebaseConfig = {
    apiKey: "AIzaSyB7p69J89r5Kwu2YgawkBb9omjojdM4HTM",
    authDomain: "farmaciamontesano.firebaseapp.com",
    projectId: "farmaciamontesano",
    storageBucket: "farmaciamontesano.firebasestorage.app",
    messagingSenderId: "881461241551",
    appId: "1:881461241551:web:c74d6ee74cb857fa5179ba"
  };

  firebase.initializeApp(firebaseConfig);

  const db = firebase.firestore();
  const storage = firebase.storage();

  const GOOGLE_API_KEY = "AIzaSyAqBkT2_3sqhZhFvA4tWf3kRxrbz4_U9Rs";
  const GOOGLE_CX = "229b81fd6309a47c9";

  let editingId = null;
  let existingImageUrl = "";
  let selectedRemoteImageUrl = "";

  const formCard = document.getElementById("beautyFormCard");
  const formTitle = document.getElementById("formTitle");
  const beautyList = document.getElementById("beautyList");
  const preview = document.getElementById("beautyPreview");
  const fileInput = document.getElementById("beautyImage");
  const cameraInput = document.getElementById("beautyCamera");

  const fieldTitolo = document.getElementById("beautyTitolo");
  const fieldData = document.getElementById("beautyData");
  const fieldOrdine = document.getElementById("beautyOrdine");
  const fieldDescrizione = document.getElementById("beautyDescrizione");
  const fieldAttivo = document.getElementById("beautyAttivo");

  function bindPreviewInput(inputEl){
    inputEl.addEventListener("change", function(){
      const file = this.files[0];
      if(!file) return;

      selectedRemoteImageUrl = "";

      const reader = new FileReader();
      reader.onload = function(e){
        preview.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  bindPreviewInput(fileInput);
  bindPreviewInput(cameraInput);

  function openImageModal(){
    document.getElementById("imageModal").style.display = "flex";
  }

  function closeImageModal(){
    document.getElementById("imageModal").style.display = "none";
  }

  function cercaImmagineDaTitolo(inputId, previewId){
  const input = document.getElementById(inputId);
  const previewEl = document.getElementById(previewId);

  const titolo = input.value.trim();

  if(!titolo){
    alert("Inserisci un titolo prima.");
    return;
  }

  const imgUrl = `https://source.unsplash.com/600x600/?${encodeURIComponent(titolo)},cosmetics,beauty`;

  previewEl.src = imgUrl;
  selectedRemoteImageUrl = imgUrl;

  fileInput.value = "";
  cameraInput.value = "";
}

  function openCreateForm(){
    editingId = null;
    existingImageUrl = "";
    selectedRemoteImageUrl = "";
    formTitle.textContent = "Nuovo evento beauty";
    clearForm();
    formCard.classList.add("show");
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function closeForm(){
    formCard.classList.remove("show");
    clearForm();
    editingId = null;
    existingImageUrl = "";
    selectedRemoteImageUrl = "";
  }

  function clearForm(){
    fieldTitolo.value = "";
    fieldData.value = "";
    fieldOrdine.value = "";
    fieldDescrizione.value = "";
    fieldAttivo.checked = true;
    fileInput.value = "";
    cameraInput.value = "";
    preview.src = "";
  }

  function fillForm(data){
    fieldTitolo.value = data.titolo || data.nome || "";
    fieldData.value = data.data || "";
    fieldOrdine.value = data.ordine ?? "";
    fieldDescrizione.value = data.descrizione || "";
    fieldAttivo.checked = data.attivo === true;
    preview.src = data.immagine || data.imageUrl || "";
    existingImageUrl = data.immagine || data.imageUrl || "";
    selectedRemoteImageUrl = existingImageUrl || "";
    fileInput.value = "";
    cameraInput.value = "";
  }

  async function uploadImageIfNeeded(){
    const file = fileInput.files[0] || cameraInput.files[0];
    if(file){
      const safeName = Date.now() + "-" + file.name.replace(/\s+/g, "-");
      const ref = storage.ref("beauty/" + safeName);
      await ref.put(file);
      return await ref.getDownloadURL();
    }

    if(selectedRemoteImageUrl) return selectedRemoteImageUrl;
    return existingImageUrl || "";
  }

  async function saveBeauty(){
    const titolo = fieldTitolo.value.trim();
    const data = fieldData.value || "";
    const ordine = fieldOrdine.value ? parseInt(fieldOrdine.value, 10) : 999;
    const descrizione = fieldDescrizione.value.trim();
    const attivo = fieldAttivo.checked;

    if(!titolo){
      alert("Inserisci il titolo dell'evento.");
      return;
    }

    const immagine = await uploadImageIfNeeded();

    const payload = {
      titolo,
      nome: titolo,
      data,
      ordine,
      descrizione,
      attivo,
      immagine,
      imageUrl: immagine
    };

    if(editingId){
      await db.collection("beauty").doc(editingId).update(payload);
    } else {
      await db.collection("beauty").add(payload);
    }

    closeForm();
  }

  function toggleVisibility(id, currentState){
    db.collection("beauty").doc(id).update({
      attivo: !currentState
    });
  }

  function deleteBeauty(id){
    const ok = confirm("Vuoi eliminare questo evento beauty?");
    if(!ok) return;
    db.collection("beauty").doc(id).delete();
  }

  function editBeauty(id){
    db.collection("beauty").doc(id).get().then((doc) => {
      if(!doc.exists) return;

      editingId = id;
      formTitle.textContent = "Modifica evento beauty";
      fillForm(doc.data());
      formCard.classList.add("show");
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  }

  function renderBeauty(snapshot){
    if(snapshot.empty){
      beautyList.innerHTML = `<div class="admin-empty">Non ci sono eventi beauty salvati.</div>`;
      return;
    }

    const docs = [];
    snapshot.forEach(doc => docs.push({ id: doc.id, ...doc.data() }));
    docs.sort((a, b) => (a.ordine ?? 999) - (b.ordine ?? 999));

    let html = "";

    docs.forEach((d) => {
      const isActive = d.attivo === true;

      html += `
        <article class="admin-item">
          <img src="${d.immagine || d.imageUrl || ''}" alt="${d.titolo || d.nome || 'Evento beauty'}" class="admin-item-image" />
          <div class="admin-item-body">
            <h2 class="admin-item-title">${d.titolo || d.nome || ""}</h2>
            <div class="admin-chip-row">
              <span class="admin-chip">${isActive ? "Visibile" : "Nascosto"}</span>
              ${d.data ? `<span class="admin-chip">${d.data}</span>` : ``}
              <span class="admin-chip">Ordine ${d.ordine ?? 999}</span>
            </div>
            <p class="admin-item-sub">${d.descrizione || ""}</p>
            <div class="admin-item-footer">
              <button class="admin-toggle-pill ${isActive ? 'active' : 'hidden'}" type="button" onclick="toggleVisibility('${d.id}', ${isActive})">
                ${isActive ? "Visibile" : "Nascosto"}
              </button>
              <button class="admin-small-btn" type="button" onclick="editBeauty('${d.id}')">Modifica</button>
              <button class="admin-small-btn-danger" type="button" onclick="deleteBeauty('${d.id}')">Elimina</button>
            </div>
          </div>
        </article>
      `;
    });

    beautyList.innerHTML = html;
  }

  function reloadBeauty(){
    db.collection("beauty").get().then(renderBeauty);
  }

  db.collection("beauty").onSnapshot(renderBeauty);

  window.openCreateForm = openCreateForm;
  window.closeForm = closeForm;
  window.saveBeauty = saveBeauty;
  window.toggleVisibility = toggleVisibility;
  window.deleteBeauty = deleteBeauty;
  window.editBeauty = editBeauty;
  window.reloadBeauty = reloadBeauty;
  window.cercaImmagineDaTitolo = cercaImmagineDaTitolo;
  window.closeImageModal = closeImageModal;
</script>
