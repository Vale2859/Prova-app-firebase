<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Dashboard Turni</title>

<style>
body {
  font-family: -apple-system, Arial;
  background: #f2f4f7;
  margin: 0;
  padding: 20px;
}

/* HEADER */
.header {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 20px;
}

/* CARD */
.card {
  background: white;
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 16px;
}

/* BOTTONI */
.btn {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  font-weight: bold;
  margin-top: 8px;
  cursor: pointer;
}

.salva { background: #0a7c4a; color: white; }
.carica { background: #3498db; color: white; }
.elimina { background: #e74c3c; color: white; }

.importa { background: #9b59b6; color: white; }
.export { background: #2ecc71; color: white; }

/* LISTA */
.lista {
  max-height: 300px;
  overflow-y: auto;
}

.item {
  padding: 10px;
  border-bottom: 1px solid #eee;
}
</style>
</head>

<body>

<div class="header">Gestione Turni 💊</div>

<!-- INSERIMENTO -->
<div class="card">
  <input type="date" id="data">
  <input type="text" id="turno" placeholder="Nome farmacia">
  <input type="text" id="appoggio" placeholder="Appoggio (opzionale)">

  <button class="btn salva" onclick="salva()">Salva turno</button>
  <button class="btn carica" onclick="carica()">Carica turno</button>
  <button class="btn elimina" onclick="elimina()">Elimina turno</button>
</div>

<!-- IMPORT EXPORT -->
<div class="card">
  <input type="file" id="fileInput">
  <button class="btn importa" onclick="importa()">Importa turni</button>
  <button class="btn export" onclick="esporta()">Scarica backup</button>
</div>

<!-- LISTA -->
<div class="card">
  <div><b>Ultimi turni salvati</b></div>
  <div class="lista" id="lista"></div>
</div>

<script type="module">
import { db, ref, set, get, remove } from './firebase.js';

// 👉 SALVA
window.salva = async function() {
  const data = document.getElementById("data").value;
  const turno = document.getElementById("turno").value;
  const appoggio = document.getElementById("appoggio").value;

  if (!data || !turno) {
    alert("Inserisci data e turno");
    return;
  }

  await set(ref(db, "turni/" + data), {
    turno,
    appoggio
  });

  alert("Salvato ✔️");
  caricaLista();
}

// 👉 CARICA
window.carica = async function() {
  const data = document.getElementById("data").value;

  const snap = await get(ref(db, "turni/" + data));
  const t = snap.val();

  if (t) {
    document.getElementById("turno").value = t.turno;
    document.getElementById("appoggio").value = t.appoggio || "";
  } else {
    alert("Nessun turno trovato");
  }
}

// 👉 ELIMINA
window.elimina = async function() {
  const data = document.getElementById("data").value;

  await remove(ref(db, "turni/" + data));

  alert("Eliminato 🗑");
  caricaLista();
}

// 👉 IMPORTA
window.importa = async function() {
  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("Carica un file");
    return;
  }

  const text = await file.text();
  const dati = JSON.parse(text);

  for (const data in dati) {
    await set(ref(db, "turni/" + data), dati[data]);
  }

  alert("Import completato 🚀");
  caricaLista();
}

// 👉 EXPORT
window.esporta = async function() {
  const snap = await get(ref(db, "turni"));
  const dati = snap.val();

  const blob = new Blob([JSON.stringify(dati, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "backup-turni.json";
  a.click();
}

// 👉 LISTA
async function caricaLista() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  const snap = await get(ref(db, "turni"));
  const dati = snap.val();

  if (!dati) return;

  const keys = Object.keys(dati).sort().reverse().slice(0, 20);

  keys.forEach(data => {
    const t = dati[data];

    lista.innerHTML += `
      <div class="item">
        <b>${data}</b><br>
        ${t.turno}
        ${t.appoggio ? `<br><small>Appoggio: ${t.appoggio}</small>` : ""}
      </div>
    `;
  });
}

caricaLista();
</script>

</body>
</html>
