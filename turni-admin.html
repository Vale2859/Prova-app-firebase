<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Admin Turni</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
}

input {
  padding: 10px;
  margin: 5px;
  width: 220px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  background: #0a7c4a;
  color: white;
  font-weight: bold;
}
</style>

</head>
<body>

<h2>Gestione Turni</h2>

<input type="date" id="data"><br>
<input type="text" id="turno" placeholder="Nome farmacia"><br>
<input type="text" id="appoggio" placeholder="Appoggio"><br>

<br>

<button onclick="salva()">Salva</button>
<button onclick="carica()">Carica</button>
<button onclick="elimina()">Elimina</button>

<script type="module">
import { db, ref, set, get, remove } from './firebase.js';

window.salva = async function() {
  const data = document.getElementById("data").value;
  const turno = document.getElementById("turno").value;
  const appoggio = document.getElementById("appoggio").value;

  if (!data || !turno) {
    alert("Compila data e turno");
    return;
  }

  await set(ref(db, "turni/" + data), {
    turno: turno,
    appoggio: appoggio
  });

  alert("Salvato!");
}

window.carica = async function() {
  const data = document.getElementById("data").value;

  const snap = await get(ref(db, "turni/" + data));
  const t = snap.val();

  if (t) {
    document.getElementById("turno").value = t.turno;
    document.getElementById("appoggio").value = t.appoggio || "";
  } else {
    alert("Nessun turno trovato");
  }
}

window.elimina = async function() {
  const data = document.getElementById("data").value;

  await remove(ref(db, "turni/" + data));

  alert("Eliminato!");
}
</script>

</body>
</html>
