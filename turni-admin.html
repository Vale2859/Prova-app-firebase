<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Turni</title>

<style>
body{
  font-family:-apple-system;
  background:#f5f5f5;
  margin:0;
  padding:20px;
}

.container{
  max-width:600px;
  margin:auto;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:20px;
  margin-bottom:15px;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
}

button{
  padding:10px;
  width:100%;
  border:none;
  background:#0f8f55;
  color:#fff;
  border-radius:10px;
  font-weight:700;
}
</style>
</head>

<body>

<div class="container">

<h2>Modifica turni</h2>

<div class="card">
<input id="data" type="date">
<input id="turno" placeholder="Farmacia di turno">
<input id="appoggio" placeholder="Appoggio">
<button onclick="salva()">Salva</button>
</div>

<div id="lista"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyB7p69J89r5Kwu2YgawkBb9omjojdM4HTM",
  authDomain: "farmaciamontesano.firebaseapp.com",
  projectId: "farmaciamontesano"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function salva(){
  const data = document.getElementById("data").value;
  const turno = document.getElementById("turno").value;
  const appoggio = document.getElementById("appoggio").value;

  await db.collection("turniOverrides").doc(data).set({
    turno,
    appoggio
  });

  alert("Salvato!");
}

async function carica(){
  const snap = await db.collection("turniOverrides").get();

  let html="";

  snap.forEach(doc=>{
    const d = doc.data();

    html += `
      <div class="card">
        <strong>${doc.id}</strong><br>
        ${d.turno}<br>
        Appoggio: ${d.appoggio || "-"}
      </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;
}

carica();

</script>

</body>
</html>
