<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Accedi | Farmacia Montesano</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root{
      --bg:#f4f7f5;
      --card:#ffffff;
      --text:#17352f;
      --text-soft:#6c7c76;
      --green:#0d7a5f;
      --green-2:#1b8b6d;
      --green-3:#e7f5ef;
      --line:#e4ece8;
      --shadow:0 16px 34px rgba(16,50,42,0.08);
      --danger:#c94646;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}

    body{
      font-family:"Inter",sans-serif;
      background:
        radial-gradient(circle at top left, #fcfffd 0%, #f4f8f6 45%, #eef4f1 100%);
      color:var(--text);
      min-height:100vh;
    }

    .page{
      width:min(100%, 430px);
      margin:0 auto;
      min-height:100vh;
      padding:14px 14px 28px;
    }

    .brand-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:16px;
      display:flex;
      justify-content:center;
    }

    .brand-logo{
      width:100%;
      max-width:220px;
      display:block;
    }

    .topbar{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:14px;
    }

    .back-btn{
      width:50px;
      height:50px;
      border:none;
      border-radius:14px;
      background:rgba(255,255,255,0.88);
      box-shadow:var(--shadow);
      font-size:22px;
      color:var(--text);
      cursor:pointer;
      flex:0 0 50px;
    }

    .title-wrap{
      flex:1;
      min-width:0;
    }

    .page-title{
      margin:0;
      font-size:1.8rem;
      line-height:1;
      font-weight:900;
      letter-spacing:-0.04em;
    }

    .page-subtitle{
      margin:5px 0 0;
      font-size:.95rem;
      color:var(--text-soft);
      font-weight:600;
      line-height:1.35;
    }

    .panel{
      background:#fff;
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:18px;
    }

    .field{
      margin-bottom:14px;
    }

    .field label{
      display:block;
      margin-bottom:8px;
      font-size:1rem;
      font-weight:800;
      color:#23463d;
    }

    .field input{
      width:100%;
      min-height:58px;
      border:1px solid #dbe7e2;
      border-radius:18px;
      padding:0 18px;
      font-size:1rem;
      font-weight:600;
      color:var(--text);
      outline:none;
      background:#fff;
    }

    .field input::placeholder{
      color:#a0aba6;
      font-weight:600;
    }

    .action-btn{
      width:100%;
      min-height:58px;
      border:none;
      border-radius:18px;
      background:linear-gradient(135deg,#1a8b6c 0%, #58a891 100%);
      color:#fff;
      font-size:1.05rem;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 18px 34px rgba(26,139,108,0.18);
    }

    .bottom-link{
      margin-top:14px;
      text-align:center;
      font-size:.95rem;
      color:var(--text-soft);
      font-weight:700;
    }

    .bottom-link a{
      color:var(--green);
      font-weight:900;
    }

    .status{
      margin-top:12px;
      border-radius:16px;
      padding:12px 14px;
      font-size:.95rem;
      font-weight:800;
      display:none;
    }

    .status.ok{
      display:block;
      background:#ebf8f1;
      color:#1f7459;
    }

    .status.error{
      display:block;
      background:#fff1f1;
      color:var(--danger);
    }
  </style>

  <link rel="stylesheet" href="mobile-only.css" />
  <link rel="stylesheet" href="app-fixes.css" />
</head>
<body>
  <main class="page">
    <header class="brand-card">
      <img src="logo.png" alt="Logo Farmacia Montesano" class="brand-logo" />
    </header>

    <div class="topbar">
      <button class="back-btn" onclick="history.back()" aria-label="Indietro">←</button>
      <div class="title-wrap">
        <h1 class="page-title">Accedi</h1>
        <p class="page-subtitle">Entra nel tuo profilo cliente Farmacia Montesano</p>
      </div>
    </div>

    <section class="panel">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="nome@email.it" />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Password" />
      </div>

      <button class="action-btn" id="loginBtn">Accedi</button>

      <div id="statusBox" class="status"></div>

      <div class="bottom-link">
        Non hai un account? <a href="register.html">Registrati</a>
      </div>
    </section>
  </main>

  <script type="module">
    import {
      auth,
      signInWithEmailAndPassword
    } from "./firebase.js";

    const emailEl = document.getElementById("email");
    const passwordEl = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const statusBox = document.getElementById("statusBox");

    function getRedirectTarget() {
      const params = new URLSearchParams(window.location.search);
      return params.get("redirect") || "index.html";
    }

    function showStatus(message, type = "ok") {
      statusBox.textContent = message;
      statusBox.className = `status ${type}`;
    }

    loginBtn.addEventListener("click", async () => {
      const email = emailEl.value.trim();
      const password = passwordEl.value;

      if (!email || !password) {
        showStatus("Inserisci email e password.", "error");
        return;
      }

      loginBtn.disabled = true;
      showStatus("Accesso in corso...", "ok");

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.replace(getRedirectTarget());
      } catch (error) {
        console.error(error);
        let message = "Accesso non riuscito. Controlla email e password.";
        if (error?.code === "auth/invalid-credential" || error?.code === "auth/user-not-found" || error?.code === "auth/wrong-password") {
          message = "Email o password non corretti.";
        } else if (error?.code === "auth/too-many-requests") {
          message = "Troppi tentativi. Riprova più tardi.";
        } else if (error?.code === "auth/network-request-failed") {
          message = "Connessione assente o instabile.";
        } else if (error?.code === "auth/unauthorized-domain") {
          message = "Questo dominio non è autorizzato in Firebase Authentication.";
        } else if (error?.code === "auth/operation-not-allowed") {
          message = "Metodo email/password non attivo su Firebase Authentication.";
        }
        showStatus(message, "error");
      } finally {
        loginBtn.disabled = false;
      }
    });
  </script>

  <script src="mobile-only.js"></script>
  <script src="app-fixes.js"></script>
</body>
</html>
