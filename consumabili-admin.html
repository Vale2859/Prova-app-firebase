<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Consumabili admin</title>

  <style>
    :root{
      --bg:#eef3f0;
      --card:#ffffff;
      --line:#dde5e0;
      --text:#1f3c35;
      --muted:#6f837c;
      --green:#3e8b61;
      --green2:#66b187;
      --green-dark:#1d5a40;
      --yellow:#d6a43a;
      --blue:#3d73d1;
      --shadow:0 10px 25px rgba(0,0,0,.06);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
      -webkit-tap-highlight-color:transparent;
    }

    body{
      background:linear-gradient(180deg,#f4f7f5,#e9efec);
      color:var(--text);
    }

    .app{
      max-width:430px;
      margin:auto;
      padding:14px;
    }

    .hero{
      background:
        radial-gradient(circle at top right, rgba(255,255,255,.14), transparent 36%),
        linear-gradient(135deg,var(--green-dark),var(--green),var(--green2));
      color:#fff;
      border-radius:28px;
      padding:18px;
      box-shadow:var(--shadow);
      margin-bottom:14px;
    }

    .back{
      display:inline-flex;
      align-items:center;
      gap:8px;
      text-decoration:none;
      color:#fff;
      font-size:16px;
      font-weight:900;
      margin-bottom:12px;
    }

    .hero-title{
      font-size:28px;
      line-height:.95;
      font-weight:900;
      letter-spacing:-.04em;
      margin-bottom:8px;
    }

    .hero-sub{
      font-size:14px;
      line-height:1.25;
      opacity:.95;
      font-weight:700;
      margin-bottom:14px;
    }

    .hero-stats{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .hero-stat{
      min-height:78px;
      border-radius:18px;
      background:rgba(255,255,255,.14);
      border:1px solid rgba(255,255,255,.15);
      padding:12px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .hero-stat strong{
      font-size:28px;
      line-height:1;
      font-weight:900;
    }

    .hero-stat span{
      font-size:12px;
      line-height:1.1;
      font-weight:800;
      opacity:.95;
    }

    .filters{
      display:flex;
      gap:8px;
      margin-bottom:14px;
    }

    .filter{
      flex:1;
      min-height:50px;
      border:none;
      border-radius:18px;
      background:#fff;
      color:var(--text);
      font-size:15px;
      font-weight:900;
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      cursor:pointer;
    }

    .filter.active{
      background:linear-gradient(135deg,var(--green),var(--green2));
      color:#fff;
      border-color:transparent;
    }

    .list{
      display:grid;
      gap:12px;
    }

    .card{
      background:#fff;
      border-radius:24px;
      padding:16px;
      border:1px solid var(--line);
      box-shadow:var(--shadow);
    }

    .card-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }

    .name{
      font-size:18px;
      line-height:1.05;
      font-weight:900;
      color:var(--text);
      margin-bottom:4px;
    }

    .meta{
      font-size:13px;
      line-height:1.15;
      color:var(--muted);
      font-weight:700;
    }

    .status-pill{
      min-height:30px;
      padding:0 12px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
    }

    .status-pill.pending{
      background:#fff2d9;
      color:#9a6908;
    }

    .status-pill.seen{
      background:#e8f0ff;
      color:#315fa1;
    }

    .product-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      background:#f6f8f7;
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      margin-bottom:12px;
    }

    .product-name{
      font-size:18px;
      line-height:1.05;
      font-weight:900;
      color:var(--text);
    }

    .product-sub{
      font-size:13px;
      line-height:1.15;
      color:var(--muted);
      font-weight:700;
      margin-top:4px;
    }

    .qty-box{
      min-width:62px;
      height:52px;
      border-radius:16px;
      background:#fff;
      border:1px solid var(--line);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
    }

    .qty-box strong{
      font-size:24px;
      line-height:1;
      font-weight:900;
      color:var(--text);
    }

    .qty-box span{
      font-size:11px;
      line-height:1;
      color:var(--muted);
      font-weight:800;
      margin-top:4px;
    }

    .actions{
      display:flex;
      gap:10px;
    }

    .btn{
      flex:1;
      min-height:48px;
      border:none;
      border-radius:16px;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
    }

    .btn.seen{
      background:#e8f0ff;
      color:#315fa1;
    }

    .btn.done{
      background:linear-gradient(135deg,var(--green),var(--green2));
      color:#fff;
    }

    .empty{
      background:#fff;
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:22px;
      text-align:center;
      color:var(--muted);
      font-size:15px;
      line-height:1.3;
      font-weight:700;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%) translateY(120px);
      background:#17211d;
      color:#fff;
      min-height:46px;
      padding:0 16px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
      font-weight:900;
      box-shadow:0 18px 40px rgba(0,0,0,.22);
      z-index:9999;
      transition:transform .25s ease;
    }

    .toast.show{
      transform:translateX(-50%) translateY(0);
    }
  </style>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>
  <div class="app">
    <section class="hero">
      <a class="back" href="titolare.html">← Torna</a>
      <div class="hero-title">Consumabili</div>
      <div class="hero-sub" id="heroSub">
        Sto caricando le richieste attive dei dipendenti.
      </div>

      <div class="hero-stats">
        <div class="hero-stat">
          <strong id="statActive">0</strong>
          <span>Richieste attive</span>
        </div>

        <div class="hero-stat">
          <strong id="statSeen">0</strong>
          <span>Già viste</span>
        </div>
      </div>
    </section>

    <div class="filters">
      <button class="filter active" data-filter="attive">Attive</button>
      <button class="filter" data-filter="viste">Viste</button>
    </div>

    <section class="list" id="listBox">
      <div class="empty">Sto caricando le richieste…</div>
    </section>
  </div>

  <div class="toast" id="toastBox">Operazione completata</div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB7p69J89r5Kwu2YgawkBb9omjojdM4HTM",
      authDomain: "farmaciamontesano.firebaseapp.com",
      projectId: "farmaciamontesano",
      storageBucket: "farmaciamontesano.firebasestorage.app",
      messagingSenderId: "881461241551",
      appId: "1:881461241551:web:c74d6ee74cb857fa5179ba"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentFilter = "attive";
    let allRows = [];

    const listBox = document.getElementById("listBox");
    const heroSub = document.getElementById("heroSub");
    const toastBox = document.getElementById("toastBox");

    function showToast(message){
      toastBox.textContent = message;
      toastBox.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toastBox.classList.remove("show"), 1500);
    }

    function formatDateIT(dateStr){
      if(!dateStr) return "—";
      const parts = String(dateStr).split("-");
      if(parts.length !== 3) return dateStr;
      return `${parts[2]}-${parts[1]}-${parts[0]}`;
    }

    function escapeHtml(value){
      return String(value ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#39;");
    }

    async function markSeen(id){
      await db.collection("employee_requests").doc(id).update({
        seenByOwner: true
      });
      showToast("Richiesta vista");
    }

    async function markDone(id){
      await db.collection("employee_requests").doc(id).update({
        seenByOwner: true,
        completed: true,
        status: "completata",
        completedBy: "Valerio",
        completedAt: new Date().toISOString()
      });
      showToast("Richiesta completata");
    }

    function updateTopStats(rows){
      const active = rows.filter(r => r.completed !== true);
      const seen = active.filter(r => r.seenByOwner === true);

      document.getElementById("statActive").textContent = active.length;
      document.getElementById("statSeen").textContent = seen.length;

      if (!active.length) {
        heroSub.textContent = "Non ci sono richieste consumabili attive al momento.";
      } else {
        heroSub.textContent = `Hai ${active.length} richieste attive, di cui ${seen.length} già viste.`;
      }
    }

    function renderList(){
      const rows = allRows
        .filter(r => r.type === "consumabile")
        .filter(r => r.completed !== true)
        .filter(r => currentFilter === "attive" ? r.seenByOwner !== true : r.seenByOwner === true)
        .sort((a,b) => String(b.createdAt || "").localeCompare(String(a.createdAt || "")));

      if (!rows.length) {
        listBox.innerHTML = `
          <div class="empty">
            Nessuna richiesta per questo filtro 👍
          </div>
        `;
        return;
      }

      listBox.innerHTML = rows.map(r => `
        <article class="card">
          <div class="card-head">
            <div>
              <div class="name">${escapeHtml(r.employeeName || "Dipendente")}</div>
              <div class="meta">Richiesta del ${escapeHtml(formatDateIT(r.createdDate))} alle ${escapeHtml(r.createdTime || "—")}</div>
            </div>
            <div class="status-pill ${r.seenByOwner ? "seen" : "pending"}">
              ${r.seenByOwner ? "Vista" : "In attesa"}
            </div>
          </div>

          <div class="product-row">
            <div>
              <div class="product-name">${escapeHtml(r.itemName || "Prodotto")}</div>
              <div class="product-sub">Richiesto dal dipendente</div>
            </div>

            <div class="qty-box">
              <strong>${Number(r.qty || 1)}</strong>
              <span>Q.tà</span>
            </div>
          </div>

          <div class="actions">
            ${r.seenByOwner !== true ? `<button class="btn seen" onclick="markSeen('${r.id}')">Ho visto</button>` : ``}
            <button class="btn done" onclick="markDone('${r.id}')">Fatto ✔</button>
          </div>
        </article>
      `).join("");
    }

    function listenRequests(){
      db.collection("employee_requests").onSnapshot(snapshot => {
        allRows = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        updateTopStats(allRows);
        renderList();
      });
    }

    document.querySelectorAll(".filter").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filter").forEach(x => x.classList.remove("active"));
        btn.classList.add("active");
        currentFilter = btn.dataset.filter;
        renderList();
      });
    });

    listenRequests();

    window.markSeen = markSeen;
    window.markDone = markDone;
  </script>
</body>
</html>
