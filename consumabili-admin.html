<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Consumabili Admin</title><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script><script src="internal-common.js"></script><style>:root{--bg:#eef3f0;--card:#fff;--line:#dde5e0;--text:#1f3c35;--muted:#6f837c;--green:#3e8b61;--green2:#66b187;--green-dark:#1d5a40;--shadow:0 12px 28px rgba(0,0,0,.07)}*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif}html,body{margin:0}body{background:linear-gradient(180deg,#f4f7f5,#e9efec);color:var(--text)}.app{width:min(100%,430px);margin:0 auto;padding:14px 14px 24px}.hero{background:linear-gradient(135deg,var(--green-dark),var(--green),var(--green2));color:#fff;border-radius:28px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}.back{display:inline-flex;align-items:center;gap:8px;text-decoration:none;color:#fff;font-size:16px;font-weight:900;margin-bottom:12px}.hero-title{font-size:28px;font-weight:900;margin:0 0 8px}.hero-sub{font-size:14px;opacity:.95;font-weight:700;margin:0 0 14px}.hero-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.hero-stat{min-height:78px;border-radius:18px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.15);padding:12px;display:flex;flex-direction:column;justify-content:space-between}.hero-stat strong{font-size:28px;font-weight:900}.hero-stat span{font-size:12px;font-weight:800}.pillbar{display:flex;gap:8px;margin-bottom:12px}.pill{flex:1;min-height:46px;border:none;border-radius:18px;background:#fff;border:1px solid var(--line);font-size:14px;font-weight:900}.pill.active{background:linear-gradient(135deg,var(--green),var(--green2));color:#fff}.list{display:grid;gap:10px}.card{background:#fff;border-radius:24px;padding:16px;border:1px solid var(--line);box-shadow:var(--shadow)}.title{font-size:16px;font-weight:900}.sub{font-size:12px;color:var(--muted);margin-top:4px}.section{background:#fff;border-radius:20px;padding:14px;margin:12px 0;border:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px}.kpi{font-size:30px;font-weight:900}.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{width:100%;min-height:48px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;font-weight:900}.btn.secondary{background:#e8f0ff;color:#315fa1}.empty{background:#fff;border:1px solid var(--line);border-radius:24px;padding:22px;text-align:center;color:var(--muted);font-weight:700;box-shadow:var(--shadow)}.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(120px);background:#17211d;color:#fff;min-height:46px;padding:0 16px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;box-shadow:0 18px 40px rgba(0,0,0,.22);z-index:9999;transition:transform .25s ease}.toast.show{transform:translateX(-50%) translateY(0)}</style></head><body><div class="app"><section class="hero"><a class="back" href="dashboard-admin.html">← Torna</a><div class="hero-title">Consumabili</div><div class="hero-sub" id="heroSub">Richieste attive dei dipendenti.</div><div class="hero-stats"><div class="hero-stat"><strong id="statActive">0</strong><span>Attive</span></div><div class="hero-stat"><strong id="statSeen">0</strong><span>Già viste</span></div></div></section><div class="pillbar"><button class="pill active" data-filter="attive">Attive</button><button class="pill" data-filter="viste">Viste</button></div><section class="list" id="listBox"></section></div><div class="toast" id="toast"></div><script>const A=window.InternalApp;let currentFilter='attive',allRows=[];const listBox=document.getElementById('listBox'),toast=document.getElementById('toast');function showToast(m){toast.textContent=m;toast.classList.add('show');clearTimeout(showToast.t);showToast.t=setTimeout(()=>toast.classList.remove('show'),1400)}async function markSeen(id){await A.db.collection('employee_requests').doc(id).update({seenByOwner:true});showToast('Richiesta vista');}async function markDone(id){const row=allRows.find(r=>r.id===id);await A.db.collection('employee_requests').doc(id).update({seenByOwner:true,completed:true,status:'completata',completedBy:'Valerio',completedAt:new Date().toISOString()});if(row)await A.addEmployeeNotification(row.employeeId,{type:'consumabile',title:'Consumabile gestito',message:'Richiesta completata: '+row.itemName});showToast('Richiesta completata');}function render(){const rows=allRows.filter(r=>r.type==='consumabile'&&r.completed!==true).filter(r=>currentFilter==='attive'?r.seenByOwner!==true:r.seenByOwner===true).sort((a,b)=>String(b.createdAt||'').localeCompare(String(a.createdAt||'')));if(!rows.length)return listBox.innerHTML='<div class="empty">Nessuna richiesta per questo filtro 👍</div>';listBox.innerHTML=rows.map(r=>'<div class="card"><div style="display:flex;justify-content:space-between;gap:12px;margin-bottom:12px"><div><div class="title">'+r.employeeName+'</div><div class="sub">Richiesta del '+A.fmtDateIT(r.createdDate)+' alle '+(r.createdTime||'—')+'</div></div><div style="padding:6px 10px;border-radius:999px;background:'+(r.seenByOwner?'#e8f0ff':'#fff3dd')+';color:'+(r.seenByOwner?'#315fa1':'#9a6908')+';font-size:12px;font-weight:900">'+(r.seenByOwner?'Vista':'In attesa')+'</div></div><div class="section"><div><div class="title">'+r.itemName+'</div><div class="sub">Richiesto dal dipendente</div></div><div class="kpi">'+Number(r.qty||1)+'</div></div><div class="row2">'+(r.seenByOwner!==true?'<button class="btn secondary" onclick="markSeen(\''+r.id+'\')">Ho visto</button>':'<div></div>')+'<button class="btn" onclick="markDone(\''+r.id+'\')">Fatto ✔</button></div></div>').join('');}document.querySelectorAll('.pill').forEach(b=>b.onclick=()=>{document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));b.classList.add('active');currentFilter=b.dataset.filter;render();});A.db.collection('employee_requests').onSnapshot(sn=>{allRows=sn.docs.map(d=>({id:d.id,...d.data()}));const active=allRows.filter(r=>r.type==='consumabile'&&r.completed!==true), seen=active.filter(r=>r.seenByOwner===true);statActive.textContent=active.length;statSeen.textContent=seen.length;heroSub.textContent=active.length?'Hai '+active.length+' richieste attive, di cui '+seen.length+' già viste.':'Non ci sono richieste attive.';render();});window.markSeen=markSeen;window.markDone=markDone;</script>
<script type="module">
  import { requireAuth } from "./auth-guard.js";
  requireAuth({ redirect: "login.html" });
</script>
</body></html>
