<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Benvenuto | Farmacia Montesano</title>

  <!-- BLOCCA LA PAGINA FINCHÉ NON CONTROLLA LOGIN -->
  <script>
    document.documentElement.classList.add("auth-checking");
  </script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial, sans-serif;
      background: linear-gradient(180deg,#f8faf9 0%, #eef3f1 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 14px 34px rgba(16,49,39,0.1);
      width: 90%;
      max-width: 360px;
    }

    h1 {
      margin-bottom: 20px;
      color: #1b6c56;
      font-size: 26px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .login {
      background: linear-gradient(135deg,#1b6c56,#84c691);
      color: white;
    }

    .register {
      background: #eef3f1;
      color: #16372f;
    }

    .loading {
      font-size: 14px;
      color: #666;
      margin-top: 16px;
      display: none;
    }

    .loading.show {
      display: block;
    }

    html.auth-checking,
    html.auth-checking body {
      visibility: hidden;
      opacity: 0;
    }

    html.auth-ready,
    html.auth-ready body {
      visibility: visible;
      opacity: 1;
      transition: opacity 0.2s ease;
    }
  </style>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
</head>

<body>

  <div class="card">
    <h1>Benvenuto 👋</h1>

    <button class="login" onclick="goLogin()">Accedi</button>
    <button class="register" onclick="goRegister()">Registrati</button>

    <div id="loadingText" class="loading show">Controllo accesso...</div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB7p69J89r5Kwu2YgawkBb9omjojdM4HTM",
      authDomain: "farmaciamontesano.firebaseapp.com",
      projectId: "farmaciamontesano",
      storageBucket: "farmaciamontesano.firebasestorage.app",
      messagingSenderId: "881461241551",
      appId: "1:881461241551:web:c74d6ee74cb857fa5179ba"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const auth = firebase.auth();
    const loadingText = document.getElementById("loadingText");

    auth.onAuthStateChanged((user) => {
      if (user) {
        window.location.replace("index.html");
        return;
      }

      document.documentElement.classList.remove("auth-checking");
      document.documentElement.classList.add("auth-ready");

      if (loadingText) {
        loadingText.classList.remove("show");
      }
    });

    function goLogin(){
      window.location.href = "login.html";
    }

    function goRegister(){
      window.location.href = "register.html";
    }
  </script>

</body>
</html>
