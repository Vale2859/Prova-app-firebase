<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendario Admin | Farmacia Montesano</title>

  <style>
    :root{
      --bg:#f6f8f7;
      --panel:#ffffff;
      --panel-2:#fbfcfb;
      --text:#16372f;
      --muted:#70827b;
      --line:#e6ece8;
      --shadow:0 10px 30px rgba(16,49,39,0.06);

      --green:#76a93a;
      --green-dark:#5f8e2a;

      --blue:#4e86ea;
      --orange:#de8b32;
      --red:#db5454;

      --event-green:#e9f4de;
      --event-green-border:#72a43b;

      --event-yellow:#f9efc9;
      --event-yellow-border:#e0b941;

      --event-red:#f7d6d6;
      --event-red-border:#d85d5d;

      --radius-xl:24px;
      --radius-lg:18px;
      --radius-md:14px;
    }

    *{ box-sizing:border-box; }
    html,body{ margin:0; padding:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }

    .app{
      display:grid;
      grid-template-columns: 290px 1fr 330px;
      gap:18px;
      min-height:100vh;
      padding:18px;
    }

    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
    }

    .left{
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:800;
      font-size:24px;
      line-height:1;
      margin-bottom:8px;
    }

    .brand-icon{
      width:40px;
      height:40px;
      border-radius:10px;
      display:grid;
      place-items:center;
      background:#f0f4f2;
      border:1px solid var(--line);
      font-size:20px;
    }

    .search{
      width:100%;
      height:54px;
      border-radius:14px;
      border:1px solid #dfe5e1;
      padding:0 16px;
      font-size:16px;
      outline:none;
      background:#fff;
    }

    .new-btn{
      width:100%;
      height:54px;
      border:none;
      border-radius:14px;
      background:linear-gradient(180deg,var(--green),var(--green-dark));
      color:#fff;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
      box-shadow:0 8px 16px rgba(118,169,58,0.22);
    }

    .mini-calendar{
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      background:var(--panel-2);
    }

    .mini-cal-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:12px;
      font-weight:800;
    }

    .mini-nav{
      display:flex;
      gap:8px;
    }

    .mini-nav button{
      width:30px;
      height:30px;
      border:none;
      border-radius:10px;
      background:#fff;
      border:1px solid var(--line);
      cursor:pointer;
      font-weight:800;
    }

    .mini-weekdays,
    .mini-grid{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:6px;
      text-align:center;
    }

    .mini-weekdays div{
      font-size:11px;
      color:var(--muted);
      font-weight:800;
      padding-bottom:4px;
    }

    .mini-day{
      height:34px;
      border-radius:10px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:13px;
      cursor:pointer;
      border:1px solid transparent;
    }

    .mini-day.other{
      opacity:.35;
    }

    .mini-day.active{
      background:var(--blue);
      color:#fff;
      font-weight:800;
    }

    .mini-day.today{
      border-color:var(--blue);
      font-weight:800;
    }

    .filters{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .filter-btn{
      height:52px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#fff;
      cursor:pointer;
      text-align:left;
      padding:0 16px;
      font-size:16px;
      font-weight:700;
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .filter-btn.active{
      background:#eff6ea;
      border-color:#d5e4c7;
    }

    .filter-count{
      color:var(--muted);
      font-weight:800;
    }

    .center{
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    .topbar{
      padding:16px 18px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:18px;
      border-bottom:1px solid var(--line);
    }

    .top-left{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .today-btn,
    .nav-btn,
    .view-btn{
      height:44px;
      border:none;
      background:#fff;
      border:1px solid var(--line);
      border-radius:12px;
      padding:0 16px;
      cursor:pointer;
      font-size:15px;
      font-weight:800;
      color:var(--text);
    }

    .nav-btn{
      width:44px;
      padding:0;
    }

    .current-label{
      font-size:20px;
      font-weight:900;
      min-width:220px;
    }

    .top-right{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .view-btn.active{
      background:var(--blue);
      color:#fff;
      border-color:transparent;
      box-shadow:0 8px 18px rgba(78,134,234,0.24);
    }

    .calendar-wrap{
      position:relative;
      flex:1;
      overflow:auto;
      background:#fff;
      border-radius:0 0 var(--radius-xl) var(--radius-xl);
    }

    .day-view{
      display:grid;
      grid-template-columns:80px 1fr;
      min-height:900px;
    }

    .hours{
      border-right:1px solid var(--line);
      background:#fcfdfc;
    }

    .hour{
      height:64px;
      border-bottom:1px solid #eef2ef;
      padding:8px 10px 0 0;
      text-align:right;
      font-size:14px;
      color:#556a63;
      font-weight:700;
    }

    .day-grid{
      position:relative;
      min-height:900px;
      background:
        repeating-linear-gradient(
          to bottom,
          #ffffff 0px,
          #ffffff 63px,
          #edf2ef 64px
        );
      cursor:crosshair;
    }

    .event{
      position:absolute;
      left:10px;
      right:10px;
      border-radius:16px;
      padding:10px 12px;
      border-left:5px solid;
      box-shadow:0 8px 18px rgba(0,0,0,0.05);
      cursor:pointer;
      overflow:hidden;
    }

    .event.green{
      background:var(--event-green);
      border-left-color:var(--event-green-border);
    }

    .event.yellow{
      background:var(--event-yellow);
      border-left-color:var(--event-yellow-border);
    }

    .event.red{
      background:var(--event-red);
      border-left-color:var(--event-red-border);
    }

    .event-title{
      font-size:15px;
      font-weight:900;
      line-height:1.1;
      margin-bottom:4px;
      text-transform:uppercase;
    }

    .event-client{
      font-size:14px;
      font-weight:800;
      margin-bottom:4px;
    }

    .event-time{
      font-size:13px;
      color:#40544d;
      font-weight:700;
    }

    .month-view{
      display:none;
      padding:14px;
    }

    .month-grid{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:10px;
    }

    .month-cell{
      min-height:140px;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:6px;
      cursor:pointer;
    }

    .month-cell.other{
      opacity:.45;
      background:#fafbfa;
    }

    .month-cell-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:800;
      font-size:14px;
    }

    .month-cell.today{
      outline:2px solid #b9d0ff;
    }

    .month-event{
      border-radius:10px;
      padding:5px 8px;
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .month-event.green{ background:var(--event-green); color:#305121; }
    .month-event.yellow{ background:var(--event-yellow); color:#6f5514; }
    .month-event.red{ background:var(--event-red); color:#7a2727; }

    .right{
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .profile-box{
      border:1px solid var(--line);
      border-radius:20px;
      background:#fff;
      padding:18px;
    }

    .profile-name{
      font-size:20px;
      font-weight:900;
      line-height:1.1;
      margin-bottom:8px;
      text-transform:lowercase;
    }

    .profile-phone{
      font-size:15px;
      font-weight:700;
      color:#4e615a;
      margin-bottom:12px;
    }

    .status-pill{
      display:inline-flex;
      align-items:center;
      min-height:36px;
      border-radius:999px;
      padding:0 14px;
      font-size:14px;
      font-weight:900;
    }

    .status-pill.confirmed{ background:#e8f2dd; color:#557d23; }
    .status-pill.requested{ background:#f8edc8; color:#8b6a13; }
    .status-pill.cancelled{ background:#f3d7d7; color:#973f3f; }

    .detail-card{
      border:1px solid var(--line);
      border-radius:20px;
      background:#fff;
      padding:18px;
    }

    .detail-title{
      font-size:16px;
      font-weight:900;
      margin-bottom:12px;
    }

    .detail-row{
      display:grid;
      grid-template-columns:110px 1fr;
      gap:12px;
      padding:10px 0;
      border-bottom:1px solid #edf1ee;
    }

    .detail-row:last-child{
      border-bottom:none;
    }

    .detail-key{
      color:#73857d;
      font-weight:800;
      font-size:14px;
    }

    .detail-value{
      font-weight:800;
      font-size:15px;
      color:#1c3b34;
    }

    .actions{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .action-btn{
      height:52px;
      border:none;
      border-radius:14px;
      color:#fff;
      font-size:17px;
      font-weight:900;
      cursor:pointer;
    }

    .action-btn.blue{ background:linear-gradient(180deg,#5a8ef0,#3f74dd); }
    .action-btn.orange{ background:linear-gradient(180deg,#e69b46,#d98128); }
    .action-btn.red{ background:linear-gradient(180deg,#e16868,#cf4949); }

    .empty-state{
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:#7b8b85;
      font-weight:700;
      padding:30px;
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.35);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:1000;
      padding:20px;
    }

    .modal.show{
      display:flex;
    }

    .modal-box{
      width:100%;
      max-width:560px;
      background:#fff;
      border-radius:24px;
      box-shadow:0 20px 50px rgba(0,0,0,0.18);
      padding:22px;
    }

    .modal-box h3{
      margin:0 0 16px;
      font-size:28px;
      line-height:1;
    }

    .form-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .field.full{
      grid-column:1 / -1;
    }

    .field label{
      font-size:13px;
      font-weight:800;
      color:#556a63;
    }

    .field input,
    .field select,
    .field textarea{
      width:100%;
      min-height:48px;
      border-radius:12px;
      border:1px solid #dfe5e1;
      padding:10px 12px;
      font-size:15px;
      outline:none;
      background:#fff;
    }

    .field textarea{
      min-height:90px;
      resize:vertical;
    }

    .modal-actions{
      display:flex;
      justify-content:flex-end;
      gap:10px;
      margin-top:18px;
    }

    .ghost-btn{
      height:46px;
      padding:0 18px;
      border:none;
      border-radius:12px;
      background:#eef3f0;
      color:#23413a;
      font-weight:800;
      cursor:pointer;
    }

    .save-btn{
      height:46px;
      padding:0 18px;
      border:none;
      border-radius:12px;
      background:linear-gradient(180deg,var(--green),var(--green-dark));
      color:#fff;
      font-weight:900;
      cursor:pointer;
    }

    @media (max-width: 1280px){
      .app{
        grid-template-columns:260px 1fr 300px;
      }
    }
  </style>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>
  <div class="app">
    <aside class="panel left">
      <div class="brand">
        <div class="brand-icon">🗓️</div>
        <div>Calendario</div>
      </div>

      <input id="searchInput" class="search" type="text" placeholder="Cerca cliente..." />

      <button class="new-btn" onclick="openNewBookingModal()">+ Nuova Prenotazione</button>

      <div class="mini-calendar">
        <div class="mini-cal-head">
          <div id="miniMonthLabel">Mese</div>
          <div class="mini-nav">
            <button onclick="changeMiniMonth(-1)">‹</button>
            <button onclick="changeMiniMonth(1)">›</button>
          </div>
        </div>

        <div class="mini-weekdays">
          <div>L</div><div>M</div><div>M</div><div>G</div><div>V</div><div>S</div><div>D</div>
        </div>
        <div id="miniGrid" class="mini-grid"></div>
      </div>

      <div class="filters">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">
          <span>Tutte</span>
          <span class="filter-count" id="countAll">0</span>
        </button>

        <button class="filter-btn" data-filter="recall" onclick="setFilter('recall', this)">
          <span>Da richiamare</span>
          <span class="filter-count" id="countRecall">0</span>
        </button>

        <button class="filter-btn" data-filter="cancelled" onclick="setFilter('cancelled', this)">
          <span>Cancellate</span>
          <span class="filter-count" id="countCancelled">0</span>
        </button>
      </div>
    </aside>

    <main class="panel center">
      <div class="topbar">
        <div class="top-left">
          <button class="today-btn" onclick="goToday()">Oggi</button>
          <button class="nav-btn" onclick="changeDate(-1)">‹</button>
          <div class="current-label" id="currentLabel">Data</div>
          <button class="nav-btn" onclick="changeDate(1)">›</button>
        </div>

        <div class="top-right">
          <button class="view-btn active" id="viewDayBtn" onclick="setView('day')">Giorno</button>
          <button class="view-btn" id="viewMonthBtn" onclick="setView('month')">Mese</button>
        </div>
      </div>

      <div class="calendar-wrap">
        <div id="dayView" class="day-view">
          <div id="hoursCol" class="hours"></div>
          <div id="dayGrid" class="day-grid"></div>
        </div>

        <div id="monthView" class="month-view">
          <div id="monthGrid" class="month-grid"></div>
        </div>
      </div>
    </main>

    <aside class="panel right">
      <div id="detailEmpty" class="empty-state">
        Seleziona una prenotazione per vedere il dettaglio.
      </div>

      <div id="detailContent" style="display:none;">
        <div class="profile-box">
          <div id="detailName" class="profile-name">—</div>
          <div id="detailPhone" class="profile-phone">—</div>
          <div id="detailStatus" class="status-pill confirmed">—</div>
        </div>

        <div class="detail-card">
          <div class="detail-title">Dettaglio appuntamento</div>

          <div class="detail-row">
            <div class="detail-key">Data</div>
            <div class="detail-value" id="detailDate">—</div>
          </div>

          <div class="detail-row">
            <div class="detail-key">Ora</div>
            <div class="detail-value" id="detailTime">—</div>
          </div>

          <div class="detail-row">
            <div class="detail-key">Tipo</div>
            <div class="detail-value" id="detailType">—</div>
          </div>

          <div class="detail-row">
            <div class="detail-key">Titolo</div>
            <div class="detail-value" id="detailTitle">—</div>
          </div>

          <div class="detail-row">
            <div class="detail-key">Durata</div>
            <div class="detail-value" id="detailDuration">—</div>
          </div>

          <div class="detail-row">
            <div class="detail-key">Operatore</div>
            <div class="detail-value" id="detailOperator">—</div>
          </div>

          <div class="detail-row">
            <div class="detail-key">Note</div>
            <div class="detail-value" id="detailNotes">—</div>
          </div>
        </div>

        <div class="actions">
          <button class="action-btn blue" onclick="openEditSelected()">Modifica</button>
          <button class="action-btn orange" onclick="openMoveSelected()">Sposta</button>
          <button class="action-btn red" onclick="cancelSelected()">Cancella</button>
        </div>
      </div>
    </aside>
  </div>

  <div id="bookingModal" class="modal">
    <div class="modal-box">
      <h3 id="modalTitle">Nuova prenotazione</h3>

      <div class="form-grid">
        <div class="field">
          <label>Nome</label>
          <input id="fName" type="text" />
        </div>

        <div class="field">
          <label>Cognome</label>
          <input id="fSurname" type="text" />
        </div>

        <div class="field">
          <label>Telefono</label>
          <input id="fPhone" type="text" />
        </div>

        <div class="field">
          <label>Data</label>
          <input id="fDate" type="date" />
        </div>

        <div class="field">
          <label>Ora inizio</label>
          <input id="fStartTime" type="time" />
        </div>

        <div class="field">
          <label>Durata minuti</label>
          <input id="fDuration" type="number" min="5" step="5" value="30" />
        </div>

        <div class="field">
          <label>Tipo</label>
          <select id="fType">
            <option value="servizio">Servizio</option>
            <option value="giornata">Giornata</option>
            <option value="visita">Visita</option>
          </select>
        </div>

        <div class="field">
          <label>Operatore</label>
          <input id="fOperator" type="text" placeholder="Es. Cosimo" />
        </div>

        <div class="field full">
          <label>Titolo</label>
          <input id="fTitle" type="text" placeholder="Es. Holter cardiaco" />
        </div>

        <div class="field full">
          <label>Note</label>
          <textarea id="fNotes"></textarea>
        </div>
      </div>

      <div class="modal-actions">
        <button class="ghost-btn" onclick="closeBookingModal()">Chiudi</button>
        <button class="save-btn" onclick="saveBooking()">Salva</button>
      </div>
    </div>
  </div>

  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyB7p69J89r5Kwu2YgawkBb9omjojdM4HTM",
      authDomain: "farmaciamontesano.firebaseapp.com",
      projectId: "farmaciamontesano",
      storageBucket: "farmaciamontesano.firebasestorage.app",
      messagingSenderId: "881461241551",
      appId: "1:881461241551:web:c74d6ee74cb857fa5179ba"
    });

    const db = firebase.firestore();

    const HOURS_START = 8;
    const HOURS_END = 20;
    const HOUR_HEIGHT = 64;

    let currentDate = new Date();
    let currentView = "day";
    let currentFilter = "all";
    let allAppointments = [];
    let selectedAppointment = null;
    let editingId = null;

    let miniMonthDate = new Date();

    const hoursCol = document.getElementById("hoursCol");
    const dayGrid = document.getElementById("dayGrid");
    const monthGrid = document.getElementById("monthGrid");
    const currentLabel = document.getElementById("currentLabel");
    const searchInput = document.getElementById("searchInput");

    const detailEmpty = document.getElementById("detailEmpty");
    const detailContent = document.getElementById("detailContent");

    const bookingModal = document.getElementById("bookingModal");

    function pad(n){
      return String(n).padStart(2, "0");
    }

    function formatDateKey(date){
      return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`;
    }

    function formatLongDate(date){
      return date.toLocaleDateString("it-IT", {
        weekday: "long",
        day: "numeric",
        month: "long",
        year: "numeric"
      });
    }

    function timeToMinutes(t){
      const [h,m] = String(t || "00:00").split(":").map(Number);
      return h * 60 + m;
    }

    function minutesToTime(min){
      const h = Math.floor(min / 60);
      const m = min % 60;
      return `${pad(h)}:${pad(m)}`;
    }

    function addMinutesToTime(time, minutes){
      return minutesToTime(timeToMinutes(time) + minutes);
    }

    function daysBetween(dateStr){
      const target = new Date(dateStr + "T00:00:00");
      const now = new Date();
      const diff = now - target;
      return diff / (1000 * 60 * 60 * 24);
    }

    function getStatusClass(status){
      if(status === "cancelled") return "cancelled";
      if(status === "requested") return "requested";
      return "confirmed";
    }

    function getStatusLabel(status){
      if(status === "cancelled") return "Cancellata";
      if(status === "requested") return "Richiesta";
      return "Confermata";
    }

    function getEventColorClass(app){
      if(app.status === "cancelled") return "red";
      if(currentFilter === "recall") return "yellow";
      if(daysBetween(app.date) >= 30 && app.status !== "cancelled") return "yellow";
      return "green";
    }

    function buildHours(){
      hoursCol.innerHTML = "";
      for(let h = HOURS_START; h < HOURS_END; h++){
        const row = document.createElement("div");
        row.className = "hour";
        row.textContent = `${pad(h)}:00`;
        hoursCol.appendChild(row);
      }
      dayGrid.style.height = `${(HOURS_END - HOURS_START) * HOUR_HEIGHT}px`;
    }

    function setView(view){
      currentView = view;

      document.getElementById("viewDayBtn").classList.toggle("active", view === "day");
      document.getElementById("viewMonthBtn").classList.toggle("active", view === "month");

      document.getElementById("dayView").style.display = view === "day" ? "grid" : "none";
      document.getElementById("monthView").style.display = view === "month" ? "block" : "none";

      renderCalendar();
    }

    function goToday(){
      currentDate = new Date();
      miniMonthDate = new Date(currentDate);
      renderMiniCalendar();
      renderCalendar();
    }

    function changeDate(step){
      if(currentView === "day"){
        currentDate.setDate(currentDate.getDate() + step);
      } else {
        currentDate.setMonth(currentDate.getMonth() + step);
      }
      miniMonthDate = new Date(currentDate);
      renderMiniCalendar();
      renderCalendar();
    }

    function setFilter(filter, el){
      currentFilter = filter;
      document.querySelectorAll(".filter-btn").forEach(btn => btn.classList.remove("active"));
      if(el) el.classList.add("active");
      renderCalendar();
      updateCounts();
    }

    function changeMiniMonth(step){
      miniMonthDate.setMonth(miniMonthDate.getMonth() + step);
      renderMiniCalendar();
    }

    function renderMiniCalendar(){
      const miniGrid = document.getElementById("miniGrid");
      const label = document.getElementById("miniMonthLabel");

      const year = miniMonthDate.getFullYear();
      const month = miniMonthDate.getMonth();

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);

      let startWeekDay = firstDay.getDay();
      startWeekDay = startWeekDay === 0 ? 6 : startWeekDay - 1;

      label.textContent = firstDay.toLocaleDateString("it-IT", {
        month: "long",
        year: "numeric"
      });

      miniGrid.innerHTML = "";

      const prevMonthLast = new Date(year, month, 0).getDate();

      for(let i = 0; i < startWeekDay; i++){
        const d = document.createElement("div");
        d.className = "mini-day other";
        d.textContent = prevMonthLast - startWeekDay + i + 1;
        miniGrid.appendChild(d);
      }

      for(let day = 1; day <= lastDay.getDate(); day++){
        const d = new Date(year, month, day);
        const el = document.createElement("div");
        el.className = "mini-day";
        el.textContent = day;

        if(formatDateKey(d) === formatDateKey(new Date())){
          el.classList.add("today");
        }

        if(formatDateKey(d) === formatDateKey(currentDate)){
          el.classList.add("active");
        }

        el.onclick = () => {
          currentDate = new Date(d);
          currentView = "day";
          document.getElementById("viewDayBtn").classList.add("active");
          document.getElementById("viewMonthBtn").classList.remove("active");
          document.getElementById("dayView").style.display = "grid";
          document.getElementById("monthView").style.display = "none";
          renderMiniCalendar();
          renderCalendar();
        };

        miniGrid.appendChild(el);
      }

      const totalShown = startWeekDay + lastDay.getDate();
      const remaining = (7 - (totalShown % 7)) % 7;

      for(let i = 1; i <= remaining; i++){
        const d = document.createElement("div");
        d.className = "mini-day other";
        d.textContent = i;
        miniGrid.appendChild(d);
      }
    }

    function getFilteredAppointments(){
      const query = searchInput.value.trim().toLowerCase();

      return allAppointments.filter(app => {
        const fullName = `${app.clientName || ""} ${app.clientSurname || ""}`.trim().toLowerCase();
        const phone = String(app.clientPhone || "").toLowerCase();
        const title = String(app.title || "").toLowerCase();

        const matchesSearch = !query || fullName.includes(query) || phone.includes(query) || title.includes(query);
        if(!matchesSearch) return false;

        if(currentFilter === "cancelled"){
          return app.status === "cancelled";
        }

        if(currentFilter === "recall"){
          return app.status !== "cancelled" && app.date && daysBetween(app.date) >= 30;
        }

        return true;
      });
    }

    function updateCounts(){
      const query = searchInput.value.trim().toLowerCase();

      const filteredBase = allAppointments.filter(app => {
        const fullName = `${app.clientName || ""} ${app.clientSurname || ""}`.trim().toLowerCase();
        const phone = String(app.clientPhone || "").toLowerCase();
        const title = String(app.title || "").toLowerCase();
        return !query || fullName.includes(query) || phone.includes(query) || title.includes(query);
      });

      document.getElementById("countAll").textContent = filteredBase.length;
      document.getElementById("countRecall").textContent = filteredBase.filter(app => app.status !== "cancelled" && app.date && daysBetween(app.date) >= 30).length;
      document.getElementById("countCancelled").textContent = filteredBase.filter(app => app.status === "cancelled").length;
    }

    function renderCalendar(){
      currentLabel.textContent = formatLongDate(currentDate);
      if(currentView === "day"){
        renderDayView();
      } else {
        renderMonthView();
      }
    }

    function renderDayView(){
      dayGrid.innerHTML = "";

      const dateKey = formatDateKey(currentDate);
      const apps = getFilteredAppointments()
        .filter(app => app.date === dateKey)
        .sort((a,b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime));

      dayGrid.onclick = (e) => {
        if(e.target !== dayGrid) return;

        const rect = dayGrid.getBoundingClientRect();
        const y = e.clientY - rect.top;
        const totalMinutes = Math.floor((y / HOUR_HEIGHT) * 60) + (HOURS_START * 60);
        const snapped = Math.max(HOURS_START * 60, Math.min((HOURS_END * 60) - 30, Math.round(totalMinutes / 15) * 15));
        openNewBookingModal(dateKey, minutesToTime(snapped));
      };

      apps.forEach(app => {
        const startMin = timeToMinutes(app.startTime);
        const endMin = timeToMinutes(app.endTime || addMinutesToTime(app.startTime, app.durationMinuti || 30));
        const top = ((startMin - (HOURS_START * 60)) / 60) * HOUR_HEIGHT;
        const height = Math.max(42, ((endMin - startMin) / 60) * HOUR_HEIGHT - 4);

        const ev = document.createElement("div");
        ev.className = `event ${getEventColorClass(app)}`;
        ev.style.top = `${top + 2}px`;
        ev.style.height = `${height}px`;

        ev.innerHTML = `
          <div class="event-client">${escapeHtml((app.clientName || "") + " " + (app.clientSurname || ""))}</div>
          <div class="event-title">${escapeHtml(app.title || "Prenotazione")}</div>
          <div class="event-time">${escapeHtml(app.startTime || "")} - ${escapeHtml(app.endTime || "")}</div>
        `;

        ev.onclick = (event) => {
          event.stopPropagation();
          selectAppointment(app);
        };

        dayGrid.appendChild(ev);
      });
    }

    function renderMonthView(){
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);

      let startWeekDay = firstDay.getDay();
      startWeekDay = startWeekDay === 0 ? 6 : startWeekDay - 1;

      const days = [];
      const prevMonthLast = new Date(year, month, 0).getDate();

      for(let i = 0; i < startWeekDay; i++){
        days.push({
          date: new Date(year, month - 1, prevMonthLast - startWeekDay + i + 1),
          other: true
        });
      }

      for(let day = 1; day <= lastDay.getDate(); day++){
        days.push({
          date: new Date(year, month, day),
          other: false
        });
      }

      while(days.length % 7 !== 0){
        const nextDay = days.length - (startWeekDay + lastDay.getDate()) + 1;
        days.push({
          date: new Date(year, month + 1, nextDay),
          other: true
        });
      }

      const filtered = getFilteredAppointments();
      monthGrid.innerHTML = "";

      days.forEach(item => {
        const key = formatDateKey(item.date);
        const dayApps = filtered.filter(app => app.date === key).sort((a,b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime));
        const cell = document.createElement("div");
        cell.className = `month-cell ${item.other ? "other" : ""} ${formatDateKey(item.date) === formatDateKey(new Date()) ? "today" : ""}`;

        cell.onclick = () => {
          currentDate = new Date(item.date);
          setView("day");
          renderMiniCalendar();
        };

        let inner = `
          <div class="month-cell-header">
            <span>${item.date.getDate()}</span>
            <span></span>
          </div>
        `;

        dayApps.slice(0,4).forEach(app => {
          inner += `<div class="month-event ${getEventColorClass(app)}">${escapeHtml(app.startTime || "")} ${escapeHtml((app.clientName || "") + " " + (app.clientSurname || ""))}</div>`;
        });

        if(dayApps.length > 4){
          inner += `<div class="month-event" style="background:#f1f4f2;color:#60716b;">+${dayApps.length - 4} altri</div>`;
        }

        cell.innerHTML = inner;
        monthGrid.appendChild(cell);
      });
    }

    function selectAppointment(app){
      selectedAppointment = app;

      detailEmpty.style.display = "none";
      detailContent.style.display = "block";

      document.getElementById("detailName").textContent = `${app.clientName || ""} ${app.clientSurname || ""}`.trim() || "Cliente";
      document.getElementById("detailPhone").textContent = app.clientPhone || "—";

      const statusEl = document.getElementById("detailStatus");
      statusEl.className = `status-pill ${getStatusClass(app.status)}`;
      statusEl.textContent = getStatusLabel(app.status);

      document.getElementById("detailDate").textContent = app.date || "—";
      document.getElementById("detailTime").textContent = `${app.startTime || "—"} - ${app.endTime || "—"}`;
      document.getElementById("detailType").textContent = app.type || "—";
      document.getElementById("detailTitle").textContent = app.title || "—";
      document.getElementById("detailDuration").textContent = `${app.durationMinuti || 30} min`;
      document.getElementById("detailOperator").textContent = app.operatorName || "—";
      document.getElementById("detailNotes").textContent = app.notes || "—";
    }

    function openNewBookingModal(date = "", time = ""){
      editingId = null;
      document.getElementById("modalTitle").textContent = "Nuova prenotazione";

      document.getElementById("fName").value = "";
      document.getElementById("fSurname").value = "";
      document.getElementById("fPhone").value = "";
      document.getElementById("fDate").value = date || formatDateKey(currentDate);
      document.getElementById("fStartTime").value = time || "09:00";
      document.getElementById("fDuration").value = 30;
      document.getElementById("fType").value = "servizio";
      document.getElementById("fOperator").value = "";
      document.getElementById("fTitle").value = "";
      document.getElementById("fNotes").value = "";

      bookingModal.classList.add("show");
    }

    function openEditSelected(){
      if(!selectedAppointment) return;

      editingId = selectedAppointment.id;
      document.getElementById("modalTitle").textContent = "Modifica prenotazione";

      document.getElementById("fName").value = selectedAppointment.clientName || "";
      document.getElementById("fSurname").value = selectedAppointment.clientSurname || "";
      document.getElementById("fPhone").value = selectedAppointment.clientPhone || "";
      document.getElementById("fDate").value = selectedAppointment.date || "";
      document.getElementById("fStartTime").value = selectedAppointment.startTime || "09:00";
      document.getElementById("fDuration").value = selectedAppointment.durationMinuti || 30;
      document.getElementById("fType").value = selectedAppointment.type || "servizio";
      document.getElementById("fOperator").value = selectedAppointment.operatorName || "";
      document.getElementById("fTitle").value = selectedAppointment.title || "";
      document.getElementById("fNotes").value = selectedAppointment.notes || "";

      bookingModal.classList.add("show");
    }

    function openMoveSelected(){
      if(!selectedAppointment) return;

      editingId = selectedAppointment.id;
      document.getElementById("modalTitle").textContent = "Sposta prenotazione";

      document.getElementById("fName").value = selectedAppointment.clientName || "";
      document.getElementById("fSurname").value = selectedAppointment.clientSurname || "";
      document.getElementById("fPhone").value = selectedAppointment.clientPhone || "";
      document.getElementById("fDate").value = selectedAppointment.date || "";
      document.getElementById("fStartTime").value = selectedAppointment.startTime || "09:00";
      document.getElementById("fDuration").value = selectedAppointment.durationMinuti || 30;
      document.getElementById("fType").value = selectedAppointment.type || "servizio";
      document.getElementById("fOperator").value = selectedAppointment.operatorName || "";
      document.getElementById("fTitle").value = selectedAppointment.title || "";
      document.getElementById("fNotes").value = selectedAppointment.notes || "";

      bookingModal.classList.add("show");
    }

    function closeBookingModal(){
      bookingModal.classList.remove("show");
    }

    async function saveBooking(){
      const name = document.getElementById("fName").value.trim();
      const surname = document.getElementById("fSurname").value.trim();
      const phone = document.getElementById("fPhone").value.trim();
      const date = document.getElementById("fDate").value;
      const startTime = document.getElementById("fStartTime").value;
      const duration = parseInt(document.getElementById("fDuration").value || "30", 10);
      const type = document.getElementById("fType").value;
      const operatorName = document.getElementById("fOperator").value.trim();
      const title = document.getElementById("fTitle").value.trim();
      const notes = document.getElementById("fNotes").value.trim();

      if(!name || !phone || !date || !startTime || !title){
        alert("Compila almeno nome, telefono, data, ora e titolo.");
        return;
      }

      const endTime = addMinutesToTime(startTime, duration);

      const payload = {
        clientName: name,
        clientSurname: surname,
        clientPhone: phone,
        date,
        startTime,
        endTime,
        durationMinuti: duration,
        type,
        title,
        operatorName,
        notes,
        status: editingId && selectedAppointment ? (selectedAppointment.status || "confirmed") : "confirmed",
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      };

      if(editingId){
        await db.collection("appointments").doc(editingId).update(payload);
      } else {
        payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        await db.collection("appointments").add(payload);
      }

      closeBookingModal();
    }

    async function cancelSelected(){
      if(!selectedAppointment || !selectedAppointment.id) return;
      const ok = confirm("Vuoi davvero cancellare questa prenotazione?");
      if(!ok) return;

      await db.collection("appointments").doc(selectedAppointment.id).update({
        status: "cancelled",
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }

    function escapeHtml(text){
      return String(text || "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");
    }

    function listenAppointments(){
      db.collection("appointments").onSnapshot((snap) => {
        allAppointments = snap.docs.map(doc => ({
          id: doc.id,
          ...doc.data()
        }));

        const stillSelected = selectedAppointment
          ? allAppointments.find(a => a.id === selectedAppointment.id)
          : null;

        if(stillSelected){
          selectedAppointment = stillSelected;
          selectAppointment(stillSelected);
        } else {
          selectedAppointment = null;
          detailEmpty.style.display = "flex";
          detailContent.style.display = "none";
        }

        updateCounts();
        renderCalendar();
      });
    }

    searchInput.addEventListener("input", () => {
      updateCounts();
      renderCalendar();
    });

    buildHours();
    renderMiniCalendar();
    renderCalendar();
    listenAppointments();
  </script>
</body>
</html>
