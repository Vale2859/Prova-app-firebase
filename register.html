<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Registrati | Farmacia Montesano</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root{
      --bg:#f4f7f5;
      --card:#ffffff;
      --text:#17352f;
      --text-soft:#6c7c76;
      --green:#0d7a5f;
      --green-2:#1b8b6d;
      --line:#e4ece8;
      --shadow:0 16px 34px rgba(16,50,42,0.08);
      --danger:#c94646;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}

    body{
      font-family:"Inter",sans-serif;
      background:
        radial-gradient(circle at top left, #fcfffd 0%, #f4f8f6 45%, #eef4f1 100%);
      color:var(--text);
      min-height:100vh;
    }

    .page{
      width:min(100%, 430px);
      margin:0 auto;
      min-height:100vh;
      padding:14px 14px 28px;
    }

    .brand-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:16px;
      display:flex;
      justify-content:center;
    }

    .brand-logo{
      width:100%;
      max-width:220px;
      display:block;
    }

    .topbar{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:14px;
    }

    .back-btn{
      width:50px;
      height:50px;
      border:none;
      border-radius:14px;
      background:rgba(255,255,255,0.88);
      box-shadow:var(--shadow);
      font-size:22px;
      color:var(--text);
      cursor:pointer;
      flex:0 0 50px;
    }

    .title-wrap{
      flex:1;
      min-width:0;
    }

    .page-title{
      margin:0;
      font-size:1.8rem;
      line-height:1;
      font-weight:900;
      letter-spacing:-0.04em;
    }

    .page-subtitle{
      margin:5px 0 0;
      font-size:.95rem;
      color:var(--text-soft);
      font-weight:600;
      line-height:1.35;
    }

    .panel{
      background:#fff;
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:18px;
    }

    .field{
      margin-bottom:14px;
    }

    .field label{
      display:block;
      margin-bottom:8px;
      font-size:1rem;
      font-weight:800;
      color:#23463d;
    }

    .field input{
      width:100%;
      min-height:58px;
      border:1px solid #dbe7e2;
      border-radius:18px;
      padding:0 18px;
      font-size:1rem;
      font-weight:600;
      color:var(--text);
      outline:none;
      background:#fff;
    }

    .field input::placeholder{
      color:#a0aba6;
      font-weight:600;
    }

    .action-btn{
      width:100%;
      min-height:58px;
      border:none;
      border-radius:18px;
      background:linear-gradient(135deg,#1a8b6c 0%, #58a891 100%);
      color:#fff;
      font-size:1.05rem;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 18px 34px rgba(26,139,108,0.18);
    }

    .bottom-link{
      margin-top:14px;
      text-align:center;
      font-size:.95rem;
      color:var(--text-soft);
      font-weight:700;
    }

    .bottom-link a{
      color:var(--green);
      font-weight:900;
    }

    .status{
      margin-top:12px;
      border-radius:16px;
      padding:12px 14px;
      font-size:.95rem;
      font-weight:800;
      display:none;
    }

    .status.ok{
      display:block;
      background:#ebf8f1;
      color:#1f7459;
    }

    .status.error{
      display:block;
      background:#fff1f1;
      color:var(--danger);
    }
  </style>

  <link rel="stylesheet" href="mobile-only.css" />
  <link rel="stylesheet" href="app-fixes.css" />
  <style>body{opacity:0} body.loaded{opacity:1;transition:.25s ease}</style>
</head>
<body>
  <main class="page">
    <header class="brand-card">
      <img src="logo.png" alt="Logo Farmacia Montesano" class="brand-logo" />
    </header>

    <div class="topbar">
      <button class="back-btn" onclick="history.back()" aria-label="Indietro">←</button>
      <div class="title-wrap">
        <h1 class="page-title">Registrati</h1>
        <p class="page-subtitle">Crea il tuo profilo cliente Farmacia Montesano</p>
      </div>
    </div>

    <section class="panel">
      <div class="field">
        <label for="nome">Nome</label>
        <input id="nome" type="text" placeholder="Nome" />
      </div>

      <div class="field">
        <label for="cognome">Cognome</label>
        <input id="cognome" type="text" placeholder="Cognome" />
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="nome@email.it" />
      </div>

      <div class="field">
        <label for="telefono">Telefono</label>
        <input id="telefono" type="text" placeholder="Telefono" />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Password" />
      </div>

      <button class="action-btn" id="registerBtn">Registrati</button>

      <div id="statusBox" class="status"></div>

      <div class="bottom-link">
        Hai già un account? <a href="login.html">Accedi</a>
      </div>
    </section>
  </main>

  <script type="module">
    import {
      auth,
      firestore,
      createUserWithEmailAndPassword,
      updateProfile,
      doc,
      setDoc
    } from "./firebase.js";

    const nomeEl = document.getElementById("nome");
    const cognomeEl = document.getElementById("cognome");
    const emailEl = document.getElementById("email");
    const telefonoEl = document.getElementById("telefono");
    const passwordEl = document.getElementById("password");
    const registerBtn = document.getElementById("registerBtn");
    const statusBox = document.getElementById("statusBox");

    function getRedirectTarget() {
      const params = new URLSearchParams(window.location.search);
      return params.get("redirect") || "index.html";
    }

    function showStatus(message, type = "ok") {
      statusBox.textContent = message;
      statusBox.className = `status ${type}`;
    }

    function makeClientCode(uid) {
      return "FM" + uid.slice(0, 8).toUpperCase();
    }

    registerBtn.addEventListener("click", async () => {
      const nome = nomeEl.value.trim();
      const cognome = cognomeEl.value.trim();
      const email = emailEl.value.trim();
      const telefono = telefonoEl.value.trim();
      const password = passwordEl.value;

      if (!nome || !cognome || !email || !password) {
        showStatus("Compila almeno nome, cognome, email e password.", "error");
        return;
      }

      registerBtn.disabled = true;
      showStatus("Registrazione in corso...", "ok");

      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        const user = cred.user;
        const fullName = `${nome} ${cognome}`.trim();
        const clientCode = makeClientCode(user.uid);

        await updateProfile(user, { displayName: fullName });

        await setDoc(doc(firestore, "users", user.uid), {
          nome,
          cognome,
          email,
          telefono,
          clientId: clientCode,
          clientCode,
          fidelityCard: clientCode,
          punti: 0,
          groupId: null,
          groupRole: null,
          premiRiscattati: 0,
          puntiAnnuali: 0,
          passaggiAnnuali: 0,
          spesaAnnuaNumero: 0,
          spesaAnnua: "0,00 €",
          createdAt: new Date().toISOString()
        });

        window.location.replace(getRedirectTarget());
      } catch (error) {
        console.error(error);
        let message = "Registrazione non riuscita. Controlla i dati inseriti.";
        if (error?.code === "auth/email-already-in-use") {
          message = "Questa email è già registrata.";
        } else if (error?.code === "auth/invalid-email") {
          message = "Email non valida.";
        } else if (error?.code === "auth/weak-password") {
          message = "Password troppo debole. Usa almeno 6 caratteri.";
        } else if (error?.code === "auth/network-request-failed") {
          message = "Connessione assente o instabile.";
        } else if (error?.code === "auth/unauthorized-domain") {
          message = "Questo dominio non è autorizzato in Firebase Authentication.";
        } else if (error?.code === "auth/operation-not-allowed") {
          message = "Metodo email/password non attivo su Firebase Authentication.";
        }
        showStatus(message, "error");
      } finally {
        registerBtn.disabled = false;
      }
    });
  </script>

  <script src="mobile-only.js"></script>
  <script src="app-fixes.js"></script>
<script>window.addEventListener("load",()=>document.body.classList.add("loaded"));</script>
</body>
</html>
