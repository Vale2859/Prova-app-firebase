<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Titolare | Farmacia Montesano</title>

  <style>
    :root{
      --bg:#eef1ef;
      --card:#f8faf9;
      --card-2:#f3f6f4;
      --line:#e3e9e5;
      --shadow:0 10px 24px rgba(20,55,47,.08);
      --radius-xl:34px;
      --radius-lg:28px;
      --radius-md:24px;
      --radius-sm:20px;
      --safe-top:max(12px, env(safe-area-inset-top));
      --safe-bottom:max(14px, env(safe-area-inset-bottom));
      --safe-left:max(12px, env(safe-area-inset-left));
      --safe-right:max(12px, env(safe-area-inset-right));
    }

    *{ box-sizing:border-box; }
    html,body{ margin:0; padding:0; }
    body{
      background:linear-gradient(180deg,#f3f5f4 0%, #ecefed 100%);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
      color:#17352f;
    }

    .page{
      width:min(100%, 430px);
      margin:0 auto;
      min-height:100vh;
      padding:
        calc(var(--safe-top) + 10px)
        calc(var(--safe-right) + 10px)
        calc(var(--safe-bottom) + 18px)
        calc(var(--safe-left) + 10px);
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      margin-bottom:12px;
      padding:0 4px;
    }

    .logo-mini{
      width:100%;
      max-width:180px;
      display:block;
    }

    .calendar-hero,
    .info-strip,
    .mini-card{
      background:rgba(255,255,255,.72);
      backdrop-filter:blur(10px);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
    }

    .calendar-hero{
      border-radius:var(--radius-xl);
      min-height:190px;
      padding:14px;
      margin-bottom:12px;
      display:flex;
      align-items:stretch;
    }

    .calendar-placeholder{
      flex:1;
      border-radius:28px;
      background:
        linear-gradient(180deg, rgba(236,241,238,.82), rgba(227,234,229,.94)),
        url("hero-farmacia.jpg") center/cover no-repeat;
      border:1px solid #e7ede9;
      position:relative;
      overflow:hidden;
    }

    .calendar-placeholder::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,.45), rgba(255,255,255,.08));
    }

    .calendar-header-line{
      position:absolute;
      top:18px;
      left:18px;
      right:18px;
      height:16px;
      border-radius:999px;
      background:rgba(255,255,255,.55);
      z-index:1;
    }

    .calendar-big-zone{
      position:absolute;
      left:18px;
      right:18px;
      top:50px;
      bottom:18px;
      border-radius:22px;
      background:rgba(255,255,255,.30);
      border:1px solid rgba(255,255,255,.22);
      z-index:1;
    }

    .info-strip{
      min-height:62px;
      border-radius:var(--radius-lg);
      margin-bottom:14px;
      padding:10px 14px;
      display:flex;
      align-items:center;
    }

    .info-strip-inner{
      width:100%;
      height:40px;
      border-radius:16px;
      background:linear-gradient(90deg,#eef2f0 0%, #e8edeb 100%);
      border:1px solid #edf1ef;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }

    .mini-card{
      min-height:188px;
      border-radius:30px;
      position:relative;
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(240,245,243,.92), rgba(231,237,234,.98)),
        url("card-placeholder.jpg") center/cover no-repeat;
    }

    .mini-card::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.02));
    }

    .mini-card-image{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      opacity:.22;
    }

    .mini-card-footer{
      position:absolute;
      left:14px;
      right:14px;
      bottom:14px;
      height:64px;
      border-radius:22px;
      background:rgba(255,255,255,.22);
      backdrop-filter:blur(4px);
      border:1px solid rgba(255,255,255,.22);
    }

    .mini-card,
    .calendar-hero,
    .info-strip{
      pointer-events:none;
      user-select:none;
    }

    @media (max-width:390px){
      .logo-mini{ max-width:165px; }
      .calendar-hero{ min-height:176px; }
      .mini-card{ min-height:176px; }
      .mini-card-footer{ height:58px; }
    }
  </style>
</head>
<body>
  <main class="page">

    <!-- LOGO PICCOLO A SINISTRA -->
    <header class="topbar">
      <img src="logo.png" alt="Farmacia Montesano" class="logo-mini" />
    </header>

    <!-- RIQUADRO GRANDE SOPRA PER CALENDARIO -->
    <section class="calendar-hero">
      <div class="calendar-placeholder">
        <div class="calendar-header-line"></div>
        <div class="calendar-big-zone"></div>
      </div>
    </section>

    <!-- RIQUADRO PICCOLO BASSO E LUNGO -->
    <section class="info-strip">
      <div class="info-strip-inner"></div>
    </section>

    <!-- 4 CARD IMPORTANTI -->
    <section class="grid">
      <div class="mini-card">
        <img src="servizi.jpg" alt="" class="mini-card-image">
        <div class="mini-card-footer"></div>
      </div>

      <div class="mini-card">
        <img src="promo.jpg" alt="" class="mini-card-image">
        <div class="mini-card-footer"></div>
      </div>

      <div class="mini-card">
        <img src="beauty.jpg" alt="" class="mini-card-image">
        <div class="mini-card-footer"></div>
      </div>

      <div class="mini-card">
        <img src="turni.jpg" alt="" class="mini-card-image">
        <div class="mini-card-footer"></div>
      </div>
    </section>

  </main>
</body>
</html>
