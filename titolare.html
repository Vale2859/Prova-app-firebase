<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titolare</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .header {
      background: white;
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #eee;
    }

    .logo {
      max-width: 250px;
    }

    .spacer {
      height: 120px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 12px;
    }

    .card {
      height: 140px;
      border-radius: 20px;
      background: #e0e0e0;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <img src="logo.png" class="logo">
  </div>

  <!-- SPAZIO VUOTO -->
  <div class="spacer"></div>

  <!-- CARD VUOTE -->
  <div class="grid">
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
  </div>

</body>
</html>
