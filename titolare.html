<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Titolare | Farmacia Montesano</title>

  <style>
    :root{
      --bg:#eef1ef;
      --panel:#f7f9f8;
      --panel-2:#f2f5f3;
      --line:#dfe7e2;
      --shadow:0 8px 20px rgba(18,48,40,.06);
      --text:#17352f;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
      color:var(--text);
      overflow:hidden;
      height:100%;
    }

    body{
      min-height:100vh;
    }

    .app{
      width:min(100%, 430px);
      margin:0 auto;
      min-height:100vh;
      padding:10px 10px 14px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .logo-wrap{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      padding:2px 2px 0;
      flex:0 0 auto;
    }

    .logo{
      width:150px;
      max-width:48vw;
      height:auto;
      display:block;
    }

    .calendar-box{
      position:relative;
      flex:0 0 210px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:12px;
      box-shadow:var(--shadow);
      padding:10px;
      overflow:hidden;
    }

    .calendar-top-line{
      height:12px;
      border-radius:8px;
      background:linear-gradient(90deg,#eef2f0 0%, #e6ebe8 100%);
      margin-bottom:10px;
    }

    .calendar-main{
      height:166px;
      border-radius:10px;
      background:
        linear-gradient(180deg, rgba(241,245,243,.88), rgba(231,237,233,.96)),
        url("hero-farmacia.jpg") center/cover no-repeat;
      border:1px solid #e6ece8;
      position:relative;
      overflow:hidden;
    }

    .calendar-main::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,.30), rgba(255,255,255,.06));
    }

    .cards-grid{
      flex:1 1 auto;
      display:grid;
      grid-template-columns:1fr 1fr;
      grid-template-rows:1fr 1fr;
      gap:8px;
      min-height:0;
    }

    .card{
      position:relative;
      background:var(--panel-2);
      border:1px solid var(--line);
      border-radius:14px;
      box-shadow:var(--shadow);
      overflow:hidden;
      min-height:0;
    }

    .card img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      opacity:.16;
    }

    .card::after{
      content:"";
      position:absolute;
      left:10px;
      right:10px;
      bottom:10px;
      height:42px;
      border-radius:12px;
      background:rgba(255,255,255,.24);
      border:1px solid rgba(255,255,255,.22);
      backdrop-filter:blur(3px);
    }

    .hint{
      position:absolute;
      top:10px;
      right:12px;
      font-size:11px;
      color:#6d7f79;
      font-weight:700;
      letter-spacing:.02em;
      z-index:2;
      opacity:.8;
    }

    @media (max-width:390px){
      .app{
        padding:8px 8px 12px;
        gap:8px;
      }

      .logo{
        width:138px;
      }

      .calendar-box{
        flex-basis:190px;
        padding:8px;
      }

      .calendar-main{
        height:150px;
      }

      .card::after{
        left:8px;
        right:8px;
        bottom:8px;
        height:38px;
      }
    }
  </style>
</head>
<body>
  <main class="app" id="swipeArea">
    <div class="logo-wrap">
      <img src="logo.png" alt="Farmacia Montesano" class="logo" />
    </div>

    <section class="calendar-box">
      <div class="hint">Scorri a sinistra →</div>
      <div class="calendar-top-line"></div>
      <div class="calendar-main"></div>
    </section>

    <section class="cards-grid">
      <div class="card">
        <img src="servizi.jpg" alt="">
      </div>

      <div class="card">
        <img src="promo.jpg" alt="">
      </div>

      <div class="card">
        <img src="beauty.jpg" alt="">
      </div>

      <div class="card">
        <img src="turni.jpg" alt="">
      </div>
    </section>
  </main>

  <script>
    (function () {
      let startX = 0;
      let startY = 0;
      let isTouching = false;

      document.addEventListener("touchstart", function (e) {
        if (!e.touches || !e.touches.length) return;
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        isTouching = true;
      }, { passive: true });

      document.addEventListener("touchend", function (e) {
        if (!isTouching || !e.changedTouches || !e.changedTouches.length) return;

        const endX = e.changedTouches[0].clientX;
        const endY = e.changedTouches[0].clientY;

        const diffX = startX - endX;
        const diffY = Math.abs(startY - endY);

        if (diffX > 80 && diffY < 40) {
          window.location.href = "gestione.html";
        }

        isTouching = false;
      }, { passive: true });
    })();
  </script>
</body>
</html>
