<script>

let appointments = [];
let selectedDate = new Date();

/* FIREBASE LISTENER */
db.collection("appointments").onSnapshot(snapshot => {
  appointments = snapshot.docs.map(doc => ({
    id: doc.id,
    ...doc.data()
  }));
  renderWidget();
});

/* FORMAT */
function formatDate(date){
  return date.toISOString().split("T")[0];
}

/* WIDGET */
function renderWidget(){
  const today = new Date();
  const todayKey = formatDate(today);

  widgetWeekday.textContent = today.toLocaleDateString("it-IT",{weekday:"long"}).toUpperCase();
  widgetDayNumber.textContent = today.getDate();

  const events = appointments.filter(a => a.date === todayKey);

  if(events.length === 0){
    widgetEmptyLabel.textContent = "Oggi non ci sono eventi";
    widgetEventsWrap.innerHTML = "";
  } else {
    widgetEmptyLabel.textContent = "Oggi " + events.length + " eventi";

    widgetEventsWrap.innerHTML = events.slice(0,2).map(e => `
      <div class="widget-event ${getTypeClass(e)}">
        <div class="widget-event-name">${e.title}</div>
        <div class="widget-event-time">${e.startTime} - ${e.endTime}</div>
      </div>
    `).join("");
  }
}

/* OPEN CALENDAR */
function openWeek(){
  selectedDate = new Date();
  renderCalendar();
  weekOverlay.classList.add("show");
}

/* RENDER */
function renderCalendar(){
  renderWeek();
  renderDay();
}

/* WEEK */
function renderWeek(){
  const container = weekStrip;
  container.innerHTML = "";

  let start = new Date(selectedDate);
  start.setDate(start.getDate() - start.getDay() + 1);

  for(let i=0;i<7;i++){
    let d = new Date(start);
    d.setDate(start.getDate()+i);

    const el = document.createElement("button");
    el.className = "week-day";

    if(formatDate(d) === formatDate(new Date())){
      el.classList.add("today");
    }

    if(formatDate(d) === formatDate(selectedDate)){
      el.classList.add("active");
    }

    el.innerHTML = `
      <small>${d.toLocaleDateString("it-IT",{weekday:"short"})}</small>
      <strong>${d.getDate()}</strong>
    `;

    el.onclick = () => {
      selectedDate = d;
      renderCalendar();
    };

    container.appendChild(el);
  }
}

/* DAY */
function renderDay(){
  const container = dayTimeline;
  container.innerHTML = "";

  const dayKey = formatDate(selectedDate);

  const events = appointments
    .filter(a => a.date === dayKey)
    .sort((a,b)=>a.startTime.localeCompare(b.startTime));

  if(events.length === 0){
    container.innerHTML = `<div class="empty-state">Nessun evento</div>`;
    return;
  }

  container.innerHTML = events.map(e => `
    <div class="day-block">
      <div class="day-hour">${e.startTime}</div>
      <div class="day-card ${getTypeClass(e)}" onclick="openDetail('${e.id}')">
        <div class="day-card-title">${e.title}</div>
        <div class="day-card-meta">${e.clientName || ""}</div>
      </div>
    </div>
  `).join("");
}

/* DETAIL */
function openDetail(id){
  const e = appointments.find(a=>a.id===id);

  if(!e) return;

  document.getElementById("detailTitle").innerText = e.title;
  document.getElementById("detailTime").innerText = e.startTime + " - " + e.endTime;
  document.getElementById("detailClient").innerText = (e.clientName||"") + " " + (e.clientSurname||"");
  document.getElementById("detailPhone").innerText = e.clientPhone || "-";
  document.getElementById("detailOperator").innerText = e.operatorName || "-";

  detailBackdrop.classList.add("show");
}

/* CLOSE */
function closeDetail(){
  detailBackdrop.classList.remove("show");
}

/* TYPE */
function getTypeClass(e){
  if(e.type === "personale") return "personale";
  if(e.type === "farmacia") return "farmacia";
  return "client";
}

</script>
