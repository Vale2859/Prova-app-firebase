<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Impostazioni LDF</title><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script><script src="internal-common.js"></script><style>:root{--bg:#eef3f0;--card:#fff;--line:#dde5e0;--text:#1f3c35;--muted:#6f837c;--green:#3e8b61;--green2:#66b187;--green-dark:#1d5a40;--shadow:0 12px 28px rgba(0,0,0,.07)}*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif}html,body{margin:0}body{background:linear-gradient(180deg,#f4f7f5,#e9efec);color:var(--text)}.app{width:min(100%,430px);margin:0 auto;padding:14px 14px 24px}.hero{background:linear-gradient(135deg,var(--green-dark),var(--green),var(--green2));color:#fff;border-radius:28px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}.back{display:inline-flex;align-items:center;gap:8px;text-decoration:none;color:#fff;font-size:16px;font-weight:900;margin-bottom:12px}.hero-title{font-size:28px;font-weight:900;margin:0 0 8px}.hero-sub{font-size:14px;opacity:.95;font-weight:700;margin:0 0 14px}.section{background:#fff;border-radius:24px;padding:16px;border:1px solid var(--line);box-shadow:var(--shadow)}.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}.field label{display:block;font-size:13px;font-weight:800;color:var(--muted);margin-bottom:6px}.field input{width:100%;min-height:50px;border-radius:16px;border:1px solid var(--line);background:#f7faf8;padding:0 14px;font-size:16px}.btn{width:100%;min-height:50px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;font-weight:900}.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(120px);background:#17211d;color:#fff;min-height:46px;padding:0 16px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;box-shadow:0 18px 40px rgba(0,0,0,.22);z-index:9999;transition:transform .25s ease}.toast.show{transform:translateX(-50%) translateY(0)}</style></head><body><div class="app"><section class="hero"><a class="back" href="dashboard-admin.html">← Torna</a><div class="hero-title">Impostazioni LDF</div><div class="hero-sub">Questi valori si inseriscono una sola volta e valgono per tutti i mesi, finché non li cambi.</div></section><div class="section"><div class="row2"><div class="field"><label>Obiettivo minimo personale</label><input id="minPersonal" type="number"></div><div class="field"><label>Obiettivo massimo personale</label><input id="maxPersonal" type="number"></div></div><div class="row2"><div class="field"><label>Target gruppo per persona</label><input id="groupPerPerson" type="number"></div><div class="field"><label>Totale gruppo mensile</label><input id="groupMonthlyTarget" type="number"></div></div><button class="btn" id="saveBtn">Salva impostazioni</button></div></div><div class="toast" id="toast"></div><script>const A=window.InternalApp,t=document.getElementById('toast');function showToast(m){t.textContent=m;t.classList.add('show');clearTimeout(showToast.t);showToast.t=setTimeout(()=>t.classList.remove('show'),1400)};(async()=>{const d=await A.getDocSafe('ldf_settings','current')||{minPersonal:121,maxPersonal:150,groupPerPerson:150,groupMonthlyTarget:450}; ['minPersonal','maxPersonal','groupPerPerson','groupMonthlyTarget'].forEach(k=>document.getElementById(k).value=d[k]??'');})();saveBtn.onclick=async()=>{await A.setDocMerge('ldf_settings','current',{minPersonal:Number(minPersonal.value||121),maxPersonal:Number(maxPersonal.value||150),groupPerPerson:Number(groupPerPerson.value||150),groupMonthlyTarget:Number(groupMonthlyTarget.value||450),updatedAt:new Date().toISOString(),updatedBy:'Valerio'});showToast('Impostazioni salvate');};</script></body></html>
