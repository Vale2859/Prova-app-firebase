<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>LDF admin</title><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script><script src="internal-common.js"></script><style>:root{--bg:#eef3f0;--card:#fff;--line:#dde5e0;--text:#1f3c35;--muted:#6f837c;--green:#3e8b61;--yellow:#d6a43a;--red:#ff6b5f;--shadow:0 12px 28px rgba(0,0,0,.07)}*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif}html,body{margin:0}body{background:linear-gradient(180deg,#f4f7f5,#e9efec);color:var(--text)}.app{width:min(100%,430px);margin:0 auto;padding:14px 14px 24px}.hero{background:linear-gradient(135deg,#1d5a40,#3e8b61,#66b187);color:#fff;border-radius:28px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}.back{display:inline-flex;align-items:center;gap:8px;text-decoration:none;color:#fff;font-size:16px;font-weight:900;margin-bottom:12px}.hero-title{font-size:28px;font-weight:900;margin:0 0 8px}.hero-sub{font-size:14px;opacity:.95;font-weight:700;margin:0 0 14px}.hero-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.hero-stat{min-height:78px;border-radius:18px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.15);padding:12px;display:flex;flex-direction:column;justify-content:space-between}.hero-stat strong{font-size:28px;font-weight:900}.hero-stat span{font-size:12px;font-weight:800}.pillbar{display:flex;gap:8px;margin-bottom:12px}.pill{flex:1;min-height:46px;border:none;border-radius:18px;background:#fff;border:1px solid var(--line);font-size:14px;font-weight:900}.pill.active{background:linear-gradient(135deg,#3e8b61,#66b187);color:#fff}.section{background:#fff;border-radius:24px;padding:16px;border:1px solid var(--line);box-shadow:var(--shadow);margin-bottom:14px}.section-title{font-size:20px;font-weight:900;margin:0 0 10px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.card{background:#fff;border-radius:22px;padding:16px;border:1px solid var(--line);box-shadow:var(--shadow)}.title{font-size:16px;font-weight:900}.sub{font-size:12px;color:var(--muted);margin-top:4px}.kpi{font-size:28px;font-weight:900}.list{display:grid;gap:10px}</style></head><body><div class="app"><section class="hero"><a class="back" href="dashboard-admin.html">← Torna</a><div class="hero-title">Obiettivi LDF</div><div class="hero-sub" id="heroSub">Panoramica gruppo e dipendenti.</div><div class="hero-stats"><div class="hero-stat"><strong id="groupPerc">0%</strong><span>Gruppo</span></div><div class="hero-stat"><strong id="lastUpd">—</strong><span>Ultimo aggiornamento</span></div></div></section><div class="pillbar"><button class="pill active" onclick="location.href='ldf-admin.html'">Panoramica</button><button class="pill" onclick="location.href='ldf-admin-editor.html'">Aggiorna mese</button><button class="pill" onclick="location.href='ldf-impostazioni.html'">Impostazioni</button></div><div class="section"><div class="section-title">Gruppo</div><div class="grid"><div class="card"><div class="kpi" id="groupDoneBox">0</div><div class="sub">Fatto</div></div><div class="card"><div class="kpi" id="groupTargetBox">0</div><div class="sub">Target</div></div></div></div><div class="section"><div class="section-title">Dipendenti</div><div class="list" id="employeeList"></div></div></div><script>const A=window.InternalApp;async function load(){const key=A.monthKey();const settings=await A.getDocSafe('ldf_settings','current')||{minPersonal:121,maxPersonal:150,groupMonthlyTarget:450};const monthly=await A.getDocSafe('ldf_monthly',key)||{employees:{},groupDone:0};const gd=Number(monthly.groupDone||0),gt=Number(settings.groupMonthlyTarget||450),gp=gt>0?Math.round(gd/gt*100):0;groupPerc.textContent=gp+'%';groupDoneBox.textContent=gd;groupTargetBox.textContent=gt;lastUpd.textContent=monthly.updatedAt?A.fmtDateIT(monthly.updatedAt.slice(0,10)):'—';heroSub.textContent=A.monthLabel(key)+' • aggiornato da '+(monthly.updatedBy||'—');employeeList.innerHTML=['cosimo','daniela','patrizia'].map(id=>{const done=Number(monthly.employees&&monthly.employees[id]?monthly.employees[id].done:0), min=Number(settings.minPersonal||121), max=Number(settings.maxPersonal||150), manca=Math.max(0,min-done), perc=max>0?Math.round(done/max*100):0, color=done>=min?'var(--green)':(done>=min*0.7?'var(--yellow)':'var(--red)'); return '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;gap:8px"><div><div class="title">'+(monthly.employees&&monthly.employees[id]?monthly.employees[id].name:id)+'</div><div class="sub">'+done+' fatti • mancano '+manca+'</div></div><div class="kpi" style="color:'+color+'">'+perc+'%</div></div></div>';}).join('');}load();</script>
<script type="module">
  import { requireAuth } from "./auth-guard.js";
  requireAuth({ redirect: "login.html" });
</script>
</body></html>
