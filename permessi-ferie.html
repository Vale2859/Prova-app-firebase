<!DOCTYPE html>
<html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Permessi e ferie</title>
<style>
:root{--bg:#eef3f0;--card:#fff;--card-soft:#f5f8f6;--line:#dfe7e3;--text:#1f3c35;--muted:#6f837c;--green:#3e8b61;--green-2:#66b187;--shadow:0 10px 25px rgba(0,0,0,.06)}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;-webkit-tap-highlight-color:transparent}
body{background:linear-gradient(180deg,#f4f7f5,#e9efec);color:var(--text)}
.app{max-width:430px;margin:auto;padding:14px}.section{background:#fff;border-radius:22px;padding:16px;box-shadow:var(--shadow);border:1px solid var(--line)}.section-title{font-size:22px;font-weight:900;margin-bottom:8px}.section-sub{font-size:14px;color:var(--muted);font-weight:700;margin-bottom:14px}.row{display:grid;gap:12px;margin-bottom:12px}input,textarea{width:100%;min-height:54px;border-radius:16px;border:1px solid var(--line);background:var(--card-soft);padding:0 14px;font-size:16px;color:var(--text);outline:none}textarea{padding:14px;min-height:100px;resize:vertical}.btn{width:100%;min-height:54px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--green),var(--green-2));color:#fff;font-size:16px;font-weight:900;cursor:pointer}.pills{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}.pill{flex:1;min-width:110px;min-height:50px;border-radius:16px;border:1px solid var(--line);background:#fff;color:var(--text);font-size:15px;font-weight:900;cursor:pointer}.pill.active{background:linear-gradient(135deg,var(--green),var(--green-2));color:#fff;border-color:transparent}.notice{padding:12px 14px;border-radius:16px;background:#eff7f2;color:#275b46;font-size:14px;font-weight:700;border:1px solid #d8ece1}.hidden{display:none!important}.back{display:inline-flex;align-items:center;gap:8px;text-decoration:none;color:var(--text);font-weight:900;margin-bottom:12px}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyB7p69J89r5Kwu2YgawkBb9omjojdM4HTM",authDomain:"farmaciamontesano.firebaseapp.com",projectId:"farmaciamontesano",storageBucket:"farmaciamontesano.firebasestorage.app",messagingSenderId:"881461241551",appId:"1:881461241551:web:c74d6ee74cb857fa5179ba"}; if(!firebase.apps.length) firebase.initializeApp(firebaseConfig); const db=firebase.firestore(); const EMPLOYEE_STORAGE_KEY='fm_employee_session_v1'; function getSession(){try{return JSON.parse(localStorage.getItem(EMPLOYEE_STORAGE_KEY)||'null')}catch(e){return null}} function requireSession(){const s=getSession(); if(!s){window.location.href='dipendenti-login.html'; throw new Error('no session')} return s} function nowMeta(){const d=new Date(); return {createdAt:d.toISOString(),createdDate:d.toISOString().slice(0,10),createdTime:d.toTimeString().slice(0,5)}} async function createOwnerNotification(data){try{await db.collection('owner_notifications').add({read:false,...nowMeta(),...data})}catch(e){console.error(e)}}
</script>
</head><body><div class="app"><a class="back" href="dipendenti.html">← Torna alla home</a><div class="section"><div class="section-title">Richiesta permessi e/o ferie</div><div class="section-sub">Sistema semplice: ferie, permesso giornata o permesso a ore.</div><div class="pills"><button class="pill active" data-mode="ferie" type="button">Ferie</button><button class="pill" data-mode="giornata" type="button">Permesso giornata</button><button class="pill" data-mode="ore" type="button">Permesso a ore</button></div><div id="ferieFields" class="row"><input id="ferieFrom" type="date"><input id="ferieTo" type="date"></div><div id="giornataFields" class="row hidden"><input id="giornataDate" type="date"></div><div id="oreFields" class="row hidden"><input id="oreDate" type="date"><input id="oreFrom" type="time"><input id="oreTo" type="time"></div><div class="row"><textarea id="requestReason" placeholder="Motivo (facoltativo)"></textarea><button class="btn" id="sendRequestBtn">Invia richiesta</button></div><div class="notice" id="requestMessage">Compila solo quello che serve e invia.</div></div></div>
<script>
(async function(){ const session=requireSession(); let mode='ferie'; const pills=document.querySelectorAll('.pill'), ferieFields=document.getElementById('ferieFields'), giornataFields=document.getElementById('giornataFields'), oreFields=document.getElementById('oreFields'), msg=document.getElementById('requestMessage'); function setMode(next){mode=next; pills.forEach(btn=>btn.classList.toggle('active',btn.dataset.mode===next)); ferieFields.classList.toggle('hidden', next!=='ferie'); giornataFields.classList.toggle('hidden', next!=='giornata'); oreFields.classList.toggle('hidden', next!=='ore');} pills.forEach(btn=>btn.addEventListener('click',()=>setMode(btn.dataset.mode)));
 document.getElementById('sendRequestBtn').addEventListener('click', async ()=>{ let payload={type:'ferie_permesso',employeeId:session.id,employeeName:session.name,status:'in_attesa',requestKind:mode,reason:document.getElementById('requestReason').value.trim(),ownerReason:''}; if(mode==='ferie'){const fromDate=document.getElementById('ferieFrom').value,toDate=document.getElementById('ferieTo').value;if(!fromDate||!toDate){msg.textContent='Per le ferie devi inserire dal e al.';return;} payload.fromDate=fromDate; payload.toDate=toDate;} if(mode==='giornata'){const day=document.getElementById('giornataDate').value;if(!day){msg.textContent='Seleziona il giorno del permesso.';return;} payload.day=day;} if(mode==='ore'){const day=document.getElementById('oreDate').value, fromHour=document.getElementById('oreFrom').value, toHour=document.getElementById('oreTo').value; if(!day||!fromHour||!toHour){msg.textContent='Per il permesso a ore devi inserire giorno, dalle e alle.';return;} payload.day=day; payload.fromHour=fromHour; payload.toHour=toHour;} payload={...payload,...nowMeta()}; const ref=await db.collection('employee_requests').add(payload); await createOwnerNotification({title:'Nuova richiesta permessi/ferie',message:`${session.name} ha inviato una richiesta ${mode}`,employeeId:session.id,employeeName:session.name,requestId:ref.id,type:'ferie_permesso'}); msg.textContent='Richiesta inviata correttamente.'; document.getElementById('requestReason').value=''; document.getElementById('ferieFrom').value=''; document.getElementById('ferieTo').value=''; document.getElementById('giornataDate').value=''; document.getElementById('oreDate').value=''; document.getElementById('oreFrom').value=''; document.getElementById('oreTo').value=''; }); })();
</script></body></html>
