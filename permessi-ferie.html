<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Permessi e ferie</title><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script><script src="internal-common.js"></script><style>:root{--bg:#eef3f0;--card:#fff;--line:#dde5e0;--text:#1f3c35;--muted:#6f837c;--green:#3e8b61;--green2:#66b187;--green-dark:#1d5a40;--shadow:0 12px 28px rgba(0,0,0,.07)}*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif}html,body{margin:0}body{background:linear-gradient(180deg,#f4f7f5,#e9efec);color:var(--text)}.app{width:min(100%,430px);margin:0 auto;padding:14px 14px 24px}.hero{background:linear-gradient(135deg,var(--green-dark),var(--green),var(--green2));color:#fff;border-radius:28px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}.back{display:inline-flex;align-items:center;gap:8px;text-decoration:none;color:#fff;font-size:16px;font-weight:900;margin-bottom:12px}.hero-title{font-size:28px;font-weight:900;margin:0 0 8px}.hero-sub{font-size:14px;opacity:.95;font-weight:700;margin:0 0 14px}.hero-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.hero-stat{min-height:78px;border-radius:18px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.15);padding:12px;display:flex;flex-direction:column;justify-content:space-between}.hero-stat strong{font-size:28px;font-weight:900}.hero-stat span{font-size:12px;font-weight:800}.pillbar{display:flex;gap:8px;margin-bottom:12px}.pill{flex:1;min-height:46px;border:none;border-radius:18px;background:#fff;border:1px solid var(--line);font-size:14px;font-weight:900;cursor:pointer}.pill.active{background:linear-gradient(135deg,var(--green),var(--green2));color:#fff}.section{background:#fff;border-radius:24px;padding:16px;border:1px solid var(--line);box-shadow:var(--shadow)}.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}.row{display:grid;gap:12px;margin-bottom:12px}.field label{display:block;font-size:13px;font-weight:800;color:var(--muted);margin-bottom:6px}.field input,.field textarea{width:100%;min-height:50px;border-radius:16px;border:1px solid var(--line);background:#f7faf8;padding:0 14px;font-size:16px}.field textarea{padding:14px;min-height:90px}.btn{width:100%;min-height:50px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;font-weight:900}.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(120px);background:#17211d;color:#fff;min-height:46px;padding:0 16px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;box-shadow:0 18px 40px rgba(0,0,0,.22);z-index:9999;transition:transform .25s ease}.toast.show{transform:translateX(-50%) translateY(0)}</style></head><body><div class="app"><section class="hero"><a class="back" href="operatori.html">← Torna</a><div class="hero-title">Permessi e ferie</div><div class="hero-sub">Sistema veloce: ferie, assenza giornata o permesso a ore.</div><div class="hero-stats"><div class="hero-stat"><strong id="pendingCount">0</strong><span>In attesa</span></div><div class="hero-stat"><strong id="historyCount">0</strong><span>Totali</span></div></div></section><div class="pillbar"><button class="pill active" data-mode="ferie">Ferie</button><button class="pill" data-mode="giornata">Assenza</button><button class="pill" data-mode="ore">Permesso</button></div><div class="section"><div id="ferieBox" class="row2"><div class="field"><label>Dal</label><input id="fromDate" type="date"></div><div class="field"><label>Al</label><input id="toDate" type="date"></div></div><div id="giornataBox" class="row" style="display:none"><div class="field"><label>Giorno</label><input id="dayDate" type="date"></div></div><div id="oreBox" class="row2" style="display:none"><div class="field"><label>Giorno</label><input id="hourDay" type="date"></div><div class="field"><label>Dalle</label><input id="fromHour" type="time"></div><div class="field"><label>Alle</label><input id="toHour" type="time"></div></div><div class="field"><label>Motivo (facoltativo)</label><textarea id="reason"></textarea></div><button class="btn" id="saveBtn">Invia richiesta</button></div></div><div class="toast" id="toast"></div><script>const A=window.InternalApp,s=A.requireEmployeeSession();let mode='ferie';const t=document.getElementById('toast');function showToast(m){t.textContent=m;t.classList.add('show');clearTimeout(showToast.t);showToast.t=setTimeout(()=>t.classList.remove('show'),1400)}document.querySelectorAll('.pill').forEach(b=>b.onclick=()=>{document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));b.classList.add('active');mode=b.dataset.mode;ferieBox.style.display=mode==='ferie'?'grid':'none';giornataBox.style.display=mode==='giornata'?'grid':'none';oreBox.style.display=mode==='ore'?'grid':'none';});saveBtn.onclick=async()=>{let p={type:'ferie_permesso',employeeId:s.id,employeeName:s.name,status:'in_attesa',requestKind:mode,reason:reason.value.trim(),ownerReason:'',...A.nowMeta()};if(mode==='ferie'){p.fromDate=fromDate.value;p.toDate=toDate.value;if(!p.fromDate||!p.toDate)return showToast('Inserisci dal e al');}if(mode==='giornata'){p.day=dayDate.value;if(!p.day)return showToast('Inserisci il giorno');}if(mode==='ore'){p.day=hourDay.value;p.fromHour=fromHour.value;p.toHour=toHour.value;if(!p.day||!p.fromHour||!p.toHour)return showToast('Completa giorno e orario');}const ref=await A.db.collection('employee_requests').add(p);await A.addOwnerNotification({type:'ferie_permesso',title:'Nuova richiesta ferie/permessi',message:s.name+' ha inviato una richiesta',requestId:ref.id,employeeId:s.id,employeeName:s.name});showToast('Richiesta inviata');['fromDate','toDate','dayDate','hourDay','fromHour','toHour','reason'].forEach(id=>{if(window[id])window[id].value='';});};A.db.collection('employee_requests').where('employeeId','==',s.id).where('type','==','ferie_permesso').onSnapshot(sn=>{const rows=sn.docs.map(d=>d.data());historyCount.textContent=rows.length;pendingCount.textContent=rows.filter(r=>r.status==='in_attesa').length;});</script></body></html>
