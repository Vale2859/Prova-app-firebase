<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Profilo | Farmacia Montesano</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="mobile.css" />

  <style>
    :root{
      --bg: linear-gradient(180deg, #f6f8f7 0%, #eef4f1 100%);
      --card: rgba(255,255,255,0.94);
      --border: rgba(20,55,48,0.08);
      --text: #16372f;
      --muted: #6f817b;
      --green1: #2f7f5f;
      --green2: #86c58b;
      --shadow: 0 18px 44px rgba(16,49,39,0.08);
      --danger: #c75f68;
    }

    * { box-sizing: border-box; }

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .shell{
      max-width: 900px;
      margin: 0 auto;
      padding: 18px 14px 90px;
    }

    .brand-card,
    .panel,
    .form-card{
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: 28px;
    }

    .brand-card{
      padding: 20px 18px;
      margin-bottom: 18px;
    }

    .brand-logo{
      width: 100%;
      max-width: 260px;
      display: block;
    }

    .topbar{
      display:flex;
      gap:14px;
      align-items:flex-start;
      margin-bottom:18px;
    }

    .back-btn{
      width:72px;
      height:72px;
      border-radius:22px;
      background:#fff;
      border:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      color:var(--text);
      font-size:34px;
      box-shadow:var(--shadow);
      flex-shrink:0;
    }

    .title-block h1{
      margin:0 0 8px;
      font-size:46px;
      line-height:.96;
      letter-spacing:-0.05em;
    }

    .title-block p{
      margin:0;
      color:var(--muted);
      font-size:16px;
      line-height:1.45;
      max-width:560px;
    }

    .panel{
      padding:16px;
      margin-bottom:18px;
    }

    .panel-title{
      font-size:22px;
      font-weight:900;
      margin:0 0 14px;
    }

    .tabs{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-bottom:16px;
    }

    .tab-btn{
      min-height:48px;
      border:none;
      border-radius:16px;
      font-weight:800;
      font-size:15px;
      cursor:pointer;
      background:#edf4f1;
      color:var(--text);
    }

    .tab-btn.active{
      background:linear-gradient(135deg,var(--green1) 0%, var(--green2) 100%);
      color:#fff;
    }

    .form-card{
      padding:18px 16px;
      margin-bottom:18px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .field.full{
      grid-column:1/-1;
    }

    .field label{
      font-size:14px;
      font-weight:700;
      color:#34544b;
    }

    .field input{
      width:100%;
      min-height:50px;
      padding:12px 14px;
      border-radius:16px;
      border:1px solid rgba(20,55,48,0.10);
      background:#fff;
      font:inherit;
      color:var(--text);
      outline:none;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    .btn{
      min-height:50px;
      padding:0 18px;
      border:none;
      border-radius:16px;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--green1) 0%, var(--green2) 100%);
      color:#fff;
    }

    .btn-secondary{
      background:#edf4f1;
      color:var(--text);
    }

    .btn-danger{
      background:#fff1f3;
      color:var(--danger);
    }

    .hidden{
      display:none;
    }

    .status{
      margin-top:14px;
      padding:12px 14px;
      border-radius:14px;
      background:#eef7f2;
      color:#21664e;
      font-size:14px;
      font-weight:700;
      display:none;
    }

    .status.error{
      background:#fff3f4;
      color:#b34d58;
    }

    .user-box{
      background:#fff;
      border:1px solid var(--border);
      border-radius:20px;
      padding:16px;
      margin-bottom:16px;
    }

    .user-name{
      font-size:24px;
      font-weight:900;
      margin:0 0 6px;
    }

    .user-mail{
      margin:0;
      color:var(--muted);
      font-size:15px;
      font-weight:600;
    }

    @media (max-width: 640px){
      .title-block h1{
        font-size:34px;
      }

      .title-block p{
        font-size:15px;
      }

      .grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="brand-card">
      <img src="logo.png" alt="Logo Farmacia Montesano" class="brand-logo" />
    </header>

    <section class="topbar">
      <a href="index.html" class="back-btn" onclick="if(history.length>1){history.back();return false;}" aria-label="Torna indietro">←</a>
      <div class="title-block">
        <h1>Profilo</h1>
        <p>Accedi, registrati e gestisci i tuoi dati personali. Questa pagina sarà la base per fidelity, premi e fortuna.</p>
      </div>
    </section>

    <section class="panel" id="authPanel">
      <h2 class="panel-title">Accesso utente</h2>

      <div class="tabs">
        <button class="tab-btn active" id="loginTabBtn" type="button">Accedi</button>
        <button class="tab-btn" id="registerTabBtn" type="button">Registrati</button>
      </div>

      <div class="form-card" id="loginBox">
        <div class="grid">
          <div class="field full">
            <label for="loginEmail">Email</label>
            <input id="loginEmail" type="email" placeholder="nome@email.it" />
          </div>

          <div class="field full">
            <label for="loginPassword">Password</label>
            <input id="loginPassword" type="password" placeholder="Password" />
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-primary" id="loginBtn" type="button">Accedi</button>
        </div>
      </div>

      <div class="form-card hidden" id="registerBox">
        <div class="grid">
          <div class="field">
            <label for="regNome">Nome</label>
            <input id="regNome" type="text" placeholder="Nome" />
          </div>

          <div class="field">
            <label for="regCognome">Cognome</label>
            <input id="regCognome" type="text" placeholder="Cognome" />
          </div>

          <div class="field full">
            <label for="regEmail">Email</label>
            <input id="regEmail" type="email" placeholder="nome@email.it" />
          </div>

          <div class="field">
            <label for="regTelefono">Telefono</label>
            <input id="regTelefono" type="text" placeholder="Telefono" />
          </div>

          <div class="field">
            <label for="regDataNascita">Data di nascita</label>
            <input id="regDataNascita" type="date" />
          </div>

          <div class="field full">
            <label for="regPassword">Password</label>
            <input id="regPassword" type="password" placeholder="Password" />
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-primary" id="registerBtn" type="button">Registrati</button>
        </div>
      </div>

      <div class="status" id="authStatus"></div>
    </section>

    <section class="panel hidden" id="profilePanel">
      <h2 class="panel-title">Il tuo profilo</h2>

      <div class="user-box">
        <h3 class="user-name" id="userDisplayName">Utente</h3>
        <p class="user-mail" id="userEmail">email</p>
      </div>

      <div class="form-card">
        <div class="grid">
          <div class="field">
            <label for="profileNome">Nome</label>
            <input id="profileNome" type="text" placeholder="Nome" />
          </div>

          <div class="field">
            <label for="profileCognome">Cognome</label>
            <input id="profileCognome" type="text" placeholder="Cognome" />
          </div>

          <div class="field">
            <label for="profileTelefono">Telefono</label>
            <input id="profileTelefono" type="text" placeholder="Telefono" />
          </div>

          <div class="field">
            <label for="profileDataNascita">Data di nascita</label>
            <input id="profileDataNascita" type="date" />
          </div>

          <div class="field full">
            <label for="profileFidelityCard">Numero tessera fidelity</label>
            <input id="profileFidelityCard" type="text" placeholder="Numero tessera" />
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-primary" id="saveProfileBtn" type="button">Salva profilo</button>
          <button class="btn btn-danger" id="logoutBtn" type="button">Esci</button>
        </div>

        <div class="status" id="profileStatus"></div>
      </div>
    </section>
  </div>

  <script type="module">
    import {
      auth,
      firestore,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged,
      updateProfile,
      doc,
      setDoc,
      getDoc,
      updateDoc
    } from "./firebase.js";

    const loginTabBtn = document.getElementById("loginTabBtn");
    const registerTabBtn = document.getElementById("registerTabBtn");
    const loginBox = document.getElementById("loginBox");
    const registerBox = document.getElementById("registerBox");

    const authPanel = document.getElementById("authPanel");
    const profilePanel = document.getElementById("profilePanel");

    const authStatus = document.getElementById("authStatus");
    const profileStatus = document.getElementById("profileStatus");

    const loginEmail = document.getElementById("loginEmail");
    const loginPassword = document.getElementById("loginPassword");
    const loginBtn = document.getElementById("loginBtn");

    const regNome = document.getElementById("regNome");
    const regCognome = document.getElementById("regCognome");
    const regEmail = document.getElementById("regEmail");
    const regTelefono = document.getElementById("regTelefono");
    const regDataNascita = document.getElementById("regDataNascita");
    const regPassword = document.getElementById("regPassword");
    const registerBtn = document.getElementById("registerBtn");

    const userDisplayName = document.getElementById("userDisplayName");
    const userEmail = document.getElementById("userEmail");

    const profileNome = document.getElementById("profileNome");
    const profileCognome = document.getElementById("profileCognome");
    const profileTelefono = document.getElementById("profileTelefono");
    const profileDataNascita = document.getElementById("profileDataNascita");
    const profileFidelityCard = document.getElementById("profileFidelityCard");

    const saveProfileBtn = document.getElementById("saveProfileBtn");
    const logoutBtn = document.getElementById("logoutBtn");

    function showStatus(el, message, isError = false) {
      el.textContent = message;
      el.style.display = "block";
      el.classList.toggle("error", isError);

      setTimeout(() => {
        el.style.display = "none";
      }, 3500);
    }

    function switchTab(mode) {
      const isLogin = mode === "login";

      loginTabBtn.classList.toggle("active", isLogin);
      registerTabBtn.classList.toggle("active", !isLogin);

      loginBox.classList.toggle("hidden", !isLogin);
      registerBox.classList.toggle("hidden", isLogin);
    }

    loginTabBtn.addEventListener("click", () => switchTab("login"));
    registerTabBtn.addEventListener("click", () => switchTab("register"));

    async function saveUserProfile(uid, data, isNew = false) {
      const userRef = doc(firestore, "users", uid);

      if (isNew) {
        await setDoc(userRef, {
          nome: data.nome || "",
          cognome: data.cognome || "",
          telefono: data.telefono || "",
          dataNascita: data.dataNascita || "",
          fidelityCard: data.fidelityCard || "",
          punti: 0,
          createdAt: new Date().toISOString()
        });
      } else {
        await updateDoc(userRef, {
          nome: data.nome || "",
          cognome: data.cognome || "",
          telefono: data.telefono || "",
          dataNascita: data.dataNascita || "",
          fidelityCard: data.fidelityCard || ""
        });
      }
    }

    async function loadUserProfile(uid) {
      const userRef = doc(firestore, "users", uid);
      const snap = await getDoc(userRef);

      if (!snap.exists()) return null;
      return snap.data();
    }

    loginBtn.addEventListener("click", async () => {
      try {
        await signInWithEmailAndPassword(auth, loginEmail.value.trim(), loginPassword.value);
        showStatus(authStatus, "Accesso effettuato.");
      } catch (error) {
        showStatus(authStatus, "Accesso non riuscito. Controlla email e password.", true);
      }
    });

    registerBtn.addEventListener("click", async () => {
      const nome = regNome.value.trim();
      const cognome = regCognome.value.trim();
      const email = regEmail.value.trim();
      const telefono = regTelefono.value.trim();
      const dataNascita = regDataNascita.value;
      const password = regPassword.value;

      if (!nome || !cognome || !email || !password) {
        showStatus(authStatus, "Compila almeno nome, cognome, email e password.", true);
        return;
      }

      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        const fullName = `${nome} ${cognome}`.trim();

        await updateProfile(cred.user, { displayName: fullName });

        await saveUserProfile(cred.user.uid, {
          nome,
          cognome,
          telefono,
          dataNascita,
          fidelityCard: ""
        }, true);

        showStatus(authStatus, "Registrazione completata.");
      } catch (error) {
        showStatus(authStatus, "Registrazione non riuscita. Controlla i dati inseriti.", true);
      }
    });

    saveProfileBtn.addEventListener("click", async () => {
      const user = auth.currentUser;
      if (!user) return;

      const nome = profileNome.value.trim();
      const cognome = profileCognome.value.trim();
      const telefono = profileTelefono.value.trim();
      const dataNascita = profileDataNascita.value;
      const fidelityCard = profileFidelityCard.value.trim();

      try {
        const fullName = `${nome} ${cognome}`.trim();
        await updateProfile(user, { displayName: fullName });

        await saveUserProfile(user.uid, {
          nome,
          cognome,
          telefono,
          dataNascita,
          fidelityCard
        }, false);

        userDisplayName.textContent = fullName || "Utente";
        showStatus(profileStatus, "Profilo aggiornato.");
      } catch (error) {
        showStatus(profileStatus, "Errore nel salvataggio del profilo.", true);
      }
    });

    logoutBtn.addEventListener("click", async () => {
      await signOut(auth);
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        authPanel.classList.remove("hidden");
        profilePanel.classList.add("hidden");
        return;
      }

      authPanel.classList.add("hidden");
      profilePanel.classList.remove("hidden");

      userDisplayName.textContent = user.displayName || "Utente";
      userEmail.textContent = user.email || "";

      const profile = await loadUserProfile(user.uid);

      if (profile) {
        profileNome.value = profile.nome || "";
        profileCognome.value = profile.cognome || "";
        profileTelefono.value = profile.telefono || "";
        profileDataNascita.value = profile.dataNascita || "";
        profileFidelityCard.value = profile.fidelityCard || "";
      }
    });
  </script>
</body>
</html>
