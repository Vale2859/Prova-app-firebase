<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Admin | Farmacia Montesano</title>

<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="mobile.css" />

<style>

body{
  background:linear-gradient(180deg,#f8faf9,#eef3f1);
  font-family:Inter,sans-serif;
}

.admin-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
}

.admin-title{
  font-size:22px;
  font-weight:900;
}

.admin-badge{
  background:#1b6c56;
  color:#fff;
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:800;
}

.admin-scroll{
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
}

.admin-page{
  min-width:100%;
  padding:12px;
  scroll-snap-align:start;
}

.admin-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.admin-card{
  height:150px;
  border-radius:22px;
  overflow:hidden;
  position:relative;
  display:flex;
  align-items:flex-end;
  padding:14px;
  font-size:18px;
  font-weight:900;
  color:#fff;
  box-shadow:0 12px 30px rgba(0,0,0,0.1);
}

.admin-card img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  top:0;
  left:0;
  opacity:.35;
}

.admin-card span{
  position:relative;
  z-index:2;
}

.c1{background:#1b6c56;}
.c2{background:#c94d3f;}
.c3{background:#8c67c3;}
.c4{background:#5aa7c9;}

</style>
</head>

<body>

<div class="admin-top">
  <div class="admin-title">Pannello Farmacia</div>
  <div class="admin-badge">ADMIN</div>
</div>

<div class="admin-scroll">

<!-- PAGINA 1 -->
<div class="admin-page">
  <div class="admin-grid">

    <div class="admin-card c1" onclick="go('admin-servizi.html')">
      <img src="images/servizi.jpg">
      <span>Servizi</span>
    </div>

    <div class="admin-card c2" onclick="go('admin-promo.html')">
      <img src="images/promo.jpg">
      <span>Promo</span>
    </div>

    <div class="admin-card c3" onclick="go('admin-beauty.html')">
      <img src="images/beauty.jpg">
      <span>Beauty</span>
    </div>

    <div class="admin-card c4" onclick="go('admin-turni.html')">
      <img src="images/turno.jpg">
      <span>Turni</span>
    </div>

  </div>
</div>

<!-- PAGINA 2 -->
<div class="admin-page">
  <div class="admin-grid">

    <div class="admin-card c1" onclick="go('admin-fidelity.html')">
      <span>Fidelity</span>
    </div>

    <div class="admin-card c2" onclick="go('admin-fortuna.html')">
      <span>Fortuna</span>
    </div>

    <div class="admin-card c3" onclick="go('admin-premi.html')">
      <span>Premi</span>
    </div>

    <div class="admin-card c4" onclick="go('admin-clienti.html')">
      <span>Clienti</span>
    </div>

  </div>
</div>

<!-- PAGINA 3 -->
<div class="admin-page">
  <div class="admin-grid">

    <div class="admin-card c1" onclick="go('calendario-admin.html')">
      <span>Prenotazioni</span>
    </div>

    <div class="admin-card c2" onclick="go('admin-impostazioni.html')">
      <span>Impostazioni</span>
    </div>

    <div class="admin-card c3" onclick="go('admin-statistiche.html')">
      <span>Statistiche</span>
    </div>

    <div class="admin-card c4">
      <span>+</span>
    </div>

  </div>
</div>

</div>

<script>
function go(page){
  window.location.href = page;
}
</script>

</body>
</html>
