<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin</title>

<style>
body{
  margin:0;
  font-family:-apple-system, sans-serif;
  background:#f4f7f5;
  color:#16372f;
}

/* LOGIN PIN */
#loginBox{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#f4f7f5;
  z-index:999;
}

.login-card{
  background:#fff;
  padding:30px;
  border-radius:20px;
  box-shadow:0 20px 40px rgba(0,0,0,0.1);
  text-align:center;
}

.login-card input{
  width:200px;
  height:50px;
  border-radius:12px;
  border:1px solid #ddd;
  text-align:center;
  font-size:20px;
  margin-bottom:15px;
}

.login-card button{
  height:50px;
  width:200px;
  border:none;
  border-radius:12px;
  background:#1b6c56;
  color:#fff;
  font-weight:bold;
  font-size:16px;
}

/* PAGE */
.page{
  max-width:600px;
  margin:auto;
  padding:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.card{
  position:relative;
  border-radius:20px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
  filter:brightness(0.7);
}

.card-title{
  position:absolute;
  bottom:15px;
  left:15px;
  color:#fff;
  font-size:20px;
  font-weight:bold;
}

.admin-badge{
  position:fixed;
  top:20px;
  right:20px;
  background:#1b6c56;
  color:#fff;
  padding:8px 14px;
  border-radius:999px;
  font-weight:bold;
}

.logout{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff5c5c;
  color:#fff;
  padding:10px 15px;
  border-radius:10px;
  border:none;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <div class="login-card">
    <h2>Accesso Titolare</h2>
    <input type="password" id="pinInput" placeholder="Inserisci PIN">
    <br>
    <button onclick="checkPin()">Entra</button>
  </div>
</div>

<div class="admin-badge">ADMIN</div>

<main class="page">

  <h2>Pannello Farmacia</h2>

  <div class="grid">

    <!-- 8 CARD VISIVE -->
    <div class="card"><img src="images/fidelity.jpg"><div class="card-title">Servizi</div></div>
    <div class="card"><img src="images/profilo.jpg"><div class="card-title">Promo</div></div>
    <div class="card"><img src="images/profilo.jpg"><div class="card-title">Beauty</div></div>
    <div class="card"><img src="images/profilo.jpg"><div class="card-title">Turni</div></div>
    <div class="card"><img src="images/profilo.jpg"><div class="card-title">Fidelity</div></div>
    <div class="card"><img src="images/profilo.jpg"><div class="card-title">Fortuna</div></div>
    <div class="card"><img src="images/profilo.jpg"><div class="card-title">Premi</div></div>
    <div class="card"><img src="images/profilo.jpg"><div class="card-title">Clienti</div></div>

    <!-- 4 CARD ADMIN -->
    <div class="card" onclick="go('calendario-admin.html')">
      <img src="images/profilo.jpg">
      <div class="card-title">Prenotazioni</div>
    </div>

    <div class="card" onclick="go('admin-impostazioni.html')">
      <img src="images/profilo.jpg">
      <div class="card-title">Impostazioni</div>
    </div>

    <div class="card" onclick="go('admin-statistiche.html')">
      <img src="images/profilo.jpg">
      <div class="card-title">Statistiche</div>
    </div>

    <div class="card" onclick="alert('In sviluppo')">
      <img src="images/profilo.jpg">
      <div class="card-title">Altro</div>
    </div>

  </div>

</main>

<button class="logout" onclick="logout()">Logout</button>

<script>
const ADMIN_PIN = "2580";

function checkPin(){
  const pin = document.getElementById("pinInput").value;
  if(pin === ADMIN_PIN){
    document.getElementById("loginBox").style.display="none";
  } else {
    alert("PIN errato");
  }
}

function logout(){
  document.getElementById("loginBox").style.display="flex";
}

function go(page){
  window.location.href = page;
}
</script>

</body>
</html>
