name: Deploy Firebase Completo

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      GOOGLE_APPLICATION_CREDENTIALS: /home/runner/work/_temp/gcp-key.json

    steps:
      - name: Scarica codice
        uses: actions/checkout@v4

      - name: Metti chiave Firebase
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > $GOOGLE_APPLICATION_CREDENTIALS

      - name: Prepara Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installa Firebase
        run: npm install -g firebase-tools

      - name: Deploy
        run: firebase deploy --project farmaciamontesano --only hosting
