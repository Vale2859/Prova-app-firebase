<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carica Badge Operatori</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    body{
      margin:0;
      font-family:"Inter",sans-serif;
      background:#f4f7f5;
      color:#17352f;
    }

    .page{
      max-width:760px;
      margin:40px auto;
      background:#fff;
      border:1px solid #e4ece8;
      border-radius:24px;
      box-shadow:0 16px 34px rgba(16,50,42,0.08);
      overflow:hidden;
    }

    .head{
      padding:24px 28px;
      border-bottom:1px solid #e4ece8;
    }

    .head h1{
      margin:0;
      font-size:28px;
      font-weight:900;
    }

    .head p{
      margin:8px 0 0;
      color:#6c7c76;
      font-weight:600;
    }

    .content{
      padding:24px 28px 30px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-bottom:14px;
    }

    .field{
      margin-bottom:14px;
    }

    .field label{
      display:block;
      margin-bottom:8px;
      font-weight:800;
    }

    input{
      width:100%;
      min-height:54px;
      border:1px solid #d7e3de;
      border-radius:14px;
      padding:0 14px;
      font-size:16px;
      font-family:inherit;
      box-sizing:border-box;
    }

    .actions{
      display:flex;
      gap:12px;
      margin-top:18px;
    }

    button{
      min-height:52px;
      border:none;
      border-radius:14px;
      padding:0 18px;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      font-family:inherit;
    }

    .btn-save{
      background:linear-gradient(135deg,#1a8b6c 0%, #58a891 100%);
      color:#fff;
    }

    .btn-demo{
      background:#eef3f1;
      color:#17352f;
    }

    .result{
      margin-top:18px;
      padding:14px 16px;
      border-radius:14px;
      font-weight:800;
      display:none;
    }

    .result.show{
      display:block;
    }

    .ok{
      background:#ebf8f1;
      color:#1b7b5f;
    }

    .error{
      background:#fff1f1;
      color:#c94646;
    }

    .list{
      margin-top:24px;
      border-top:1px solid #e4ece8;
      padding-top:20px;
    }

    .list h2{
      margin:0 0 12px;
      font-size:20px;
      font-weight:900;
    }

    .badge-item{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:12px 14px;
      border:1px solid #e4ece8;
      border-radius:14px;
      margin-bottom:10px;
      background:#fcfdfc;
    }

    .badge-code{
      font-weight:900;
      color:#0d7a5f;
    }

    .badge-meta{
      color:#6c7c76;
      font-weight:600;
      font-size:14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="head">
      <h1>Carica badge operatori</h1>
      <p>Qui puoi creare i badge che verranno letti da operatori.html.</p>
    </div>

    <div class="content">
      <div class="grid">
        <div class="field">
          <label for="badgeCode">Codice badge</label>
          <input id="badgeCode" type="text" placeholder="Es. BADGE001" />
        </div>

        <div class="field">
          <label for="badgeName">Nome operatore</label>
          <input id="badgeName" type="text" placeholder="Es. Cosimo" />
        </div>
      </div>

      <div class="field">
        <label for="badgeRole">Ruolo</label>
        <input id="badgeRole" type="text" placeholder="Es. Operatore" value="Operatore" />
      </div>

      <div class="actions">
        <button class="btn-save" id="saveBadgeBtn">Salva badge</button>
        <button class="btn-demo" id="loadDemoBtn">Carica badge demo</button>
      </div>

      <div class="result" id="resultBox"></div>

      <div class="list">
        <h2>Badge presenti</h2>
        <div id="badgeList"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import {
      firestore,
      doc,
      setDoc,
      collection,
      getDocs
    } from "./firebase.js";

    const badgeCode = document.getElementById("badgeCode");
    const badgeName = document.getElementById("badgeName");
    const badgeRole = document.getElementById("badgeRole");
    const saveBadgeBtn = document.getElementById("saveBadgeBtn");
    const loadDemoBtn = document.getElementById("loadDemoBtn");
    const resultBox = document.getElementById("resultBox");
    const badgeList = document.getElementById("badgeList");

    function showResult(message, type){
      resultBox.textContent = message;
      resultBox.className = `result show ${type}`;
    }

    async function saveBadge(code, name, role){
      const cleanCode = String(code || "").trim().toUpperCase();
      const cleanName = String(name || "").trim();
      const cleanRole = String(role || "").trim() || "Operatore";

      if (!cleanCode || !cleanName) {
        showResult("Inserisci codice badge e nome operatore.", "error");
        return;
      }

      await setDoc(doc(firestore, "operator_badges", cleanCode), {
        nome: cleanName,
        ruolo: cleanRole,
        createdAt: new Date().toISOString()
      });

      showResult(`Badge ${cleanCode} salvato correttamente.`, "ok");

      badgeCode.value = "";
      badgeName.value = "";
      badgeRole.value = "Operatore";

      await loadBadges();
    }

    async function loadBadges(){
      const snap = await getDocs(collection(firestore, "operator_badges"));

      if (snap.empty) {
        badgeList.innerHTML = `<div class="badge-item"><div>Nessun badge presente</div></div>`;
        return;
      }

      let html = "";
      snap.forEach(docSnap => {
        const d = docSnap.data();
        html += `
          <div class="badge-item">
            <div>
              <div class="badge-code">${docSnap.id}</div>
              <div class="badge-meta">${d.nome || "-"} • ${d.ruolo || "-"}</div>
            </div>
          </div>
        `;
      });

      badgeList.innerHTML = html;
    }

    saveBadgeBtn.addEventListener("click", async () => {
      try {
        await saveBadge(badgeCode.value, badgeName.value, badgeRole.value);
      } catch (error) {
        console.error(error);
        showResult("Errore durante il salvataggio del badge.", "error");
      }
    });

    loadDemoBtn.addEventListener("click", async () => {
      try {
        const demoBadges = [
          { code: "BADGE001", nome: "Cosimo", ruolo: "Operatore" },
          { code: "BADGE002", nome: "Daniela", ruolo: "Operatore" },
          { code: "BADGE003", nome: "Patrizia", ruolo: "Operatore" },
          { code: "BADGE004", nome: "Annalisa", ruolo: "Operatore" }
        ];

        for (const item of demoBadges) {
          await setDoc(doc(firestore, "operator_badges", item.code), {
            nome: item.nome,
            ruolo: item.ruolo,
            createdAt: new Date().toISOString()
          });
        }

        showResult("Badge demo caricati correttamente.", "ok");
        await loadBadges();
      } catch (error) {
        console.error(error);
        showResult("Errore durante il caricamento dei badge demo.", "error");
      }
    });

    await loadBadges();
  </script>
</body>
</html>
